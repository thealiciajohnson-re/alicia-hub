const NURDAYS = { biweekly:14, monthly:30 };
const NURLBL  = { off:"Off", biweekly:"Every 2 weeks", monthly:"Monthly" };
function nurtureOn(l){ return l && l.autoNurture && l.autoNurture!=="off" && NURDAYS[l.autoNurture]; }
function nurtureDue(l){
  if (!nurtureOn(l)) return false;
  if (!l.lastNurtured) return true;
  return (new Date(toDay()) - new Date(l.lastNurtured)) >= NURDAYS[l.autoNurture]*86400000;
}
function nurtureNext(l){
  if (!nurtureOn(l)) return null;
  if (!l.lastNurtured) return toDay();
  var d = new Date(l.lastNurtured+"T12:00:00"); d.setDate(d.getDate()+NURDAYS[l.autoNurture]);
  return d.toISOString().split("T")[0];
}

// Pull the lead's city from their address ("507 Alta Ave, Rohnert Park, CA 94928" -> "Rohnert Park")
function cityOf(l){
  if (!l || !l.addr) return "";
  var parts = l.addr.split(",").map(function(s){ return s.trim(); }).filter(Boolean);
  if (parts.length>=3) return parts[parts.length-2];   // street, CITY, state zip
  if (parts.length===2) return parts[1];               // street, CITY
  return "";
}
function areaOf(l){ return cityOf(l) || "Sonoma County"; }

/* ── Recurring reminders ─────────────────────────────────────── */
const REPLBL = { none:"One-time", weekly:"Weekly", monthly:"Monthly" };
function nextDate(date, repeat){
  if(!date || !repeat || repeat==="none") return null;
  var d = new Date(date+"T12:00:00");
  if(repeat==="weekly") d.setDate(d.getDate()+7);
  else if(repeat==="monthly") d.setMonth(d.getMonth()+1);
  else return null;
  return d.toISOString().split("T")[0];
}
// Toggle done; when completing a recurring reminder, spawn its next occurrence.
function toggleRem(setRems, r){
  setRems(function(p){
    var out = p.map(function(x){ return x.id===r.id?{...x,done:!x.done}:x; });
    if(!r.done && r.repeat && r.repeat!=="none"){
      var nd = nextDate(r.date, r.repeat);
      if(nd && !out.some(function(x){ return x.leadId===r.leadId && x.title===r.title && x.date===nd && !x.done; })){

      }
    }
    return out;
  });
}

var _ak = "";
// AI runs through a secure Supabase Edge Function ("ai") that holds the Anthropic
// key server-side. The browser never sees the key; the call is authorized by the
// signed-in user's session token.
async function callAI(prompt) {
  try {
    // Always grab a FRESH session token (access tokens expire ~hourly; supabase-js
    // auto-refreshes). Using a stale captured token is why AI "stopped working".
    var token = SUPABASE_ANON_KEY;
    try {
      if (supa) {
        var sres = await supa.auth.getSession();
        if (sres && sres.data && sres.data.session && sres.data.session.access_token) {
          _session = sres.data.session;
          token = _session.access_token;
        }
      }
    } catch(e){}
    var r = await fetch(SUPABASE_URL + "/functions/v1/ai", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token,"apikey":SUPABASE_ANON_KEY},
      body:JSON.stringify({
        prompt: prompt,
        system: "You are a real estate assistant for "+AGENT.name+" at "+AGENT.co+", "+AGENT.city+". Phone: "+AGENT.phone+". Email: "+AGENT.email+". Be concise and actionable. Write in first person from Alicia's perspective for client-facing content."
      })
    });
    var d = await r.json();
    if (d.error) return "⚠️ AI error: "+d.error+(/[Nn]ot authorized/.test(d.error)?" (Try signing out and back in.)":"");
    return d.text || "No response.";
  } catch(e) {
    return "⚠️ Couldn't reach AI: "+(e && e.message ? e.message : String(e));
  }
}

// Push a lead (+notes) into Follow Up Boss via the secure fub-push function.
async function pushToFub(lead){
  try{
    var r = await fetch(SUPABASE_URL+"/functions/v1/fub-push", {
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY},
      body:JSON.stringify({lead:lead})
    });
    return await r.json();
  }catch(e){ return {error:String((e&&e.message)||e)}; }
}

function draftMsgLocal(l) {
  var name = l.first;
  var isEmail = !!l.email;
  var sign = isEmail
    ? "\n\nWarm regards,\n"+AGENT.name+"\n"+AGENT.phone+" | "+AGENT.email
    : "\n\n— "+AGENT.name+", "+AGENT.co+" | "+AGENT.phone;
  var greeting = "Hi "+name+(isEmail ? "," : "!");
  var body = "";

  if (l.type === "seller") {
    if (l.temp === "hot") {
      body = "I wanted to follow up on our recent conversation about listing your home. The Sonoma County market is active right now and I'd love to get your property in front of buyers while momentum is strong. Are you still looking to move forward soon? I can have everything ready to go quickly once you give the word.";
    } else if (l.temp === "warm") {
      body = "Just checking in to see how you're feeling about your timeline for selling. I've been watching activity in your area and there are some encouraging things happening in the market. Would you be open to a quick call this week to catch up and look at some updated numbers?";
    } else {
      body = "I wanted to touch base and share that Sonoma County home values remain strong. Whenever you're ready to think about next steps, I'm here — no pressure at all. Just wanted to stay on your radar and make sure you have the most current information when the time is right.";
    }
    if (l.notes && l.notes.length > 0) {
      if (l.source === "Cold Call") body += " I remember we spoke briefly about "+l.addr+" — I'd love to revisit that conversation.";
    }
  } else {
    if (l.temp === "hot") {
      body = "I'm checking in on your home search! A few new listings have come up that could be a great fit based on what you're looking for. Homes in this price range are moving quickly in Sonoma County, so I'd love to get you in for a showing as soon as possible. Are you available this week?";
    } else if (l.temp === "warm") {
      body = "Wanted to reach out and see how your home search is going. I've been keeping an eye on listings that match your criteria and have a couple of things I'd love to show you. Is now still a good time to be looking, or has your timeline shifted at all?";
    } else {
      body = "I hope you're doing well! Just wanted to stay in touch and let you know I'm still here whenever you're ready to take the next step. The Sonoma County market has been interesting — whenever the timing is right for you, I'd love to help you find the right home.";
    }
    if (l.timeline && l.timeline !== "Just curious") body += " You mentioned a timeline of "+l.timeline+" — does that still feel accurate?";
  }

  var out = greeting+"\n\n"+body+sign;
  var c = cityOf(l);
  return c ? out.split("Sonoma County").join(c) : out;   // address their actual city when we know it
}

  function dailyFocus(){
    var dueFu = (leads||[]).filter(function(l){ return l.fu && l.fu<=td; });
    var hot = (leads||[]).filter(function(l){ return l.temp==="hot"; });

  return (
    <div>

              return <div key={r.id} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:"1px solid "+C.br,opacity:r.done?0.5:1}}>
                <div style={{fontSize:12,color:C.t2,minWidth:62,fontFamily:"monospace"}}>{r.time||"—"}</div>

              </div>;

                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,textDecoration:r.done?"line-through":"none"}}>{r.title} <Tag t="new">{r.type}</Tag></div>{r.leadId && leadName(r.leadId) && <div style={{fontSize:12,color:C.t3}}>👤 {leadName(r.leadId)}</div>}</div>
                <Btn onClick={function(){ toggleRem(setRems, r); }} style={{fontSize:10,padding:"3px 8px"}}>{r.done?"Undo":"Done"}</Btn>

/* ── REMINDERS ───────────────────────────────────────────────── */
function PanelRems({rems,leads,setRems}) {

  var [editId,setEditId] = useState("");

  function submit() {
    if(!form.title.trim()){ setSt("Enter a note."); return; }
    if(editId){ setRems(function(p){ return p.map(function(x){ return x.id===editId?{...x,...form}:x; }); }); setSt("Reminder updated."); setEditId(""); }
    else { setRems(function(p){ return [...p,{id:uid(),...form,done:false}]; }); setSt("Saved."); }
    setForm(blank);
  }
  function edit(r){ setEditId(r.id); setForm({title:r.title||"",date:r.date||toDay(),time:r.time||"",type:r.type||"follow",leadId:r.leadId||"",repeat:r.repeat||"none"}); setSt(""); }
  function del(id){ setRems(function(p){ return p.filter(function(x){ return x.id!==id; }); }); if(editId===id){ setEditId(""); setForm(blank); } }
  function clearDone(){ setRems(function(p){ return p.filter(function(x){ return !x.done; }); }); }
  var sorted = [...rems].sort(function(a,b){ return a.date>b.date?1:-1; });
  var doneCount = rems.filter(function(r){ return r.done; }).length;
  var dc = {appt:C.ac,follow:C.go,email:C.go,urgent:C.ro,nurture:C.sk,other:C.t3};
  return (
    <div>

        </Row>
        <Row cols="1fr 1fr 1fr">
          <Fld label="Type"><select style={inp} value={form.type} onChange={fld("type")}><option value="appt">Appointment</option><option value="follow">Follow-up</option><option value="email">Send email</option><option value="urgent">Urgent</option><option value="other">Other</option></select></Fld>
          <Fld label="Repeat"><select style={inp} value={form.repeat} onChange={fld("repeat")}><option value="none">One-time</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></Fld>
          <Fld label="Lead (optional)"><select style={inp} value={form.leadId} onChange={fld("leadId")}><option value="">— unlinked —</option>{leads.map(function(l){ return <option key={l.id} value={l.id}>{l.first} {l.last}</option>; })}</select></Fld>
        </Row>
        <div style={{display:"flex",gap:7}}>
          <Btn v="primary" onClick={submit}>{editId?"Save changes":"+ Set Reminder"}</Btn>
          {editId && <Btn onClick={function(){ setEditId(""); setForm(blank); setSt(""); }}>Cancel</Btn>}
        </div>
        {st && <div style={{fontSize:12,color:C.ac,marginTop:5}}>{st}</div>}
      </Card>
      <Card title={"Upcoming (" + rems.filter(function(r){ return !r.done; }).length + " pending)"}>
        {doneCount>0 && <div style={{textAlign:"right",marginBottom:4}}><span style={{fontSize:11,color:C.ro,cursor:"pointer"}} onClick={clearDone}>Clear {doneCount} completed ✕</span></div>}
        {sorted.length===0 ? <div style={{color:C.t3,fontSize:13}}>No reminders yet.</div> : sorted.map(function(r){
          return (
            <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid "+C.br,opacity:r.done?0.45:1}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:dc[r.type]||C.t3,flexShrink:0}} />
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,textDecoration:r.done?"line-through":"none"}}>{r.title}{r.repeat&&r.repeat!=="none"?<span style={{fontSize:10,color:C.sk,marginLeft:5}}>🔁 {REPLBL[r.repeat]}</span>:null}</div>
                <div style={{fontSize:11,color:C.t3}}>{fmtDate(r.date)}{r.time?" · "+r.time:""} · {r.type}{r.leadId?(function(){ var L=leads.find(function(x){ return x.id===r.leadId; }); return L?" · 👤 "+L.first+" "+L.last:""; })():""}</div>
              </div>
              <Btn onClick={function(){ toggleRem(setRems, r); }} style={{fontSize:10,padding:"3px 8px"}}>{r.done?"Undo":"Done"}</Btn>
              <Btn onClick={function(){ edit(r); }} style={{fontSize:10,padding:"3px 8px"}}>Edit</Btn>
              <Btn v="rose" onClick={function(){ del(r.id); }} style={{fontSize:10,padding:"3px 8px"}} title="Delete">🗑</Btn>

/* ── ALL LEADS ───────────────────────────────────────────────── */
function PanelLeads({leads,setLeads,setTab,enrolled,setEnrolled,focusLead,setFocusLead,listings,setRems,setDeals,setAct,market,pullFromFub,dismissLead}) {
  var [selListing,setSelListing] = useState("");
  var [fuDraft,setFuDraft] = useState("");
  var [fuNote,setFuNote] = useState("");
  var [fuRepeat,setFuRepeat] = useState("none");
  var [srch,setSrch] = useState(""); var [fT,setFT] = useState(""); var [fTp,setFTp] = useState(""); var [fS,setFS] = useState("");
  var [sortKey,setSortKey] = useState(""); var [sortDir,setSortDir] = useState(1);
  var [modal,setModal] = useState(null); var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var [modalPlan,setModalPlan] = useState("");
  var [confirmDelete,setConfirmDelete] = useState(false);
  var [noteDraft,setNoteDraft] = useState("");
  var [phoneDraft,setPhoneDraft] = useState("");
  var [emailDraft,setEmailDraft] = useState("");
  var [phone2Draft,setPhone2Draft] = useState("");
  var [email2Draft,setEmail2Draft] = useState("");
  var [addrDraft,setAddrDraft] = useState("");
  var [firstDraft,setFirstDraft] = useState("");
  var [lastDraft,setLastDraft] = useState("");
  var [zipDraft,setZipDraft] = useState("");
  var [sendMsg,setSendMsg] = useState("");
  var [fubMsg,setFubMsg] = useState(""); var [fubBusy,setFubBusy] = useState(false);
  function syncOneFub(l){
    setSendMsg("⟳ Pushing to Follow Up Boss…");
    pushToFub(l).then(function(res){
      if(res && res.fubId){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,fubId:res.fubId,fubSynced:toDay()}:x; }); }); setModal(function(m){ return m?{...m,fubId:res.fubId,fubSynced:toDay()}:m; }); setSendMsg("✓ Synced to Follow Up Boss."); }
      else setSendMsg("⚠️ FUB sync failed: "+((res&&res.error)||"unknown")+". (Deploy fub-push + add FUB_API_KEY.)");
    });
  }
  function syncAllFub(){
    var todo = leads.filter(function(l){ return !l.fubId && (l.email||l.phone); });
    if(!todo.length){ setFubMsg("All leads with contact info are already in FUB."); return; }
    setFubBusy(true); setFubMsg("Syncing 0/"+todo.length+"…");
    var i=0, okc=0;
    function step(){
      if(i>=todo.length){ setFubBusy(false); setFubMsg("✓ Synced "+okc+" of "+todo.length+" leads to Follow Up Boss."); return; }
      var l=todo[i];
      pushToFub(l).then(function(res){
        if(res && res.fubId){ okc++; setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,fubId:res.fubId,fubSynced:toDay()}:x; }); }); }
        i++; setFubMsg("Syncing "+i+"/"+todo.length+"…"); setTimeout(step, 350);
      });
    }
    step();
  }
  var _mid = modal ? modal.id : null;
  useEffect(function(){
    if (modal) {
      setNoteDraft(modal.notes||"");
      setPhoneDraft(modal.phone||"");
      setEmailDraft(modal.email||"");
      setPhone2Draft(modal.phone2||"");
      setEmail2Draft(modal.email2||"");
      setAddrDraft(modal.addr||"");
      setFirstDraft(modal.first||"");
      setLastDraft(modal.last||"");
      setZipDraft(modal.zip||"");
      setFuDraft(modal.fu||toDay());
      setFuNote("");
      setFuRepeat("none");
      setSendMsg("");
    }
  }, [_mid]);

  function saveContact(field, val) {
    setLeads(function(p){ return p.map(function(l){ return l.id===modal.id?{...l,[field]:val}:l; }); });
    setModal(function(m){ return {...m,[field]:val}; });
  }

  function setFollowAlert(){
    if(!fuDraft || !modal) return;
    var base = "Follow up — "+modal.first+" "+modal.last;
    var title = fuNote.trim() ? base+": "+fuNote.trim() : base;
    setLeads(function(p){ return p.map(function(l){ return l.id===modal.id?{...l,fu:fuDraft}:l; }); });
    setModal(function(m){ return {...m,fu:fuDraft}; });
    if(setRems) setRems(function(p){
      return [...p,{id:uid(),title:title,note:fuNote.trim(),date:fuDraft,time:"09:00",type:"follow",repeat:fuRepeat,done:false,leadId:modal.id}];
    });
    setSendMsg("🔔 Alert set for "+fmtDate(fuDraft)+(fuRepeat!=="none"?" ("+REPLBL[fuRepeat].toLowerCase()+")":"")+(fuNote.trim()?" — "+fuNote.trim():"")+". It'll show in Reminders & on your Dashboard.");
    setFuNote(""); setFuRepeat("none");
  }

  function addToPipeline(){
    if(!setDeals || !modal) return;
    var dtype = modal.type==="seller"?"Listing":"Buyer";
    var made = false;
    setDeals(function(p){
      if(p.some(function(d){ return d.fromLead===modal.id; })) return p;
      made = true;
      return [...p,{id:uid(),addr:modal.addr||"",client:modal.first+" "+modal.last,type:dtype,price:0,closeDate:"",stage:0,fromLead:modal.id}];
    });
    if(made && setAct) setAct(function(a){ return {...a,listings:(a.listings||0)+(dtype==="Listing"?1:0)}; });
    setSendMsg(made ? "➕ Added "+modal.first+" to the Deal Pipeline (stage: Lead). Open Deal Pipeline to set price & stage." : modal.first+" is already in the Deal Pipeline.");
  }

  // Open a lead's popup when another panel (e.g. Follow-Up Queue) asks to focus it
  useEffect(function(){
    if (focusLead) {
      var L = leads.find(function(l){ return l.id===focusLead; });
      if (L) { setModal(L); setAT(""); }
      if (setFocusLead) setFocusLead(null);
    }
  }, [focusLead]);

  var filtered = leads.filter(function(l){
    var q = (l.first+" "+l.last+" "+l.phone+" "+l.email+" "+(l.phone2||"")+" "+(l.email2||"")).toLowerCase();
    return (!srch||q.includes(srch.toLowerCase())) && (!fT||l.type===fT) && (!fTp||l.temp===fTp) && (!fS||l.source===fS);
  });
  var TEMPRANK = {hot:0,warm:1,cold:2};
  var NURRANK = {active:0,"long-term":1,drip:2,monthly:3,quarterly:4,none:5};
  function sortVal(l){
    if(sortKey==="Name") return ((l.last||"")+" "+(l.first||"")).toLowerCase();
    if(sortKey==="Type") return l.type||"";
    if(sortKey==="Temp") return TEMPRANK[l.temp]!=null?TEMPRANK[l.temp]:9;
    if(sortKey==="Source") return (l.source||"").toLowerCase();
    if(sortKey==="Nurture") return NURRANK[l.nurture]!=null?NURRANK[l.nurture]:9;
    if(sortKey==="Follow-up") return l.fu||"9999";
    return "";
  }
  if(sortKey){ filtered = filtered.slice().sort(function(a,b){ var x=sortVal(a),y=sortVal(b); return (x<y?-1:x>y?1:0)*sortDir; }); }
  function clickSort(h){ if(h==="Phone / Email"||h==="") return; if(sortKey===h){ setSortDir(function(d){ return -d; }); } else { setSortKey(h); setSortDir(1); } }

  function download(name, text, mime){
    var blob = new Blob([text], {type:mime});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a"); a.href = url; a.download = name; document.body.appendChild(a); a.click();
    document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }
  function stamp(){ try{ return new Date().toISOString().slice(0,10); }catch(e){ return "backup"; } }
  function exportCSV(){
    var cols = ["First","Last","Phone","Phone 2","Email","Email 2","Address","Type","Temp","Source","Timeline","Nurture","Follow-up","Last contact","Notes"];
    function esc(v){ v = (v==null?"":String(v)); return '"'+v.replace(/"/g,'""')+'"'; }
    var rows = leads.map(function(l){ return [l.first,l.last,l.phone,l.phone2,l.email,l.email2,l.addr,l.type,l.temp,l.source,l.timeline,l.nurture,l.fu,l.lc,l.notes].map(esc).join(","); });
    download("alicia-leads-"+stamp()+".csv", cols.map(esc).join(",")+"\r\n"+rows.join("\r\n"), "text/csv;charset=utf-8");
  }
  function exportJSON(){
    download("alicia-leads-full-backup-"+stamp()+".json", JSON.stringify(leads,null,2), "application/json");
  }

  function draftMsg(l) {
    setAT(draftMsgLocal(l));
  }
  function draftMsgAI(l) {
    setAL(true);
    callAI("Write a short warm follow-up "+(l.email?"email":"text")+" from "+AGENT.name+" to "+l.first+" "+l.last+", a "+l.temp+" "+l.type+" lead from "+l.source+" located in "+areaOf(l)+" (Sonoma County). Timeline: "+l.timeline+". Notes: "+(l.notes||"recent contact")+". Reference their city/area ("+areaOf(l)+") naturally rather than just 'Sonoma County'. Under 80 words. Warm, ends with a soft question.").then(function(t){
      var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
      setAT(bad ? draftMsgLocal(l) : t);   // AI failed/invalid key → fall back to template
      setAL(false);
    });
  }
  function leadZip(l){ if(l.zip && /^\d{5}$/.test(l.zip.trim())) return l.zip.trim(); var mm=(l.addr||"").match(/\b(\d{5})\b/); return mm?mm[1]:""; }
  function fetchLeadMarket(l){
    var zip = leadZip(l);
    return fetch(SUPABASE_URL+"/functions/v1/market"+(zip?"?zip="+zip:""), {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}})
      .then(function(r){ return r.json(); })
      .then(function(d){ return (d && d.median && !d.error) ? d : null; })
      .catch(function(){ return null; });
  }
  function draftMarketAI(l) {
    setAL(true);
    var srcZip = leadZip(l);
    fetchLeadMarket(l).then(function(fresh){          // pull the latest (ZIP-local) numbers each time = refreshable
      var mk = fresh || market || {};
      var price = mk.median||"$715K", dom=(mk.dom||"28")+" days", inv=(mk.inv||"~840")+" homes";
      setSendMsg(
        (fresh && srcZip) ? ("📊 Using ZIP "+srcZip+" ("+(fresh.area||"local")+") — median "+price+" · "+dom)
        : srcZip ? ("📊 No data for ZIP "+srcZip+" — used county-wide numbers.")
        : "📊 No ZIP on this lead — used county-wide numbers. Add a ZIP code on the lead for local figures."
      );
      callAI("Write a short warm market-update email from "+AGENT.name+" to "+l.first+" "+l.last+", a "+l.temp+" "+l.type+" lead in "+areaOf(l)+" (Sonoma County). Use current local stats: median price "+price+", average "+dom+" on market, "+inv+" active listings. Reference their city/area ("+areaOf(l)+") naturally rather than just 'Sonoma County'. Under 130 words. Warm, local, genuinely helpful, not pushy. Start with 'Hi "+l.first+",'. End with a soft invitation to reach out. Body only. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+".").then(function(t){
        var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
        setAT(bad ? draftMarketLocal(l, mk) : t); setAL(false);
      });
    });
  }
  function chosenListing(){ var ls=listings||[]; return ls.find(function(x){ return x.id===selListing; }) || ls[0] || null; }
  function draftListingAI(l) {
    var lst = chosenListing();
    setAL(true);
    var info = lst
      ? ("Use these real listing details, written naturally into the email (no placeholders): address "+(lst.addr||"")+(lst.price?(", price $"+Number(lst.price).toLocaleString()):"")+(lst.beds?(", "+lst.beds+" bedrooms"):"")+(lst.baths?(", "+lst.baths+" bathrooms"):"")+(lst.sqft?(", "+lst.sqft+" square feet"):"")+(lst.feature?(", standout feature: "+lst.feature):"")+(lst.link?(", listing link: "+lst.link):"")+".")
      : "Keep clear bracketed placeholders the agent will fill in: [property address], [price], [# beds], [# baths], [square footage], [one standout feature], and [listing link].";
    callAI("Write a short warm 'just listed — new home on the market' announcement email from "+AGENT.name+" to "+l.first+" "+l.last+", a "+l.type+" lead in Sonoma County. "+info+" Invite them to a private showing this week and note that homes move fast. Under 140 words. Warm and enthusiastic but not pushy. Start with 'Hi "+l.first+",'. Sign off: "+AGENT.name+" | "+AGENT.phone+".").then(function(t){
      var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
      setAT(bad ? draftListingLocal(l, lst) : t); setAL(false);
    });
  }

  /* ── Send helpers ──────────────────────────────────────────── */
  function curDraft(l){ return aiTxt || draftMsgLocal(l); }
  function emailSubject(l){ return (l.type==="seller" ? "Following up on your home" : "Your Sonoma County home search")+" — "+AGENT.co; }
  function logContact(l, label){
    setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,lc:toDay(),log:[...(x.log||[]),toDay()+" — "+label]}:x; }); });
    setModal(function(m){ return m?{...m,lc:toDay()}:m; });
  }
  function doEmail(l){
    if (!l.email){ setSendMsg("No email on file — add one above first."); return; }
    var href = "mailto:"+l.email+"?subject="+encodeURIComponent(emailSubject(l))+(l.email2?"&cc="+encodeURIComponent(l.email2):"")+"&body="+encodeURIComponent(curDraft(l));
    window.location.href = href;
    logContact(l,"email opened"); setSendMsg("Opening your mail app…");
  }
  function doGmail(l){
    if (!l.email){ setSendMsg("No email on file — add one above first."); return; }
    var u = "https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&to="+encodeURIComponent(l.email)+"&su="+encodeURIComponent(emailSubject(l))+(l.email2?"&cc="+encodeURIComponent(l.email2):"")+"&body="+encodeURIComponent(curDraft(l));
    window.open(u,"_blank"); logContact(l,"email opened (Gmail)"); setSendMsg("Opening Gmail compose…");
  }
  function doText(l){
    var ph = (l.phone||"").replace(/[^0-9+]/g,"");
    if (!ph){ setSendMsg("No phone on file — add one above first."); return; }
    window.location.href = "sms:"+ph+"?&body="+encodeURIComponent(curDraft(l));
    logContact(l,"text opened"); setSendMsg("Opening Messages…");
  }
  function doCopy(l){
    var body = curDraft(l);
    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(body).then(function(){ setSendMsg("Draft copied to clipboard ✓"); }, function(){ setSendMsg("Couldn't copy — select the text below."); }); }
    else { setSendMsg("Couldn't copy — select the text below."); }
  }

  var SRCS = ["Zillow","Realtor.com","Referral","Sphere","Open House","Cold Call","Other"];
  var THS = ["Name","Phone / Email","Type","Temp","Source","Nurture","Follow-up",""];

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:14}}>
        <div style={{fontSize:18,fontWeight:700}}>All Leads <span style={{fontSize:13,fontWeight:400,color:C.t3}}>{filtered.length} of {leads.length}</span></div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <Btn v="sky" onClick={syncAllFub} style={{fontSize:11}}>{fubBusy?"⟳ Syncing…":"⟳ Sync all to FUB"}</Btn>
          <Btn v="sky" onClick={function(){ setFubMsg("Checking Follow Up Boss for new leads…"); if(pullFromFub) pullFromFub().then(function(){ setFubMsg("✓ Checked FUB — any new leads were added."); }); }} style={{fontSize:11}}>⟳ Check FUB for new</Btn>
          <Btn onClick={exportCSV} style={{fontSize:11}}>⬇ CSV</Btn>
          <Btn onClick={exportJSON} style={{fontSize:11}}>⬇ Backup</Btn>
        </div>
      </div>
      {fubMsg && <div style={{fontSize:12,color:C.ac,marginBottom:8}}>{fubMsg}</div>}
      <Card style={{padding:"8px 10px",marginBottom:8}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <input style={{...inp,flex:1,minWidth:160}} placeholder="Search name, phone, email…" value={srch} onChange={function(e){ setSrch(e.target.value); }} />
          <select style={{...inp,width:115}} value={fT} onChange={function(e){ setFT(e.target.value); }}><option value="">All types</option><option value="buyer">Buyer</option><option value="seller">Seller</option><option value="both">Both</option></select>
          <select style={{...inp,width:110}} value={fTp} onChange={function(e){ setFTp(e.target.value); }}><option value="">All temps</option><option value="hot">Hot</option><option value="warm">Warm</option><option value="cold">Cold</option></select>
          <select style={{...inp,width:125}} value={fS} onChange={function(e){ setFS(e.target.value); }}><option value="">All sources</option>{SRCS.map(function(s){ return <option key={s}>{s}</option>; })}</select>
        </div>
      </Card>
      {filtered.length===0 ? (
        <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:20}}>No leads found. <span style={{color:C.ac,cursor:"pointer"}} onClick={function(){ setTab("addlead"); }}>Add a lead →</span></div></Card>
      ) : (
        <div style={{background:C.sur,border:"1px solid "+C.br,borderRadius:11,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{THS.map(function(h){ var sortable=(h!=="Phone / Email"&&h!==""); return <th key={h} onClick={function(){ clickSort(h); }} style={{fontSize:10,fontWeight:700,color:sortKey===h?C.ac:C.t3,textAlign:"left",padding:"7px 10px",borderBottom:"1px solid "+C.br,textTransform:"uppercase",letterSpacing:".06em",background:C.s2,cursor:sortable?"pointer":"default",userSelect:"none"}}>{h}{sortKey===h?(sortDir>0?" ▲":" ▼"):(sortable&&h?" ⇅":"")}</th>; })}</tr></thead>
            <tbody>
              {filtered.map(function(l){
                return (
                  <tr key={l.id} onMouseEnter={function(e){ e.currentTarget.style.background=C.s2; }} onMouseLeave={function(e){ e.currentTarget.style.background=""; }}>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br,fontSize:13}}><div style={{fontWeight:600,color:C.ac,cursor:"pointer"}} title="Click to view & edit" onClick={function(){ setModal(l); setAT(""); }}>{l.first} {l.last}</div><div style={{fontSize:11,color:C.t3}}>{l.timeline}</div></td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br,fontSize:12,fontFamily:"monospace",color:C.t2}}><div>{l.phone||"—"}{l.phone2?<span style={{color:C.t3}}> · {l.phone2}</span>:null}</div><div style={{fontSize:11,color:C.t3}}>{l.email||"—"}{l.email2?<span> · {l.email2}</span>:null}</div></td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br}}><Tag t={l.type}>{l.type}</Tag></td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br}}><Tag t={l.temp}>{TICON[l.temp]} {l.temp}</Tag></td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br,fontSize:12,color:C.t2}}>{l.source}</td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br,fontSize:12,color:C.t2}}>{NLBL[l.nurture]||l.nurture}{nurtureOn(l)?<span title={"Auto-nurture: "+NURLBL[l.autoNurture]+(nurtureDue(l)?" (due now)":"")} style={{marginLeft:4,color:nurtureDue(l)?C.go:C.t3}}>🔄</span>:null}</td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br,fontSize:11,fontFamily:"monospace",color:l.fu<=toDay()?C.ro:C.t3}}>{fmtDate(l.fu)}</td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br}}>
                      <Btn onClick={function(){ setModal(l); setAT(""); }} style={{fontSize:10,padding:"3px 8px",marginRight:3}}>View</Btn>
                      <Btn v="sky" onClick={function(){ setModal(l); setAT(draftMsgLocal(l)); }} style={{fontSize:10,padding:"3px 8px"}}>Draft</Btn>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      <AIBox text={aiTxt} loading={aiLd} />
      {modal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={function(){ setModal(null); }}>
          <div style={{background:C.sur,borderRadius:14,padding:20,width:520,maxWidth:"94vw",maxHeight:"86vh",overflowY:"auto"}} onClick={function(e){ e.stopPropagation(); }}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{fontSize:16,fontWeight:700}}>{modal.first} {modal.last}{modal.fubId?<span style={{fontSize:10,color:C.ac,marginLeft:6,fontWeight:500}}>✓ in FUB</span>:null}</div>
              <Btn onClick={function(){ setModal(null); setConfirmDelete(false); }} style={{padding:"4px 8px"}}>✕</Btn>
            </div>
            <Row>
              <div>
                <div style={{fontSize:11,color:C.t3,marginBottom:5}}>Contact</div>
                <div style={{display:"flex",gap:4,marginBottom:4}}>
                  <input style={{...inp,fontSize:12}} placeholder="First" value={firstDraft} onChange={function(e){setFirstDraft(e.target.value);}} onBlur={function(){ if(firstDraft.trim()) saveContact("first",firstDraft.trim()); }} />
                  <input style={{...inp,fontSize:12}} placeholder="Last" value={lastDraft} onChange={function(e){setLastDraft(e.target.value);}} onBlur={function(){ if(lastDraft.trim()) saveContact("last",lastDraft.trim()); }} />
                </div>
                <input style={{...inp,marginBottom:4,fontSize:12,fontFamily:"monospace"}} placeholder="Phone" value={phoneDraft} onChange={function(e){setPhoneDraft(e.target.value);}} onBlur={function(){saveContact("phone",phoneDraft);}} />
                <input style={{...inp,marginBottom:4,fontSize:12,fontFamily:"monospace"}} placeholder="Phone 2 (optional)" value={phone2Draft} onChange={function(e){setPhone2Draft(e.target.value);}} onBlur={function(){saveContact("phone2",phone2Draft);}} />
                <input style={{...inp,marginBottom:4,fontSize:12}} placeholder="Email" value={emailDraft} onChange={function(e){setEmailDraft(e.target.value);}} onBlur={function(){saveContact("email",emailDraft);}} />
                <input style={{...inp,marginBottom:4,fontSize:12}} placeholder="Email 2 (optional)" value={email2Draft} onChange={function(e){setEmail2Draft(e.target.value);}} onBlur={function(){saveContact("email2",email2Draft);}} />
                <input style={{...inp,marginBottom:4,fontSize:12}} placeholder="Address" value={addrDraft} onChange={function(e){setAddrDraft(e.target.value);}} onBlur={function(){saveContact("addr",addrDraft);}} />
                <input style={{...inp,fontSize:12,fontFamily:"monospace"}} placeholder="ZIP code (for local market numbers)" value={zipDraft} onChange={function(e){setZipDraft(e.target.value);}} onBlur={function(){saveContact("zip",zipDraft.trim());}} />
              </div>
              <div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}><Tag t={modal.type}>{modal.type}</Tag><Tag t={modal.temp}>{TICON[modal.temp]} {modal.temp}</Tag></div>
                <div style={{fontSize:11,color:C.t3,marginBottom:3}}>Source</div>
                <select style={{...inp,fontSize:12,marginBottom:6}} value={modal.source||""} onChange={function(e){ saveContact("source",e.target.value); }}>{SRCS.indexOf(modal.source)<0 && modal.source ? <option value={modal.source}>{modal.source}</option> : null}{SRCS.map(function(s){ return <option key={s} value={s}>{s}</option>; })}</select>
                <div style={{fontSize:12,color:C.t2}}>Timeline: {modal.timeline}</div>
                <div style={{fontSize:12,color:C.t2}}>Nurture: {NLBL[modal.nurture]||modal.nurture}</div>
                <div style={{fontSize:12,color:C.t2}}>Follow-up: {fmtDate(modal.fu)}</div>
                <div style={{fontSize:12,color:C.t2}}>Last contact: {modal.lc||"Never"}</div>
              </div>
            </Row>
            <div style={{margin:"8px 0"}}>
              <div style={{fontSize:11,color:C.t3,marginBottom:4,fontWeight:500}}>Notes</div>
              <textarea style={{...inp,minHeight:72,resize:"vertical",lineHeight:1.55,fontSize:13}} placeholder="Add notes about this lead…" value={noteDraft} onChange={function(e){ setNoteDraft(e.target.value); }} />
              {noteDraft!==(modal.notes||"") && (
                <Btn v="primary" style={{fontSize:11,marginTop:5}} onClick={function(){
                  setLeads(function(p){ return p.map(function(l){ return l.id===modal.id?{...l,notes:noteDraft}:l; }); });
                  setModal(function(m){ return {...m,notes:noteDraft}; });
                }}>Save notes</Btn>
              )}
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:C.t3,marginBottom:4}}>Type:</div>
              <div style={{display:"flex",gap:6}}>
                {["buyer","seller","both"].map(function(t){ var on=modal.type===t; return <Btn key={t} v={on?"primary":"def"} style={{fontSize:11}} onClick={function(){ setLeads(function(p){ return p.map(function(l){ return l.id===modal.id?{...l,type:t}:l; }); }); setModal(function(m){ return {...m,type:t}; }); }}>{t}</Btn>; })}
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:C.t3,marginBottom:4}}>Timeline:</div>
              <select style={{...inp,fontSize:12}} value={modal.timeline||""} onChange={function(e){ var v=e.target.value; setLeads(function(p){ return p.map(function(l){ return l.id===modal.id?{...l,timeline:v}:l; }); }); setModal(function(m){ return {...m,timeline:v}; }); }}>
                <option>ASAP / actively looking</option><option>0–3 months</option><option>3–6 months</option><option>6–12 months</option><option>12+ months</option><option>Just curious</option>
              </select>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:C.t3,marginBottom:4}}>Temperature:</div>
              <div style={{display:"flex",gap:6}}>
                {["hot","warm","cold"].map(function(t){ return <Btn key={t} style={{fontSize:11}} onClick={function(){ setLeads(function(p){ return p.map(function(l){ return l.id===modal.id?{...l,temp:t}:l; }); }); setModal(function(m){ return {...m,temp:t}; }); }}>{TICON[t]} {t}</Btn>; })}
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:C.t3,marginBottom:4}}>🔄 Auto-Nurture <span style={{color:C.t3}}>— auto-send market updates on a schedule</span>:</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[["off","Off"],["biweekly","Every 2 weeks"],["monthly","Monthly"]].map(function(o){
                  var on = (modal.autoNurture||"off")===o[0];
                  return <Btn key={o[0]} v={on?"primary":"def"} style={{fontSize:11}} onClick={function(){ setLeads(function(p){ return p.map(function(l){ return l.id===modal.id?{...l,autoNurture:o[0]}:l; }); }); setModal(function(m){ return {...m,autoNurture:o[0]}; }); }}>{o[1]}</Btn>;
                })}
              </div>
              {nurtureOn(modal) && <div style={{fontSize:11,color:C.t3,marginTop:4}}>{modal.lastNurtured?"Last sent "+fmtDate(modal.lastNurtured)+" · next due "+fmtDate(nurtureNext(modal)):"Due now — find it in Auto-Nurture →"}</div>}
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:C.t3,marginBottom:4}}>🔔 Follow-up alert <span style={{color:C.t3}}>— remind me to follow up on a specific day</span>:</div>
              <input style={{...inp,fontSize:12,marginBottom:5}} placeholder="Optional note — e.g. discuss pricing, send comps, check financing" value={fuNote} onChange={function(e){ setFuNote(e.target.value); }} />
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <input type="date" style={{...inp,width:150,fontSize:12}} value={fuDraft} onChange={function(e){ setFuDraft(e.target.value); }} />
                <select style={{...inp,width:115,fontSize:12}} value={fuRepeat} onChange={function(e){ setFuRepeat(e.target.value); }} title="Repeat"><option value="none">One-time</option><option value="weekly">Repeat weekly</option><option value="monthly">Repeat monthly</option></select>
                <Btn v="primary" style={{fontSize:11}} onClick={setFollowAlert}>Set alert</Btn>
                {modal.fu && <span style={{fontSize:11,color:modal.fu<=toDay()?C.ro:C.t3}}>Currently: {fmtDate(modal.fu)}</span>}
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:C.t3,marginBottom:6}}>Action Plan</div>
              {enrolled.filter(function(e){ return e.leadId===modal.id; }).length===0
                ? <div style={{fontSize:12,color:C.t3,marginBottom:6}}>Not enrolled in any plan.</div>
                : enrolled.filter(function(e){ return e.leadId===modal.id; }).map(function(e){
                    var ap = ACTION_PLANS[e.plan];
                    if (!ap) return null;
                    var pct = ap ? Math.round(e.done.length/ap.steps.length*100) : 0;
                    return (
                      <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,background:ap.colorL,border:"1px solid "+ap.colorB,borderRadius:7,padding:"6px 10px"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:600,color:ap.color}}>{ap.label}</div>
                          <div style={{fontSize:11,color:C.t3}}>{e.done.length}/{ap.steps.length} steps · {pct}%</div>
                        </div>
                        <Btn v="rose" style={{fontSize:10,padding:"2px 7px"}} onClick={function(){ setEnrolled(function(p){ return p.filter(function(x){ return x.id!==e.id; }); }); }}>✕ Remove</Btn>
                      </div>

                  setEnrolled(function(p){ return [...p,{id:uid(),leadId:modal.id,plan:modalPlan,planLabel:ap.label,name:modal.first+" "+modal.last,enrolled:toDay(),step:0,done:[]}]; });

              <Btn v="gold" onClick={function(){ draftMsgAI(modal); }}>✨ AI draft</Btn>
              <Btn v="sky" onClick={function(){ draftMarketAI(modal); }}>📊 Market update</Btn>

                  </span>
                : <Btn v="sky" onClick={function(){ draftListingAI(modal); }} title="Tip: save a home in My Listings to auto-fill the details">🏡 New listing</Btn>
              }
              <Btn v="gold" onClick={function(){ setLeads(function(p){ return p.map(function(l){ return l.id===modal.id?{...l,lc:toDay(),log:[...(l.log||[]),toDay()+" — contact logged"]}:l; }); }); setModal(function(m){ return {...m,lc:toDay()}; }); }}>Log contact</Btn>
              <Btn v="sky" onClick={function(){ addToPipeline(); }}>➕ Add to Pipeline</Btn>
              <Btn v="sky" onClick={function(){ syncOneFub(modal); }}>{modal.fubId?"⟳ Update in FUB":"⟳ Push to FUB"}</Btn>
              {confirmDelete
                ? <span style={{display:"inline-flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:11,color:C.ro}}>Delete?</span>
                    <Btn v="rose" style={{fontSize:10,padding:"3px 8px"}} onClick={function(){ if(dismissLead) dismissLead(modal); setLeads(function(p){ return p.filter(function(l){ return l.id!==modal.id; }); }); setModal(null); setConfirmDelete(false); }}>Yes, delete</Btn>
                    <Btn style={{fontSize:10,padding:"3px 8px"}} onClick={function(){ setConfirmDelete(false); }}>Cancel</Btn>
                  </span>
                : <Btn v="rose" onClick={function(){ setConfirmDelete(true); }}>Delete</Btn>
              }
            </div>
            <AIBox text={aiTxt} loading={aiLd} />
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginTop:8,borderTop:"1px solid "+C.br,paddingTop:10}}>
              <Btn v="primary" onClick={function(){ doGmail(modal); }}>📧 Email via Gmail</Btn>
              <Btn v="sky" onClick={function(){ doText(modal); }}>💬 Text</Btn>

            </div>

    </div>

}

/* ── ADD LEAD ────────────────────────────────────────────────── */
function PanelAddLead({addLead,setTab}) {
  var blank = {first:"",last:"",phone:"",phone2:"",email:"",email2:"",addr:"",zip:"",type:"buyer",temp:"warm",source:"Zillow",nurture:"active",timeline:"0–3 months",fdays:3,notes:"",autoNurture:"off",lastNurtured:null};
  var [form,setForm] = useState(blank); var [st,setSt] = useState(""); var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function save(withAI) {
    if (!form.first.trim()||!form.last.trim()) { setSt("First and last name required."); return; }
    var fd = new Date(); fd.setDate(fd.getDate()+Number(form.fdays||3));
    var lead = {id:uid(),...form,added:toDay(),fu:fd.toISOString().split("T")[0],lc:null,log:[]};
    addLead(lead);
    setSt("Saved. Follow-up: "+fmtDate(lead.fu));
    if (withAI) { setAL(true); callAI("Write a short warm first-contact "+(form.type==="seller"?"text":"email")+" from "+AGENT.name+" ("+AGENT.co+") to "+form.first+", a new "+form.type+" lead from "+form.source+". Under 60 words, warm, ends with easy question.").then(function(t){ setAT(t); setAL(false); }); }
    setForm(blank);
  }
  var SRCS = "Zillow,Realtor.com,Referral,Sphere,Open House,Cold Call,Social Media,Other".split(",");
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Add Lead</div>
      <Card title="Contact Info">
        <Row cols="1fr 1fr 1fr">
          <Fld label="First Name *"><input style={inp} placeholder="Jane" value={form.first} onChange={fld("first")} /></Fld>
          <Fld label="Last Name *"><input style={inp} placeholder="Smith" value={form.last} onChange={fld("last")} /></Fld>
          <Fld label="Phone"><input style={inp} placeholder="707-555-0100" value={form.phone} onChange={fld("phone")} /></Fld>
        </Row>
        <Row cols="1fr 1fr 1fr">
          <Fld label="Phone 2"><input style={inp} placeholder="(optional)" value={form.phone2} onChange={fld("phone2")} /></Fld>
          <Fld label="Email"><input style={inp} type="email" placeholder="jane@email.com" value={form.email} onChange={fld("email")} /></Fld>
          <Fld label="Email 2"><input style={inp} type="email" placeholder="(optional)" value={form.email2} onChange={fld("email2")} /></Fld>
        </Row>
        <Row cols="2fr 1fr">
          <Fld label="Address"><input style={inp} placeholder="123 Main St, Santa Rosa" value={form.addr} onChange={fld("addr")} /></Fld>
          <Fld label="ZIP code"><input style={inp} placeholder="95403" value={form.zip} onChange={fld("zip")} /></Fld>
        </Row>
      </Card>
      <Card title="Classification">
        <Row cols="1fr 1fr 1fr 1fr">
          <Fld label="Type"><select style={inp} value={form.type} onChange={fld("type")}><option value="buyer">Buyer</option><option value="seller">Seller</option><option value="both">Both</option></select></Fld>
          <Fld label="Temperature"><select style={inp} value={form.temp} onChange={fld("temp")}><option value="hot">Hot</option><option value="warm">Warm</option><option value="cold">Cold</option></select></Fld>
          <Fld label="Source"><select style={inp} value={form.source} onChange={fld("source")}>{SRCS.map(function(s){ return <option key={s}>{s}</option>; })}</select></Fld>
          <Fld label="Nurture"><select style={inp} value={form.nurture} onChange={fld("nurture")}><option value="active">Active</option><option value="long-term">Long-term</option><option value="drip">Drip</option><option value="monthly">Monthly</option><option value="quarterly">Quarterly</option><option value="none">None</option></select></Fld>
        </Row>
        <Row>
          <Fld label="Timeline"><select style={inp} value={form.timeline} onChange={fld("timeline")}><option>ASAP / actively looking</option><option>0–3 months</option><option>3–6 months</option><option>6–12 months</option><option>12+ months</option><option>Just curious</option></select></Fld>
          <Fld label="Follow-up in (days)"><input style={inp} type="number" value={form.fdays} onChange={fld("fdays")} min="1" /></Fld>
        </Row>
        <Fld label="Notes"><textarea style={{...inp,minHeight:70,resize:"vertical",lineHeight:1.5}} placeholder="Pre-approved $750k, wants 3bd NE Santa Rosa…" value={form.notes} onChange={fld("notes")} /></Fld>
      </Card>
      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
        <Btn v="primary" onClick={function(){ save(false); }}>Save Lead</Btn>
        <Btn v="gold" onClick={function(){ save(true); }}>✨ Save + AI Welcome</Btn>
        <Btn onClick={function(){ setForm(blank); }}>Clear</Btn>
      </div>
      {st && <div style={{fontSize:12,color:C.ac,marginTop:5}}>{st}</div>}
      <AIBox text={aiTxt} loading={aiLd} />
    </div>
  );
}

/* ── FOLLOW-UP QUEUE ─────────────────────────────────────────── */
function PanelQueue({leads,setTab,setFocusLead}) {
  function openLead(l){ if(setFocusLead) setFocusLead(l.id); setTab("leads"); }
  var [activeTab,setAT] = useState("due");
  var td = toDay();
  var list = leads.filter(function(l){
    if (activeTab==="due") return l.fu && l.fu<=td;
    if (activeTab==="hot") return l.temp==="hot";
    if (activeTab==="nc") return !l.lc;
    return true;
  });
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Follow-Up Queue</div>
      <div style={{display:"flex",borderBottom:"1px solid "+C.br,marginBottom:12}}>
        {[["due","Due Today"],["hot","Hot"],["nc","No Contact"],["all","All"]].map(function(x){
          return <div key={x[0]} style={{padding:"7px 14px",fontSize:12.5,fontWeight:500,cursor:"pointer",color:activeTab===x[0]?C.ac:C.t3,borderBottom:"2px solid "+(activeTab===x[0]?C.ac:"transparent"),marginBottom:-1}} onClick={function(){ setAT(x[0]); }}>{x[1]}</div>;
        })}
      </div>
      {list.length===0 ? <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:20}}>No leads here.</div></Card> : list.map(function(l){
        return (
          <div key={l.id} style={{background:C.sur,border:"1px solid "+C.br,borderRadius:10,padding:"11px 13px",marginBottom:8,display:"flex",alignItems:"flex-start",gap:12}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:C.aL,display:"flex",alignItems:"center",justifyContent:"center",color:C.ac,fontSize:12,fontWeight:700,flexShrink:0}}>{l.first[0]}{l.last[0]}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:2}}><span style={{fontWeight:600,color:C.ac,cursor:"pointer"}} title="Click to view & edit" onClick={function(){ openLead(l); }}>{l.first} {l.last}</span><Tag t={l.type}>{l.type}</Tag><Tag t={l.temp}>{TICON[l.temp]} {l.temp}</Tag></div>
              <div style={{fontSize:12,color:C.t3}}>{l.source} · {l.timeline} · Due: {fmtDate(l.fu)}</div>
              <div style={{fontSize:12,color:C.t2,marginTop:2}}>{l.notes ? l.notes.slice(0,120)+(l.notes.length>120?"…":"") : "No notes"}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Btn v="sky" onClick={function(){ openLead(l); }} style={{fontSize:10,padding:"4px 8px"}}>View / Edit</Btn>
              <Btn onClick={function(){ openLead(l); }} style={{fontSize:10,padding:"4px 8px"}}>✨ Draft</Btn>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── PIPELINE ────────────────────────────────────────────────── */
function PanelPipeline({deals,setDeals,setAct,leads}) {
  var [show,setShow] = useState(false);
  var [form,setForm] = useState({addr:"",client:"",type:"Listing",price:"",closeDate:"",leadId:""});
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function pickLead(e){
    var id = e.target.value;
    var L = (leads||[]).find(function(x){ return x.id===id; });
    setForm(function(p){
      if(!L) return {...p,leadId:""};
      return {...p, leadId:id, client:L.first+" "+L.last, addr:L.addr||p.addr, type:(L.type==="seller"?"Listing":"Buyer")};
    });
  }
  function save() {
    if (!form.addr||!form.client) return;
    setDeals(function(p){ return [...p,{id:uid(),...form,price:Number(form.price)||0,stage:0}]; });
    setAct(function(p){ return {...p,listings:p.listings+1}; });
    setForm({addr:"",client:"",type:"Listing",price:"",closeDate:"",leadId:""}); setShow(false);
  }
  function setStage(id,st) {
    setDeals(function(p){ return p.map(function(d){ return d.id===id?{...d,stage:st}:d; }); });
    if (st===4) setAct(function(p){ return {...p,closed:p.closed+1}; });
  }
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Deal Pipeline</div>
      <Btn v="primary" onClick={function(){ setShow(function(p){ return !p; }); }} style={{marginBottom:10}}>+ {show?"Cancel":"Add Deal"}</Btn>
      {show && (
        <Card>
          <Fld label="Link to lead (optional — auto-fills client, address & type)"><select style={inp} value={form.leadId} onChange={pickLead}><option value="">— none —</option>{(leads||[]).map(function(l){ return <option key={l.id} value={l.id}>{l.first} {l.last} ({l.type})</option>; })}</select></Fld>
          <Row><Fld label="Address"><input style={inp} placeholder="456 Oak St, Santa Rosa" value={form.addr} onChange={fld("addr")} /></Fld><Fld label="Client"><input style={inp} placeholder="Dennis Spero" value={form.client} onChange={fld("client")} /></Fld></Row>
          <Row cols="1fr 1fr 1fr">
            <Fld label="Type"><select style={inp} value={form.type} onChange={fld("type")}><option>Listing</option><option>Buyer</option></select></Fld>
            <Fld label="Price ($)"><input style={inp} type="number" placeholder="715000" value={form.price} onChange={fld("price")} /></Fld>
            <Fld label="Est. close"><input style={inp} type="date" value={form.closeDate} onChange={fld("closeDate")} /></Fld>
          </Row>
          <Btn v="primary" onClick={save}>Add Deal</Btn>
        </Card>
      )}
      {deals.length===0 ? <div style={{color:C.t3,fontSize:13,marginTop:10}}>No deals yet.</div> : deals.map(function(d){
        return (
          <Card key={d.id} style={{marginTop:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{d.addr}</div><div style={{fontSize:12,color:C.t2}}>{d.client} · {d.type}{d.price?" · "+fmtMoney(d.price):""}{d.closeDate?" · Est. close "+fmtDate(d.closeDate):""}</div></div>
              <Tag t="warm">{DSTAGES[d.stage]}</Tag>
            </div>
            <div style={{display:"flex",gap:4}}>
              {DSTAGES.map(function(s,si){
                return <div key={si} style={{flex:1,textAlign:"center",padding:"5px 2px",fontSize:11,borderRadius:6,cursor:"pointer",fontWeight:si===d.stage?600:400,background:si<d.stage?C.aL:si===d.stage?C.gL:C.s2,border:"1px solid "+(si<d.stage?C.aB:si===d.stage?C.gB:C.br),color:si<d.stage?C.ac:si===d.stage?C.go:C.t3}} onClick={function(){ setStage(d.id,si); }}>{s}</div>;
              })}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

function PanelActionPlans({leads,enrolled,setEnrolled}) {
  var [plan, setPlan] = useState("newLead");
  var [selLead, setSelLead] = useState("");
  var [aiTxt, setAT] = useState("");
  var [aiLd, setAL] = useState(false);
  var [expandedStep, setExpandedStep] = useState(null);
  var [customizing, setCustomizing] = useState(null);
  var [customText, setCustomText] = useState("");

  var current = ACTION_PLANS[plan];

  function enroll() {
    if (!selLead) return;
    var lead = leads.find(function(l){ return l.id === selLead; });
    if (!lead) return;
    var existing = enrolled.find(function(e){ return e.leadId === selLead && e.plan === plan; });
    if (existing) return;
    setEnrolled(function(p){ return [...p, {id:uid(), leadId:selLead, plan:plan, planLabel:current.label, name:lead.first+" "+lead.last, enrolled:toDay(), step:0, done:[]}]; });
    setSelLead("");
  }

  function markStep(enrollId, stepIdx) {
    setEnrolled(function(p){ return p.map(function(e){
      if (e.id !== enrollId) return e;
      var done = e.done.includes(stepIdx) ? e.done.filter(function(d){ return d !== stepIdx; }) : [...e.done, stepIdx];
      var step = Math.min(current.steps.length - 1, done.length);
      return {...e, done:done, step:step};
    }); });
  }

  function removeEnroll(id) {
    setEnrolled(function(p){ return p.filter(function(e){ return e.id !== id; }); });
  }

  function generateAI(stepScript, leadName) {
    setAL(true);
    callAI("Personalize this real estate follow-up message for " + (leadName||"a Sonoma County lead") + ". Keep the same structure and length but make it feel more personal and specific to Sonoma County. Message: " + stepScript).then(function(t){ setAT(t); setAL(false); });
  }

  var planKeys = Object.keys(ACTION_PLANS);
  var enrolledForPlan = enrolled.filter(function(e){ return e.plan === plan; });

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Action Plans</div>
      <div style={{fontSize:13,color:C.t2,marginBottom:14}}>Marketing automation sequences for your leads — enroll a contact and track every touchpoint.</div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {planKeys.map(function(key){
          var p = ACTION_PLANS[key];
          var active = plan === key;
          return (
            <div key={key} onClick={function(){ setPlan(key); setExpandedStep(null); setAT(""); }} style={{padding:"8px 14px",borderRadius:8,cursor:"pointer",border:"1px solid "+(active?p.colorB:C.br),background:active?p.colorL:C.sur,color:active?p.color:C.t2,fontWeight:active?600:400,fontSize:12,transition:"all .12s"}}>
              {p.label}
            </div>
          );
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <Card style={{borderTop:"3px solid "+current.color}}>
            <div style={{fontSize:14,fontWeight:700,color:current.color,marginBottom:4}}>{current.label}</div>
            <div style={{fontSize:12,color:C.t2,marginBottom:14}}>{current.desc}</div>

            {current.steps.map(function(step, i){
              var isOpen = expandedStep === i;
              var isCustom = customizing === i;
              return (
                <div key={i} style={{borderBottom:"1px solid "+C.br,paddingBottom:10,marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={function(){ setExpandedStep(isOpen ? null : i); setAT(""); }}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:current.colorL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{step.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:current.color,background:current.colorL,padding:"1px 7px",borderRadius:20,border:"1px solid "+current.colorB}}>{step.day}</span>
                        <span style={{fontSize:10,color:C.t3,fontWeight:500}}>{step.type}</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:500,color:C.tx,marginTop:2}}>{step.title}</div>
                    </div>
                    <div style={{fontSize:11,color:C.t3}}>{isOpen ? "▲" : "▼"}</div>
                  </div>
                  {isOpen && (
                    <div style={{marginTop:10,marginLeft:38}}>
                      {isCustom ? (
                        <div>
                          <textarea style={{...inp,minHeight:120,resize:"vertical",lineHeight:1.6,fontSize:12}} value={customText} onChange={function(e){ setCustomText(e.target.value); }} />
                          <div style={{display:"flex",gap:6,marginTop:6}}>
                            <Btn v="primary" style={{fontSize:11}} onClick={function(){ setCustomizing(null); }}>Save</Btn>
                            <Btn style={{fontSize:11}} onClick={function(){ setCustomizing(null); }}>Cancel</Btn>
                          </div>
                        </div>
                      ) : (
                        <div style={{background:C.s2,borderRadius:7,padding:"10px 12px",fontSize:12,lineHeight:1.7,color:C.tx,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>
                          {step.script}
                        </div>
                      )}
                      {!isCustom && (
                        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                          <Btn style={{fontSize:11}} onClick={function(){ setCustomizing(i); setCustomText(step.script); }}>✏️ Customize</Btn>
                          <Btn v="gold" style={{fontSize:11}} onClick={function(){ generateAI(step.script, selLead ? (leads.find(function(l){ return l.id===selLead; })||{}).first : ""); }}>✨ AI personalize</Btn>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
            <AIBox text={aiTxt} loading={aiLd} />
          </Card>
        </div>

        <div>
          <Card title="Enroll a Lead">
            <Fld label="Select lead">
              <select style={inp} value={selLead} onChange={function(e){ setSelLead(e.target.value); }}>
                <option value="">— choose a lead —</option>
                {leads.map(function(l){ return <option key={l.id} value={l.id}>{l.first} {l.last} · {l.type} · {TICON[l.temp]}</option>; })}
              </select>
            </Fld>
            <div style={{fontSize:12,color:C.t3,margin:"6px 0 10px"}}>Plan: <span style={{color:current.color,fontWeight:600}}>{current.label}</span> · {current.steps.length} touchpoints</div>
            <Btn v="primary" onClick={enroll}>+ Enroll in Plan</Btn>
          </Card>

          <Card title={"Enrolled Contacts (" + enrolledForPlan.length + ")"}>
            {enrolledForPlan.length === 0 ? (
              <div style={{color:C.t3,fontSize:13}}>No contacts enrolled in this plan yet.</div>
            ) : enrolledForPlan.map(function(e){
              var pct = Math.round(e.done.length / current.steps.length * 100);
              var stepsDone = e.done.length;
              var stepsLeft = current.steps.length - stepsDone;
              return (
                <div key={e.id} style={{borderBottom:"1px solid "+C.br,paddingBottom:12,marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <div style={{width:30,height:30,borderRadius:"50%",background:current.colorL,display:"flex",alignItems:"center",justifyContent:"center",color:current.color,fontSize:11,fontWeight:700,flexShrink:0}}>{e.name.split(" ").map(function(n){ return n[0]; }).join("").slice(0,2)}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{e.name}</div>
                      <div style={{fontSize:11,color:C.t3}}>Enrolled {fmtDate(e.enrolled)} · {stepsDone}/{current.steps.length} steps done</div>
                    </div>
                    <Btn v="rose" style={{fontSize:10,padding:"3px 7px"}} onClick={function(){ removeEnroll(e.id); }}>✕</Btn>
                  </div>
                  <div style={{height:5,background:C.s3,borderRadius:3,overflow:"hidden",marginBottom:8}}>
                    <div style={{height:"100%",background:current.color,borderRadius:3,width:pct+"%",transition:"width .3s"}} />
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
                    {current.steps.map(function(step, i){
                      var done = e.done.includes(i);
                      return (
                        <div key={i} onClick={function(){ markStep(e.id, i); }} style={{padding:"5px 6px",borderRadius:6,cursor:"pointer",border:"1px solid "+(done?current.colorB:C.br),background:done?current.colorL:C.s2,fontSize:10,textAlign:"center",color:done?current.color:C.t3,fontWeight:done?600:400,lineHeight:1.3}}>
                          {done ? "✓ " : ""}{step.day}<br/><span style={{fontSize:9}}>{step.type}</span>
                        </div>
                      );
                    })}
                  </div>
                  {stepsLeft > 0 && (
                    <div style={{marginTop:8,fontSize:12,color:C.t2,background:C.s2,borderRadius:6,padding:"6px 8px"}}>
                      Next: <span style={{fontWeight:600,color:current.color}}>{current.steps[e.done.length] ? current.steps[e.done.length].day+" — "+current.steps[e.done.length].title : "All done!"}</span>
                    </div>
                  )}
                  {stepsLeft === 0 && (
                    <div style={{marginTop:8,fontSize:12,color:C.ac,background:C.aL,borderRadius:6,padding:"6px 8px",fontWeight:600}}>
                      Plan complete! Move this lead to long-term nurture.
                    </div>
                  )}
                </div>
              );
            })}
          </Card>

          <Card title="Plan Summary">
            <div style={{fontSize:12,color:C.t2,marginBottom:8}}>All active enrollments across all plans</div>
            {enrolled.length === 0 ? <div style={{color:C.t3,fontSize:13}}>No active enrollments.</div> : enrolled.map(function(e){
              var ap = ACTION_PLANS[e.plan];
              if (!ap) return null;
              var pct = Math.round(e.done.length / ap.steps.length * 100);
              return (
                <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid "+C.br}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500}}>{e.name}</div>
                    <div style={{fontSize:11,color:C.t3}}>{ap.label.split("—")[0].trim()}</div>
                  </div>
                  <div style={{width:60,height:5,background:C.s3,borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",background:ap.color,borderRadius:3,width:pct+"%"}} />
                  </div>
                  <div style={{fontSize:11,color:C.t3,fontFamily:"monospace",minWidth:30}}>{pct}%</div>
                </div>
              );
            })}
          </Card>
        </div>
      </div>
    </div>
  );
}
