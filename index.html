/* ── NET SHEET ───────────────────────────────────────────────── */
function PanelNet({leads,setLeads}) {
  var DEF = {price:715000,loan:380000,lc:2.5,bc:2.5,commMode:"gross",cityTax:0,propTax:0,conc:0,concMode:"pct",closing:3500,repairs:0,misc:0,other:0};
  var [v,setV] = useState(DEF);
  var [parties,setParties] = useState([]);
  var [leadId,setLeadId] = useState("");
  var [saveMsg,setSaveMsg] = useState("");
  function upd(k){ return function(e){ setV(function(p){ return {...p,[k]:Number(e.target.value)||0}; }); }; }
  function pickLead(e){
    var id=e.target.value; setLeadId(id); setSaveMsg("");
    var L=(leads||[]).find(function(x){ return x.id===id; });
    if(L && L.netSheet){ setV(L.netSheet); setParties(L.netSheet.parties||[]); setSaveMsg("📂 Loaded "+L.first+"'s saved net sheet"+(L.netSheetDate?" ("+fmtDate(L.netSheetDate)+")":"")+"."); }
  }
  function saveToLead(){
    if(!leadId){ setSaveMsg("Pick a lead above to save to."); return; }
    var sheet = {...v, parties:parties};
    setLeads(function(p){ return p.map(function(l){ return l.id===leadId?{...l,netSheet:sheet,netSheetDate:toDay()}:l; }); });
    var L=(leads||[]).find(function(x){ return x.id===leadId; });
    setSaveMsg("✓ Saved to "+(L?L.first+" "+L.last:"lead")+".");
  }
  var sellers = (leads||[]).filter(function(l){ return l.type==="seller"||l.type==="both"; });
  var curLead = (leads||[]).find(function(x){ return x.id===leadId; });
  function resetSheet(){ setV(DEF); setParties([]); setSaveMsg("Reset to a blank sheet — change values and Save to overwrite."); }
  function addParty(){ setParties(function(p){ return [...p,{name:"",pct:""}]; }); }
  function partyFld(i,k){ return function(e){ var val=e.target.value; setParties(function(p){ return p.map(function(c,j){ return j===i?{...c,[k]:val}:c; }); }); }; }
  function delParty(i){ setParties(function(p){ return p.filter(function(c,j){ return j!==i; }); }); }
  var totalPct = parties.reduce(function(a,c){ return a+(Number(c.pct)||0); },0);
  var tax=Math.round(v.price/1000)*1.10;
  var conc = (v.concMode==="amt") ? (Number(v.conc)||0) : (v.price*(Number(v.conc)||0)/100);
  var commBase = (v.commMode==="net") ? (v.price - conc) : v.price;   // commission on gross sale price, or net of concession
  var lc=v.lc/100*commBase, bc=v.bc/100*commBase;
  var cityTaxAmt = v.price*(Number(v.cityTax)||0)/100;
  var net = v.price - v.loan - lc - bc - tax - cityTaxAmt - (Number(v.propTax)||0) - conc - (Number(v.closing)||0) - v.repairs - (Number(v.misc)||0) - v.other;
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var rows = [["Sale price",fmtMoney(v.price),false],["Loan balance / payoff","− "+fmtMoney(v.loan),true],["Seller commission ("+v.lc+"% of "+(v.commMode==="net"?"net":"gross")+")","− "+fmtMoney(Math.round(lc)),true],["Buyer commission ("+v.bc+"% of "+(v.commMode==="net"?"net":"gross")+")","− "+fmtMoney(Math.round(bc)),true],["County transfer tax ($1.10/$1k)","− "+fmtMoney(Math.round(tax)),true],["City transfer tax ("+(v.cityTax||0)+"%)","− "+fmtMoney(Math.round(cityTaxAmt)),true],["Property tax (proration)","− "+fmtMoney(Number(v.propTax)||0),true],["Seller concession"+(v.concMode==="pct"?" ("+(v.conc||0)+"%)":""),"− "+fmtMoney(Math.round(conc)),true],["Closing costs","− "+fmtMoney(Number(v.closing)||0),true],["Repairs","− "+fmtMoney(v.repairs),true],["Misc","− "+fmtMoney(Number(v.misc)||0),true],["Other","− "+fmtMoney(v.other),true]];
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:10}}>Seller's Net Sheet</div>
      <Card style={{marginBottom:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:C.t3}}>Net sheet for:</span>
          <select style={{...inp,width:210,fontSize:12}} value={leadId} onChange={pickLead}><option value="">— select a seller —</option>{sellers.map(function(l){ return <option key={l.id} value={l.id}>{l.first} {l.last}{l.netSheet?" 💾":""}</option>; })}</select>
          <Btn v="primary" style={{fontSize:11}} onClick={saveToLead}>{curLead&&curLead.netSheet?"💾 Update saved net sheet":"💾 Save to lead"}</Btn>
          {curLead&&curLead.netSheet && <Btn style={{fontSize:11}} onClick={resetSheet}>Reset</Btn>}
          {saveMsg && <span style={{fontSize:11,color:C.ac}}>{saveMsg}</span>}
        </div>
        {curLead&&curLead.netSheet && <div style={{fontSize:11,color:C.t3,marginTop:6}}>📂 Editing {curLead.first}'s saved net sheet — change any field below and tap <b>Update</b> to overwrite it.</div>}
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Card title="Deal Details">
          <Row><Fld label="Sale price ($)"><input style={inp} type="number" value={v.price} onChange={upd("price")} /></Fld><Fld label="Loan balance / payoff ($)"><input style={inp} type="number" value={v.loan} onChange={upd("loan")} /></Fld></Row>
          <Row><Fld label="Seller comm (%)"><input style={inp} type="number" step=".1" value={v.lc} onChange={upd("lc")} /></Fld><Fld label="Buyer comm (%)"><input style={inp} type="number" step=".1" value={v.bc} onChange={upd("bc")} /></Fld></Row>
          <Row><Fld label="Commission based on"><select style={inp} value={v.commMode} onChange={function(e){ var m=e.target.value; setV(function(p){ return {...p,commMode:m}; }); }}><option value="gross">Gross (sale price)</option><option value="net">Net (price − concession)</option></select></Fld><Fld label=""><span/></Fld></Row>
          <Row><Fld label="City transfer tax (%)"><input style={inp} type="number" step="any" value={v.cityTax} onChange={upd("cityTax")} /></Fld><Fld label="Property tax proration ($)"><input style={inp} type="number" value={v.propTax} onChange={upd("propTax")} /></Fld></Row>
          <Row><Fld label={"Seller concession ("+(v.concMode==="amt"?"$":"%")+")"}><input style={inp} type="number" step="any" value={v.conc} onChange={upd("conc")} /></Fld><Fld label="Concession type"><select style={inp} value={v.concMode} onChange={function(e){ var m=e.target.value; setV(function(p){ return {...p,concMode:m}; }); }}><option value="pct">% of price</option><option value="amt">$ amount</option></select></Fld></Row>
          <Row><Fld label="Closing costs ($)"><input style={inp} type="number" value={v.closing} onChange={upd("closing")} /></Fld><Fld label="Repairs ($)"><input style={inp} type="number" value={v.repairs} onChange={upd("repairs")} /></Fld></Row>
          <Row><Fld label="Misc ($)"><input style={inp} type="number" value={v.misc} onChange={upd("misc")} /></Fld><Fld label="Other ($)"><input style={inp} type="number" value={v.other} onChange={upd("other")} /></Fld></Row>
        </Card>
        <Card title="Net Proceeds">
          {rows.map(function(x){ return <div key={x[0]} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+C.br,fontSize:13}}><span style={{color:C.t2}}>{x[0]}</span><span style={{fontWeight:500,color:x[2]?C.ro:C.tx}}>{x[1]}</span></div>; })}
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",marginTop:4,borderTop:"2px solid "+C.brm,fontSize:15,fontWeight:700}}><span>Est. Net Proceeds</span><span style={{color:C.ac}}>{fmtMoney(Math.round(net))}</span></div>
          <Btn v="gold" onClick={function(){ setAL(true); callAI("Explain this seller net sheet in plain language: Sale price "+fmtMoney(v.price)+", loan payoff "+fmtMoney(v.loan)+", commissions "+fmtMoney(Math.round(lc+bc))+", transfer taxes "+fmtMoney(Math.round(tax)+Math.round(cityTaxAmt))+", closing costs "+fmtMoney(Number(v.closing)||0)+", concession "+fmtMoney(Math.round(conc))+", repairs/misc/other "+fmtMoney(v.repairs+(Number(v.misc)||0)+v.other)+", net "+fmtMoney(Math.round(net))+". Warm, clear, under 120 words.").then(function(t){ setAT(t); setAL(false); }); }} style={{marginTop:8}}>✨ Explain to seller</Btn>
          <AIBox text={aiTxt} loading={aiLd} />
        </Card>
      </div>
      <Card title="Ownership Interests — split the net" style={{marginTop:10}}>
        <div style={{fontSize:11,color:C.t3,marginBottom:8,lineHeight:1.5}}>If more than one person has an interest in the property (co-owners, heirs, divorcing parties, partners), add each one and their ownership %. The net proceeds split accordingly.</div>
        {parties.map(function(c,i){
          var share = Math.round(net * (Number(c.pct)||0)/100);
          return <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
            <input style={{...inp,flex:2,minWidth:130,fontSize:12}} placeholder="Owner / party name" value={c.name} onChange={partyFld(i,"name")} />
            <input style={{...inp,width:72,fontSize:12}} type="number" step="any" placeholder="%" value={c.pct} onChange={partyFld(i,"pct")} />
            <span style={{fontSize:14,fontWeight:700,color:C.ac,minWidth:100}}>{fmtMoney(share)}</span>
            <span style={{color:C.ro,cursor:"pointer",fontSize:13}} onClick={function(){ delParty(i); }}>✕</span>
          </div>;
        })}
        <div style={{display:"flex",gap:12,alignItems:"center",marginTop:4,flexWrap:"wrap"}}>
          <Btn style={{fontSize:11}} onClick={addParty}>+ Add owner / interest</Btn>
          {parties.length>0 && <span style={{fontSize:12,color:totalPct===100?C.ac:C.ro,fontWeight:600}}>Total interest: {totalPct}%{totalPct===100?" ✓":" — should equal 100%"}</span>}
          {parties.length>0 && <span style={{fontSize:11,color:C.t3}}>Net to split: {fmtMoney(Math.round(net))}</span>}
        </div>
      </Card>
    </div>
  );
}

/* ── BUYER NET SHEET ─────────────────────────────────────────── */
function PanelBuyerNet({leads,setLeads}) {

  var credits = (Number(v.earnest)||0)+(Number(v.sellerCredit)||0);

  var cashToClose = down + costs - credits;

// Commission math for one transaction: gross commission and the agent's net payout after split.
function txCommission(tx){
  var comm = Number(tx.comm)||2.5;
  var split = (tx.split===0||tx.split) ? Number(tx.split) : 80;
  var basis = tx.basis==="net" ? "net" : "gross";
  var base = (basis==="net" && Number(tx.netPrice)>0) ? Number(tx.netPrice) : (Number(tx.price)||0);
  var grossComm = base ? Math.round(base*comm/100) : 0;
  var coSplit = Number(tx.coSplit)||0;                  // % of gross commission to another agent/referral, off the top
  var coAmt = Math.round(grossComm*coSplit/100);
  var afterCo = grossComm - coAmt;                       // your share of gross before brokerage split
  var calcNet = Math.round(afterCo*split/100);          // payout after brokerage split
  var hasOverride = (tx.payout!==undefined && tx.payout!==null && tx.payout!=="");  // manual payout entered
  var netComm = hasOverride ? Number(tx.payout) : calcNet;
  return { base:base, basis:basis, comm:comm, split:split, grossComm:grossComm, coSplit:coSplit, coAmt:coAmt, afterCo:afterCo, calcNet:calcNet, netComm:netComm, overridden:hasOverride };
}

/* ── LISTING PRESENTATION ────────────────────────────────────── */
function PanelListing({leads}) {
  var [form,setForm] = useState({addr:"",zip:"",client:"",leadId:"",beds:"",baths:"",sqft:"",features:""});
  var [comps,setComps] = useState([]);
  var [checks,setChecks] = useState(LPCKLIST.map(function(){ return false; }));
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var [ref,setRef] = useState(null); var [refBusy,setRefBusy] = useState(false);
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function tog(i){ setChecks(function(p){ return p.map(function(v,j){ return j===i?!v:v; }); }); }
  var done = checks.filter(Boolean).length;

  var sellers = (leads||[]).filter(function(l){ return l.type==="seller"||l.type==="both"; });
  function pickClient(e){
    var id=e.target.value; var L=(leads||[]).find(function(x){ return x.id===id; });
    setForm(function(p){ if(!L) return {...p,leadId:""}; return {...p, leadId:id, client:L.first+" "+L.last, addr:L.addr||p.addr, zip:(L.zip||p.zip||"")}; });
  }

  /* Pull subject reference data: PropertyRadar AVM + ZIP market numbers */
  function pullRef(){
    setRefBusy(true);
    var street=((form.addr||"").split(",")[0]||"").trim();
    var city=((form.addr||"").split(",")[1]||"").trim();
    var zipGuess = form.zip || ((form.addr||"").match(/\b(\d{5})\b/)||[])[1] || "";
    var h = { headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY} };
    var hvP = street ? fetch(SUPABASE_URL+"/functions/v1/homevalue?street="+encodeURIComponent(street)+"&city="+encodeURIComponent(city)+"&zip="+encodeURIComponent(zipGuess)+"&state=CA",h).then(function(r){return r.json();}).catch(function(){return null;}) : Promise.resolve(null);
    hvP.then(function(hv){
      hv = (hv && hv.value && !hv.error) ? hv : null;
      var zip = (hv && hv.zip) || zipGuess;   // use PropertyRadar's ZIP → neighborhood-specific market, not county
      if(hv){ setForm(function(p){ return {...p, zip:(p.zip||zip||""), beds:(p.beds||(hv.beds!=null?String(hv.beds):"")), baths:(p.baths||(hv.baths!=null?String(hv.baths):"")), sqft:(p.sqft||(hv.sqft!=null?String(hv.sqft):"")) }; }); }
      fetch(SUPABASE_URL+"/functions/v1/market"+(zip?"?zip="+zip:""),h).then(function(r){return r.json();}).catch(function(){return null;}).then(function(mk){
        mk = (mk && mk.median && !mk.error) ? mk : null;
        setRef({ avm:(hv&&hv.value)||null, median:(mk&&mk.median)||null, dom:(mk&&mk.dom)||null, area:(mk&&mk.area)||"", county:!zip });
        setRefBusy(false);
      });
    });
  }

  function addComp(){ setComps(function(p){ return [...p,{addr:"",price:"",sqft:"",beds:"",baths:"",dom:""}]; }); }
  function compFld(i,k){ return function(e){ var v=e.target.value; setComps(function(p){ return p.map(function(c,j){ return j===i?{...c,[k]:v}:c; }); }); }; }
  function delComp(i){ setComps(function(p){ return p.filter(function(c,j){ return j!==i; }); }); }
  function ppsf(c){ var pr=Number(c.price), sf=Number(c.sqft); return (pr>0&&sf>0)? pr/sf : 0; }
  var valid = comps.filter(function(c){ return ppsf(c)>0; });
  var avgPpsf = valid.length ? valid.reduce(function(a,c){ return a+ppsf(c); },0)/valid.length : 0;
  var subjSqft = Number(form.sqft)||0;
  var suggested = (avgPpsf>0 && subjSqft>0) ? Math.round(avgPpsf*subjSqft) : 0;
  var lowP = suggested? Math.round(suggested*0.97):0, highP = suggested? Math.round(suggested*1.03):0;

  function bad(t){ return !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0; }
  function runAIfb(prompt, fb){ setAL(true); callAI(prompt).then(function(t){ setAT(bad(t)? fb() : t); setAL(false); }); }

  function cmaLocal(){
    var lines=["CMA — "+(form.addr||"the property")+(form.client?" for "+form.client:"")];
    if(ref&&ref.median) lines.push("Local market: median "+ref.median+(ref.dom?", ~"+ref.dom+" days on market":"")+(ref.area?" ("+ref.area+")":""));
    if(ref&&ref.avm) lines.push("Automated value estimate: "+ref.avm);
    lines.push("\nComparable sales:");
    valid.forEach(function(c){ lines.push("• "+(c.addr||"comp")+" — $"+Number(c.price).toLocaleString()+(c.sqft?" / "+Number(c.sqft).toLocaleString()+" sqft ($"+Math.round(ppsf(c))+"/sqft)":"")+(c.dom?" · "+c.dom+" DOM":"")); });
    if(avgPpsf>0) lines.push("\nAvg comp price/sqft: $"+Math.round(avgPpsf));
    if(suggested>0) lines.push("Suggested value ("+subjSqft.toLocaleString()+" sqft × $"+Math.round(avgPpsf)+"): ~$"+suggested.toLocaleString()+"  (range $"+lowP.toLocaleString()+"–$"+highP.toLocaleString()+")");
    return lines.join("\n");
  }
  function genCMA(){
    var compStr = valid.map(function(c){ return (c.addr||"comp")+": $"+Number(c.price).toLocaleString()+(c.sqft?", "+c.sqft+" sqft":"")+(c.beds?", "+c.beds+"bd":"")+(c.dom?", "+c.dom+" DOM":""); }).join("; ");
    runAIfb("Write clear, confident CMA talking points for "+AGENT.name+" presenting to "+(form.client||"a seller")+" for "+(form.addr||"their home")+" ("+(form.beds||"?")+"bd/"+(form.baths||"?")+"ba, "+(form.sqft||"?")+" sqft). Comparable sales: "+(compStr||"comparable homes")+". Avg comp price/sqft: $"+Math.round(avgPpsf)+". Suggested list range: $"+lowP.toLocaleString()+"–$"+highP.toLocaleString()+". "+(ref&&ref.median?"Local median "+ref.median+", ~"+ref.dom+" days on market. ":"")+"Explain the recommended price using the comps, justify the range, and build seller confidence. Under 180 words.", cmaLocal);
  }
  function marketingLocal(){

function PanelRates({market,setMarket}) {
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var [edit,setEdit] = useState(false);
  var [draft,setDraft] = useState(null);
  var [busy,setBusy] = useState(false); var [msg,setMsg] = useState("");
  function runAI(p){ setAL(true); callAI(p).then(function(t){ setAT(t); setAL(false); }); }
  function refreshRates(){
    setBusy(true); setMsg("");
    fetch(SUPABASE_URL + "/functions/v1/rates", {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}})
      .then(function(r){ return r.json(); })
      .then(function(d){
        setBusy(false);
        if(d.error){ setMsg("⚠️ "+d.error+" (If you just set it up, give it a minute.)"); return; }
        if(d.rates && d.rates.length){
          setMarket(function(m){
            var feedNames = d.rates.map(function(x){ return x.name; });
            var kept = (m.rates||[]).filter(function(x){ return feedNames.indexOf(x.name)<0; });   // keep ARM etc.
            return {...m, rates:d.rates.concat(kept), ratesDate:d.date||m.ratesDate, ratesSrc:"Freddie Mac (live)"};
          });
          setMsg("✓ Updated from Freddie Mac"+(d.date?" — "+d.date:""));
        } else { setMsg("⚠️ No rates returned."); }
      })
      .catch(function(e){ setBusy(false); setMsg("⚠️ Couldn't reach the rates service. Make sure the 'rates' function is deployed."); });
  }
  var rates = (market && market.rates) || [];
  function openEdit(){ setDraft(JSON.parse(JSON.stringify(rates))); setEdit(true); }
  function setRate(i,k,v){ setDraft(function(p){ var n=p.map(function(r){ return {...r}; }); n[i][k]=v; return n; }); }
  function todayLabel(){ try{ return new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}); }catch(e){ return "today"; } }
  function saveRates(){ setMarket(function(m){ return {...m,rates:draft,ratesDate:todayLabel()}; }); setEdit(false); setDraft(null); }
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Mortgage Rates</div>
      <Card>
        {!edit ? (
          <div>
            {rates.map(function(x){ return <div key={x.name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:7,marginBottom:6,border:"1px solid "+C.br}}><div style={{flex:1,fontSize:13,color:C.t2}}>{x.name}</div><div style={{fontSize:16,fontWeight:600}}>{x.val}</div><div style={{fontSize:12,minWidth:90,textAlign:"right",color:x.dir==="up"?C.ro:x.dir==="down"?C.ac:C.t3}}>{x.chg}</div></div>; })}
            <div style={{fontSize:11,color:C.t3,margin:"4px 0 8px"}}>{market.ratesSrc||"Freddie Mac"} · Updated {market.ratesDate}</div>
            {msg && <div style={{fontSize:12,color:msg.indexOf("⚠️")===0?C.ro:C.ac,marginBottom:8}}>{msg}</div>}
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              <Btn v="primary" onClick={refreshRates}>{busy?"⏳ Pulling…":"🔄 Refresh from web"}</Btn>
              <Btn onClick={openEdit}>✎ Edit manually</Btn>
              <Btn v="gold" onClick={function(){ runAI("Give me 3 buyer talking points about current mortgage rates (30-yr around "+(rates[0]?rates[0].val:"6.9%")+") for a Sonoma County agent with hesitant buyers. Practical and positive."); }}>✨ Buyer talking points</Btn>
              <Btn onClick={function(){ runAI("Explain 30-year fixed, 15-year fixed, and 5/1 ARM in plain language for a first-time Sonoma County homebuyer. Under 120 words."); }}>Explain to buyers</Btn>
            </div>
          </div>
        ) : (
          <div>
            <div style={{fontSize:12,color:C.t2,marginBottom:8,lineHeight:1.5}}>Enter the latest rates (check <b>mortgagenewsdaily.com</b> or <b>freddiemac.com/pmms</b>, or ask your lender). Saving stamps today's date.</div>
            {draft.map(function(x,i){ return (
              <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                <input style={{...inp,flex:2,minWidth:120,fontSize:12}} value={x.name} onChange={function(e){ setRate(i,"name",e.target.value); }} placeholder="Label" />
                <input style={{...inp,width:90,fontSize:12}} value={x.val} onChange={function(e){ setRate(i,"val",e.target.value); }} placeholder="6.89%" />
                <input style={{...inp,width:110,fontSize:12}} value={x.chg} onChange={function(e){ setRate(i,"chg",e.target.value); }} placeholder="+0.08% wk" />
                <select style={{...inp,width:80,fontSize:12}} value={x.dir} onChange={function(e){ setRate(i,"dir",e.target.value); }}><option value="up">▲ up</option><option value="flat">– flat</option><option value="down">▼ down</option></select>
              </div>
            ); })}
            <div style={{display:"flex",gap:7,marginTop:8}}>
              <Btn v="primary" onClick={saveRates}>✓ Save (mark updated today)</Btn>
              <Btn onClick={function(){ setEdit(false); setDraft(null); }}>Cancel</Btn>
            </div>
          </div>
        )}
        <AIBox text={aiTxt} loading={aiLd} />
      </Card>
      <div style={{fontSize:11,color:C.t3,marginTop:8,lineHeight:1.5,maxWidth:620}}>💡 <b>🔄 Refresh from web</b> pulls the latest 30-yr & 15-yr fixed averages from Freddie Mac (free, via the Fed's data feed). It updates weekly. The 5/1 ARM isn't in that feed, so edit it manually if you track it.</div>
    </div>
  );
}

// Cities Alicia tracks (primary ZIP each) — pulled individually from Realtor.com.
const MARKET_CITIES = [
  {name:"Windsor", zip:"95492"},
  {name:"Healdsburg", zip:"95448"},
  {name:"Santa Rosa", zip:"95403"},
  {name:"Rohnert Park", zip:"94928"},
  {name:"Petaluma", zip:"94952"},
  {name:"Sonoma", zip:"95476"}
];
function PanelMarket({market,setMarket}) {
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var [report,setReport] = useState("");
  var [edit,setEdit] = useState(false);
  var [busy,setBusy] = useState(false); var [msg,setMsg] = useState("");
  function runAI(p){ setReport(""); setAL(true); callAI(p).then(function(t){ setAT(t); setAL(false); }); }
  function refreshMarket(){
    setBusy(true); setMsg("Pulling "+MARKET_CITIES.length+" cities from Realtor.com…");
    var h = {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}};
    Promise.all(MARKET_CITIES.map(function(c){
      return fetch(SUPABASE_URL+"/functions/v1/market?zip="+c.zip, h)
        .then(function(r){ return r.json(); })
        .then(function(d){ return {name:c.name, zip:c.zip, median:(d&&d.median)||"—", dom:(d&&d.dom)||"—", inv:(d&&d.inv)||"—", marketDate:(d&&d.marketDate)||""}; })
        .catch(function(){ return {name:c.name, zip:c.zip, median:"—", dom:"—", inv:"—", marketDate:""}; });
    })).then(function(rows){
      setBusy(false);
      var ok = rows.filter(function(r){ return r.median && r.median!=="—"; });
      if(!ok.length){ setMsg("⚠️ Couldn't reach the market service. Make sure the 'market' function is deployed."); return; }
      var sr = rows.find(function(r){ return r.name==="Santa Rosa" && r.median!=="—"; }) || ok[0];
      var period = (ok[0] && ok[0].marketDate) || todayLabel();
      setMarket(function(m){ return {...m, cities:rows, median:sr.median, dom:sr.dom, inv:sr.inv, marketDate:period}; });
      setMsg("✓ Updated "+ok.length+" of "+rows.length+" cities from Realtor.com"+(period?" — "+period:""));
    });
  }
  function mf(k){ return function(e){ var v=e.target.value; setMarket(function(m){ return {...m,[k]:v}; }); }; }
  function todayLabel(){ try{ return new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"}); }catch(e){ return "today"; } }
  function pullReport(){
    setAT("");
    var rate30 = (market.rates&&market.rates[0]) ? market.rates[0].val : "—";
    var cs = market.cities||[];
    var lines = ["📊 "+(market.marketDate||"Current")+" — Local Market Snapshot",""];
    if(cs.length){
      cs.forEach(function(c){ lines.push("• "+c.name+", CA — median "+c.median+" · "+c.dom+" days on market · "+c.inv+" active"); });
    } else {
      lines.push("• Median price: "+market.median, "• Average days on market: "+market.dom+" days", "• Active listings: "+market.inv);
    }
    lines.push("", "• 30-yr fixed rate: "+rate30, "", "Source: Realtor.com by ZIP · tap 🔄 Refresh from web to update.");
    setReport(lines.join("\n"));
  }
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:14}}>
        <div style={{fontSize:18,fontWeight:700}}>Market Data</div>
        <Btn onClick={function(){ setEdit(function(s){ return !s; }); }} style={{fontSize:11}}>{edit?"Done":"✎ Edit default figures"}</Btn>
      </div>
      {edit && (
        <Card title="Default figures — used in AI emails & social when no specific city is chosen">
          <Row cols="1fr 1fr"><Fld label="Median price"><input style={inp} value={market.median} onChange={mf("median")} /></Fld><Fld label="Days on market"><input style={inp} value={market.dom} onChange={mf("dom")} /></Fld></Row>
          <Row cols="1fr 1fr"><Fld label="Active listings"><input style={inp} value={market.inv} onChange={mf("inv")} /></Fld><Fld label="Period label"><input style={inp} value={market.marketDate} onChange={mf("marketDate")} placeholder="June 2026" /></Fld></Row>
          <Btn v="primary" onClick={function(){ setMarket(function(m){ return {...m,marketDate:m.marketDate||todayLabel()}; }); setEdit(false); }}>Save</Btn>
        </Card>
      )}
      <Card title={"Local Market by City" + (market.marketDate?" — "+market.marketDate:"")}>
        {(!market.cities || !market.cities.length) ? (
          <div style={{color:C.t3,fontSize:13,lineHeight:1.5}}>Tap <b>🔄 Refresh from web</b> below to pull the latest median price, days on market &amp; active listings for <b>Windsor, Healdsburg, Santa Rosa, Rohnert Park, Petaluma &amp; Sonoma</b>.</div>
        ) : (
          <div>
            <div style={{display:"flex",alignItems:"center",padding:"0 0 6px",borderBottom:"2px solid "+C.br,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",color:C.t3}}>
              <div style={{flex:1.5}}>City</div><div style={{flex:1,textAlign:"right"}}>Median</div><div style={{flex:1,textAlign:"right"}}>Days</div><div style={{flex:1,textAlign:"right"}}>Active</div>
            </div>
            {market.cities.map(function(c){
              return <div key={c.zip} style={{display:"flex",alignItems:"center",padding:"9px 0",borderBottom:"1px solid "+C.br}}>
                <div style={{flex:1.5,fontSize:13,fontWeight:600}}>{c.name}, CA</div>
                <div style={{flex:1,textAlign:"right",fontFamily:"monospace",fontSize:13,fontWeight:600}}>{c.median}</div>
                <div style={{flex:1,textAlign:"right",fontFamily:"monospace",fontSize:13,color:C.t2}}>{c.dom}</div>
                <div style={{flex:1,textAlign:"right",fontFamily:"monospace",fontSize:13,color:C.t2}}>{c.inv}</div>
              </div>;
            })}
            <div style={{fontSize:10.5,color:C.t3,marginTop:8}}>Median list price by primary ZIP · Realtor.com</div>
          </div>
        )}
      </Card>
      {msg && <div style={{fontSize:12,color:msg.indexOf("⚠️")===0?C.ro:C.ac,marginBottom:8}}>{msg}</div>}
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:8}}>
        <Btn v="primary" onClick={refreshMarket}>{busy?"⏳ Pulling…":"🔄 Refresh from web"}</Btn>
        <Btn onClick={pullReport}>📊 Pull report</Btn>
        <Btn v="gold" onClick={function(){ runAI("Write a 3-sentence plain-English Sonoma County market update (median "+market.median+", "+market.dom+" days on market, "+market.inv+" active listings) I can post on Instagram or text to clients. Warm, local, no jargon."); }}>✨ Client summary (AI)</Btn>
        <Btn onClick={function(){ runAI("Write a Sonoma County neighborhood spotlight for Santa Rosa for a real estate Instagram caption. Lifestyle, community, home values. Under 100 words."); }}>✨ Neighborhood spotlight</Btn>
        <Btn onClick={function(){ runAI("Give me 5 Sonoma County real estate social media post ideas for this week. Mix of market stats, lifestyle, tips, and client stories."); }}>✨ Social ideas</Btn>
      </div>
      {report && <div style={{background:C.s2,border:"1px solid "+C.br,borderRadius:8,padding:"10px 12px",fontSize:13,lineHeight:1.7,color:C.tx,marginTop:8,whiteSpace:"pre-wrap"}}>{report}<div style={{marginTop:8}}><Btn style={{fontSize:11}} onClick={function(){ if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(report); }}>📋 Copy report</Btn></div></div>}
      <AIBox text={aiTxt} loading={aiLd} />
    </div>
  );
}

/* ── GOALS ───────────────────────────────────────────────────── */
function PanelGoals({goals,act,setGoals,setAct,deals}) {
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var cancelled = (deals||[]).filter(function(d){ return d.dead; });
  var ITEMS = [["leads","New Leads"],["appts","Appointments"],["listings","New Listings"],["closed","Closed Deals"],["calls","Calls Made"],["offers","Offers Written"]];
  var conv = act.leads>0 ? Math.round(act.appts/act.leads*100) : 0;
  var gci = (act.listings*715000*0.025)+(act.closed*715000*0.025);
  var sc = ITEMS.map(function(x){ return goals[x[0]] ? Math.min(1,act[x[0]]/goals[x[0]]) : 0; });
  var overall = Math.round(sc.reduce(function(a,b){ return a+b; },0)/sc.length*100);
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Weekly Goals</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Card title="Set Targets">{ITEMS.map(function(x){ return <div key={x[0]} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{fontSize:13,color:C.tx,minWidth:145}}>{x[1]}</span><input style={{...inp,width:80}} type="number" min="0" value={goals[x[0]]} onChange={function(e){ setGoals(function(p){ return {...p,[x[0]]:Number(e.target.value)}; }); }} /></div>; })}</Card>
        <Card title="Log This Week">{ITEMS.map(function(x){ return <div key={x[0]} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{fontSize:13,color:C.tx,minWidth:145}}>{x[1]}</span><input style={{...inp,width:80}} type="number" min="0" value={act[x[0]]} onChange={function(e){ setAct(function(p){ return {...p,[x[0]]:Number(e.target.value)}; }); }} /></div>; })}</Card>
      </div>
      <Card title="Progress">
        {ITEMS.map(function(x){ return <GBar key={x[0]} label={x[1]} actual={act[x[0]]} goal={goals[x[0]]} />; })}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginTop:12}}>
          {[["Conversion",conv+"%",C.aL,C.ac,C.aB,"leads to appts"],["GCI Pipeline",fmtMoney(Math.round(gci)),C.gL,C.go,C.gB,"est. this week"],["Overall Score",overall+"%",C.s2,C.tx,C.br,"of weekly goals"],["Cancelled",cancelled.length,C.rL,C.ro,C.rB,"deals fell through"]].map(function(x){ return <div key={x[0]} style={{background:x[2],border:"1px solid "+x[4],borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:C.t3,marginBottom:3}}>{x[0]}</div><div style={{fontSize:22,fontWeight:700,color:x[3],fontFamily:"monospace"}}>{x[1]}</div><div style={{fontSize:11,color:C.t3,marginTop:3}}>{x[5]}</div></div>; })}
        </div>
        {cancelled.length>0 && (
          <div style={{marginTop:12,borderTop:"1px solid "+C.br,paddingTop:10}}>
            <div style={{fontSize:12,fontWeight:700,color:C.ro,marginBottom:5}}>✕ Cancelled / Fell Through</div>
            {cancelled.map(function(d){ return <div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid "+C.br}}><div style={{flex:1}}><div style={{fontSize:12.5,fontWeight:500,color:C.t2}}>{d.addr}</div><div style={{fontSize:11,color:C.t3}}>{d.client} · {d.type}{d.price?" · "+fmtMoney(d.price):""}{d.deadDate?" · "+fmtDate(d.deadDate):""}</div></div></div>; })}
          </div>
        )}
        <Btn v="primary" onClick={function(){ setAL(true); callAI("Give brief encouraging coaching to "+AGENT.name+", Sonoma County agent: "+ITEMS.map(function(x){ return x[1]+": "+act[x[0]]+" of "+goals[x[0]]; }).join(", ")+". Specific, motivating, practical. Under 120 words.").then(function(t){ setAT(t); setAL(false); }); }} style={{marginTop:10}}>✨ Get coaching feedback</Btn>
        <AIBox text={aiTxt} loading={aiLd} />
      </Card>
    </div>
  );
}

/* ── SCORECARD ───────────────────────────────────────────────── */
function PanelScore({scores,setScores}) {
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var TARGETS = {calls:50,contacts:20,appts:5,listings:1,offers:2,closings:1};
  var ITEMS = [["calls","Calls made"],["contacts","Contacts made"],["appts","Appointments set"],["listings","Listings taken"],["offers","Offers written"],["closings","Closings"]];
  var ps = Math.round(((scores.calls||0)/TARGETS.calls+(scores.contacts||0)/TARGETS.contacts)/2*100);
  var conv = (scores.contacts||0)>0 ? Math.round((scores.appts||0)/(scores.contacts||0)*100) : 0;
  var gci = Math.round(((scores.listings||0)*715000*0.025)+((scores.closings||0)*715000*0.025));
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Weekly Scorecard</div>
      <Card>
        {ITEMS.map(function(x){
          var pct = Math.min(100,Math.round((scores[x[0]]||0)/TARGETS[x[0]]*100));
          var col = pct>=100?C.ac:pct>=60?C.go:C.ro;
          return (
            <div key={x[0]} style={{marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:500,flex:1}}>{x[1]}</span>
                <input style={{...inp,width:80}} type="number" min="0" value={scores[x[0]]||0} onChange={function(e){ setScores(function(p){ return {...p,[x[0]]:Number(e.target.value)}; }); }} />
                <span style={{fontSize:11,color:C.t2,minWidth:65,textAlign:"right",fontFamily:"monospace"}}>{scores[x[0]]||0} / {TARGETS[x[0]]}</span>
              </div>
              <div style={{height:6,background:C.s3,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:col,width:pct+"%",transition:"width .4s"}} /></div>
            </div>
          );
        })}
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
        {[["Prospecting",ps+"%",C.aL,C.ac,C.aB],["Conversion",conv+"%",C.gL,C.go,C.gB],["Est. GCI",fmtMoney(gci),C.s2,C.tx,C.br]].map(function(x){ return <div key={x[0]} style={{background:x[2],border:"1px solid "+x[4],borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:C.t3,marginBottom:3}}>{x[0]}</div><div style={{fontSize:22,fontWeight:700,color:x[3],fontFamily:"monospace"}}>{x[1]}</div></div>; })}
      </div>
      <Btn v="primary" onClick={function(){ setAL(true); callAI("Give brief encouraging coaching to "+AGENT.name+", Sonoma County agent: "+ITEMS.map(function(x){ return x[1]+": "+(scores[x[0]]||0)+" (goal "+TARGETS[x[0]]+")"; }).join(", ")+". Specific, motivating, practical. Under 120 words.").then(function(t){ setAT(t); setAL(false); }); }}>✨ Get coaching feedback</Btn>
      <AIBox text={aiTxt} loading={aiLd} />
    </div>
  );
}

function CenterMsg(props){
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,color:C.t2,fontSize:14,fontFamily:"'DM Sans',system-ui",textAlign:"center",padding:24}}>{props.children}</div>;
}

function SignOutBtn(props){
  return <button onClick={props.onClick} title="Sign out" style={{position:"fixed",bottom:14,left:14,zIndex:9999,background:C.sur,border:"1px solid "+C.brm,color:C.t3,fontSize:11,fontWeight:600,borderRadius:8,padding:"6px 10px",cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>Sign out</button>;
}

function Root(){
  const [phase, setPhase] = useState("init");   // init | config | login | ready
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(function(){
    if (!SUPA_CONFIGURED) { setPhase("config"); return; }
    (async function(){
      try {
        const { data } = await supa.auth.getSession();
        if (data && data.session) { _session = data.session; await loadAllState(); setPhase("ready"); }
        else setPhase("login");
      } catch(e){ console.error(e); setPhase("login"); }
    })();
  }, []);

  async function doLogin(e){
    if (e) e.preventDefault();
    setErr(""); setBusy(true);
    try {
      const { data, error } = await supa.auth.signInWithPassword({ email:email.trim(), password:pw });
      if (error) { setErr(error.message); setBusy(false); return; }
      _session = data.session; await loadAllState(); setBusy(false); setPhase("ready");
    } catch(e2){ setErr(String((e2&&e2.message)||e2)); setBusy(false); }
  }

  async function doLogout(){
    try { await supa.auth.signOut(); } catch(e){}
    _session = null; _cache = {}; setPw(""); setPhase("login");
  }

  if (phase === "init") return <CenterMsg>Connecting to your cloud…</CenterMsg>;
  if (phase === "config") return <CenterMsg><div><div style={{fontSize:18,fontWeight:700,color:C.tx,marginBottom:8}}>Almost connected</div><div style={{maxWidth:430,lineHeight:1.55}}>This hub isn't linked to your cloud yet. Add your Supabase URL and anon key near the top of the file (the two <code>%%…%%</code> placeholders), then reload.</div></div></CenterMsg>;
  if (phase === "ready") return <React.Fragment><SignOutBtn onClick={doLogout}/><App/></React.Fragment>;

  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,fontFamily:"'DM Sans',system-ui"}}>
    <form onSubmit={doLogin} style={{background:C.sur,border:"1px solid "+C.br,borderRadius:16,padding:"32px 28px",width:340,boxShadow:"0 8px 30px rgba(0,0,0,0.07)"}}>
      <div style={{fontSize:20,fontWeight:700,color:C.tx,marginBottom:3}}>Real Estate Hub</div>
      <div style={{fontSize:13,color:C.t3,marginBottom:22}}>{AGENT.name} · {AGENT.co}</div>
      <label style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",color:C.t3,display:"block",marginBottom:5}}>Email</label>
      <input value={email} onChange={function(e){setEmail(e.target.value);}} type="email" autoComplete="username" style={inp}/>
      <label style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",color:C.t3,display:"block",margin:"14px 0 5px"}}>Password</label>
      <input value={pw} onChange={function(e){setPw(e.target.value);}} type="password" autoComplete="current-password" style={inp}/>
      {err ? <div style={{color:C.ro,fontSize:12,marginTop:12}}>{err}</div> : null}
      <button type="submit" disabled={busy} style={{marginTop:20,width:"100%",padding:"11px",border:"none",borderRadius:10,background:C.ac,color:"#fff",fontSize:14,fontWeight:600,cursor:busy?"default":"pointer",opacity:busy?0.6:1}}>{busy?"Signing in…":"Sign in"}</button>
    </form>
  </div>;
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));
  </script>
<script>
(function(){
  function fail(msg){var r=document.getElementById("root");if(r)r.innerHTML='<div style="max-width:760px;margin:40px auto;padding:24px;font-family:system-ui,sans-serif;background:#fff;border:1px solid #e5e3dd;border-radius:14px;color:#222;line-height:1.5"><div style="font-size:16px;font-weight:700;color:#b00020;margin-bottom:8px">Hub couldn\u2019t start</div><pre style="white-space:pre-wrap;background:#faf8f4;padding:12px;border-radius:8px;font-size:12px;overflow:auto">'+String(msg).replace(/</g,"&lt;")+'</pre><div style="margin-top:12px;font-size:12px;color:#888">If you see this, send it to Claude.</div></div>';}
  try{
    if(typeof Babel==="undefined"){fail("Couldn\u2019t load required scripts \u2014 check your internet connection, then reopen.");return;}
    var src=document.getElementById("hubsrc").textContent;
    var out=Babel.transform(src,{presets:[["react",{runtime:"classic"}]]}).code;
    (0,eval)(out);
  }catch(e){ fail(e&&e.stack||e&&e.message||e); }
})();
</script>
</body>
