function PanelListings({listings,setListings,setTab}) {
  var blank = {addr:"",price:"",beds:"",baths:"",sqft:"",feature:"",link:""};
  var [form,setForm] = useState(blank);
  var [editId,setEditId] = useState("");
  var [st,setSt] = useState("");
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function save(){
    if(!form.addr.trim()){ setSt("Enter at least an address."); return; }
    if(editId){ setListings(function(p){ return p.map(function(x){ return x.id===editId?{...x,...form}:x; }); }); setSt("Listing updated."); setEditId(""); }
    else { setListings(function(p){ return [{id:uid(),...form,added:toDay()},...p]; }); setSt("Listing saved — it's now ready in the 🏡 New Listing email."); }
    setForm(blank);
  }
  function edit(l){ setEditId(l.id); setForm({addr:l.addr||"",price:l.price||"",beds:l.beds||"",baths:l.baths||"",sqft:l.sqft||"",feature:l.feature||"",link:l.link||""}); setSt(""); }
  function del(id){ setListings(function(p){ return p.filter(function(x){ return x.id!==id; }); }); if(editId===id){ setEditId(""); setForm(blank); } }
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🏡 My Listings</div>
      <div style={{fontSize:12.5,color:C.t2,marginBottom:14,lineHeight:1.5,maxWidth:680}}>Save a home's details once here. Then the <b>🏡 New Listing</b> button on any lead auto-fills a ready-to-send announcement email — real address, price, and specs, no placeholders to type.</div>
      <Card title={editId?"Edit listing":"Add a listing"}>
        <Row><Fld label="Address *"><input style={inp} placeholder="456 Oak St, Santa Rosa, CA 95403" value={form.addr} onChange={fld("addr")} /></Fld><Fld label="Price ($)"><input style={inp} type="number" placeholder="715000" value={form.price} onChange={fld("price")} /></Fld></Row>
        <Row cols="1fr 1fr 1fr"><Fld label="Beds"><input style={inp} placeholder="3" value={form.beds} onChange={fld("beds")} /></Fld><Fld label="Baths"><input style={inp} placeholder="2" value={form.baths} onChange={fld("baths")} /></Fld><Fld label="Sq ft"><input style={inp} placeholder="1850" value={form.sqft} onChange={fld("sqft")} /></Fld></Row>
        <Fld label="Standout feature"><input style={inp} placeholder="Remodeled kitchen, big backyard, walk to downtown" value={form.feature} onChange={fld("feature")} /></Fld>
        <Fld label="Listing link"><input style={inp} placeholder="https://… (Zillow, MLS, or your website)" value={form.link} onChange={fld("link")} /></Fld>
        <div style={{display:"flex",gap:7,marginTop:8}}>
          <Btn v="primary" onClick={save}>{editId?"Update listing":"Save listing"}</Btn>
          {editId && <Btn onClick={function(){ setEditId(""); setForm(blank); setSt(""); }}>Cancel</Btn>}
        </div>
        {st && <div style={{fontSize:12,color:C.ac,marginTop:5}}>{st}</div>}
      </Card>
      {listings.length===0 ? (
        <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:20}}>No listings saved yet. Add one above and it'll be ready to drop into New-Listing emails.</div></Card>
      ) : listings.map(function(l){
        return (
          <Card key={l.id} style={{marginTop:8}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontWeight:600,fontSize:14}}>{l.addr}</div>
                <div style={{fontSize:12,color:C.t2,marginTop:2}}>{l.price?"$"+Number(l.price).toLocaleString():"—"}{l.beds?" · "+l.beds+" bd":""}{l.baths?" · "+l.baths+" ba":""}{l.sqft?" · "+Number(l.sqft).toLocaleString()+" sqft":""}</div>
                {l.feature && <div style={{fontSize:12,color:C.t3,marginTop:2}}>{l.feature}</div>}
                {l.link && <div style={{fontSize:11,color:C.sk,marginTop:2,wordBreak:"break-all"}}>{l.link}</div>}
              </div>
              <div style={{display:"flex",gap:5}}>
                <Btn style={{fontSize:11}} onClick={function(){ edit(l); }}>Edit</Btn>
                <Btn v="rose" style={{fontSize:11}} onClick={function(){ del(l.id); }}>Delete</Btn>
              </div>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

/* ── AUTO-NURTURE ────────────────────────────────────────────── */
function PanelNurture({leads,setLeads,setTab,setFocusLead,market}) {
  var mk = market||{};
  var [stats,setStats] = useState({price:(mk.median||"$715K"),dom:((mk.dom||"28")+" days"),inv:((mk.inv||"~840")+" homes"),note:""});
  var [drafts,setDrafts] = useState({});
  var [busyId,setBusyId] = useState("");
  var [view,setView] = useState("due");
  var [confirmBulk,setConfirmBulk] = useState("");
  function statf(k){ return function(e){ setStats(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function pullMarket(){ setStats(function(p){ return {...p, price:(mk.median||p.price), dom:(mk.dom?mk.dom+" days":p.dom), inv:(mk.inv?mk.inv+" homes":p.inv)}; }); }

  var enrolled = leads.filter(nurtureOn);
  var due = enrolled.filter(nurtureDue);
  var list = (view==="due" ? due : enrolled).slice().sort(function(a,b){ return (a.lastNurtured||"")>(b.lastNurtured||"")?1:-1; });

  function setCadence(l,c){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,autoNurture:c}:x; }); }); }
  function markSent(l){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,lastNurtured:toDay(),lc:toDay(),log:[...(x.log||[]),toDay()+" — market update sent (auto-nurture)"]}:x; }); }); }
  function genFor(l){
    setBusyId(l.id);
    callAI("Write a short warm market-update email to "+l.first+" "+l.last+", a "+l.temp+" "+l.type+" lead in "+areaOf(l)+" (Sonoma County). Current local stats: median price "+stats.price+", average days on market "+stats.dom+", active listings "+stats.inv+". "+(stats.note?"My angle: "+stats.note+". ":"")+"Reference their city/area ("+areaOf(l)+") naturally rather than just 'Sonoma County'. Under 130 words. Warm, local, genuinely helpful, not pushy. Start with 'Hi "+l.first+",'. End with a soft invitation to reach out anytime. Body only. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+".").then(function(t){
      var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
      setDrafts(function(p){ var n={...p}; n[l.id]= bad ? draftMarketLocal(l, mk) : t; return n; }); setBusyId("");   // AI failed → built-in template (live market data)
    });
  }
  var SUBJ = "Your Sonoma County market update";
  function gmailFor(l){ var b=drafts[l.id]; if(!b||!l.email) return; window.open("https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&to="+encodeURIComponent(l.email)+(l.email2?"&cc="+encodeURIComponent(l.email2):"")+"&su="+encodeURIComponent(SUBJ)+"&body="+encodeURIComponent(b),"_blank"); markSent(l); }
  function mailFor(l){ var b=drafts[l.id]; if(!b) return; window.location.href="mailto:"+(l.email||"")+"?subject="+encodeURIComponent(SUBJ)+"&body="+encodeURIComponent(b); markSent(l); }
  function copyFor(l){ var b=drafts[l.id]; if(!b) return; if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(b); }
  function bulkSet(c){ setLeads(function(p){ return p.map(function(x){ return {...x,autoNurture:c}; }); }); setConfirmBulk(""); }
  function bulkSetCold(c){ setLeads(function(p){ return p.map(function(x){ return x.temp==="cold"?{...x,autoNurture:c}:x; }); }); setConfirmBulk(""); }

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🔄 Auto-Nurture</div>
      <div style={{fontSize:12.5,color:C.t2,marginBottom:8,lineHeight:1.5,maxWidth:680}}>Keep leads warm on autopilot. Enroll any lead at <b>Every 2 weeks</b> or <b>Monthly</b> and they'll appear here when they're due for a market-update email. The app writes each one with AI — you glance, then send with one click (your Gmail). Nothing goes out without you.</div>
      <div style={{fontSize:11.5,color:C.sk,background:C.skL,border:"1px solid "+C.skB,borderRadius:7,padding:"7px 10px",marginBottom:14,maxWidth:680,lineHeight:1.5}}>💡 <b>Read receipts:</b> these send through Gmail, so if you've installed a free Gmail tracker (e.g. Mailtrack), you'll see ✓✓ when a lead opens the email — right in your inbox.</div>

      <Card title="Current market numbers (used in every email)">
        <Row cols="1fr 1fr 1fr"><Fld label="Median price"><input style={inp} value={stats.price} onChange={statf("price")} /></Fld><Fld label="Days on market"><input style={inp} value={stats.dom} onChange={statf("dom")} /></Fld><Fld label="Active listings"><input style={inp} value={stats.inv} onChange={statf("inv")} /></Fld></Row>
        <Btn onClick={pullMarket} style={{fontSize:11,margin:"2px 0 6px"}}>↻ Use latest Market Data{mk.marketDate?" ("+mk.marketDate+")":""}</Btn>
        <Fld label="Your angle (optional)"><input style={inp} value={stats.note} onChange={statf("note")} placeholder="Rates eased this month — good window for buyers…" /></Fld>
      </Card>

      <Card title="Quick enroll">
        <div style={{fontSize:12,color:C.t2,marginBottom:8}}>Set a cadence for many leads at once. Fine-tune any individual lead from its popup or the list below.</div>
        {confirmBulk ? (
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:C.ro}}>{confirmBulk==="all-bi"?"Enroll ALL "+leads.length+" leads at Every 2 weeks?":confirmBulk==="all-mo"?"Enroll ALL "+leads.length+" leads at Monthly?":confirmBulk==="cold-mo"?"Enroll all COLD leads at Monthly?":"Turn auto-nurture OFF for every lead?"}</span>
            <Btn v="primary" style={{fontSize:11}} onClick={function(){ if(confirmBulk==="all-bi")bulkSet("biweekly"); else if(confirmBulk==="all-mo")bulkSet("monthly"); else if(confirmBulk==="cold-mo")bulkSetCold("monthly"); else bulkSet("off"); }}>Yes, do it</Btn>
            <Btn style={{fontSize:11}} onClick={function(){ setConfirmBulk(""); }}>Cancel</Btn>
          </div>
        ) : (
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <Btn v="sky" style={{fontSize:11}} onClick={function(){ setConfirmBulk("cold-mo"); }}>All cold → Monthly</Btn>
            <Btn style={{fontSize:11}} onClick={function(){ setConfirmBulk("all-mo"); }}>All leads → Monthly</Btn>
            <Btn style={{fontSize:11}} onClick={function(){ setConfirmBulk("all-bi"); }}>All leads → Every 2 weeks</Btn>
            <Btn v="rose" style={{fontSize:11}} onClick={function(){ setConfirmBulk("off"); }}>Turn all off</Btn>
          </div>
        )}
      </Card>

      <div style={{display:"flex",borderBottom:"1px solid "+C.br,margin:"14px 0 12px"}}>
        {[["due","Due now ("+due.length+")"],["enrolled","All enrolled ("+enrolled.length+")"]].map(function(x){
          return <div key={x[0]} style={{padding:"7px 14px",fontSize:12.5,fontWeight:500,cursor:"pointer",color:view===x[0]?C.ac:C.t3,borderBottom:"2px solid "+(view===x[0]?C.ac:"transparent"),marginBottom:-1}} onClick={function(){ setView(x[0]); }}>{x[1]}</div>;
        })}
      </div>

      {list.length===0 ? (
        <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:20}}>{view==="due"?"🎉 Nobody's due right now. Enrolled leads appear here when it's time for their next touch.":"No leads enrolled yet. Use Quick enroll above, or open a lead → 🔄 Auto-Nurture → pick a cadence."}</div></Card>
      ) : list.map(function(l){
        var d = drafts[l.id];
        return (
          <Card key={l.id} style={{marginBottom:8}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontWeight:600,color:C.ac,cursor:"pointer"}} title="View & edit lead" onClick={function(){ if(setFocusLead)setFocusLead(l.id); setTab("leads"); }}>{l.first} {l.last}</span>
                  <Tag t={l.temp}>{TICON[l.temp]} {l.temp}</Tag>
                  {nurtureDue(l) && <span style={{fontSize:10,fontWeight:700,color:C.go,background:C.gL,border:"1px solid "+C.gB,borderRadius:5,padding:"1px 6px"}}>DUE</span>}
                </div>
                <div style={{fontSize:11,color:C.t3,marginTop:2}}>{l.email||"⚠️ no email on file"} · {NURLBL[l.autoNurture]} · {l.lastNurtured?"last sent "+fmtDate(l.lastNurtured):"never sent"}{nurtureNext(l)?" · next "+fmtDate(nurtureNext(l)):""}</div>
              </div>
              <select style={{...inp,width:135,fontSize:12}} value={l.autoNurture} onChange={function(e){ setCadence(l,e.target.value); }}>
                <option value="off">Off</option><option value="biweekly">Every 2 weeks</option><option value="monthly">Monthly</option>
              </select>
              <Btn v="gold" style={{fontSize:11}} onClick={function(){ genFor(l); }}>{busyId===l.id?"⏳ Writing…":(d?"↻ Rewrite":"✨ Draft update")}</Btn>
            </div>
            {(busyId===l.id||d) && <AIBox text={d} loading={busyId===l.id} />}
            {d && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                <Btn v="primary" style={{fontSize:11}} onClick={function(){ gmailFor(l); }}>📧 Email via Gmail</Btn>
                <Btn style={{fontSize:11}} onClick={function(){ copyFor(l); }}>📋 Copy</Btn>
                <Btn style={{fontSize:11}} onClick={function(){ markSent(l); }}>✓ Mark sent</Btn>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}

/* ── MARKET EMAIL ────────────────────────────────────────────── */
function PanelMktgEmail({leads,market}) {
  var mk = market||{};
  var [form,setForm] = useState({
    subject:"Sonoma County Market Update",
    seg:"all",
    price:(mk.median||"$715K"),
    dom:((mk.dom||"28")+" days"),
    inv:((mk.inv||"~840")+" homes"),
    note:""
  });
  var [prev,setPrev] = useState(""); var [ld,setLd] = useState(false); var [st,setSt] = useState("");
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function pullMarket(){ setForm(function(p){ return {...p, price:(mk.median||p.price), dom:(mk.dom?mk.dom+" days":p.dom), inv:(mk.inv?mk.inv+" homes":p.inv)}; }); setSt("Filled from your latest Market Data"+(mk.marketDate?" ("+mk.marketDate+")":"")+"."); }
  function indLead(){ if(form.seg.indexOf("lead:")!==0) return null; var id=form.seg.slice(5); return (leads||[]).find(function(x){ return x.id===id; })||null; }
  function segLabel(){ var L=indLead(); if(L) return L.first+" "+L.last; return {all:"all clients",buyer:"buyer clients",seller:"seller clients",warm:"warm and hot leads",drip:"drip list"}[form.seg]; }
  function segLeads(){
    var L=indLead(); if(L) return L.email?[L]:[];
    return (leads||[]).filter(function(l){
      if(!l.email) return false;
      if(form.seg==="buyer") return l.type==="buyer"||l.type==="both";
      if(form.seg==="seller") return l.type==="seller"||l.type==="both";
      if(form.seg==="warm") return l.temp==="hot"||l.temp==="warm";
      if(form.seg==="drip") return l.nurture==="drip";
      return true;
    });
  }
  function marketLocal(){
    var L=indLead();
    var greet = L ? ("Hi "+L.first+",") : "Hi there!";
    var area = L ? (cityOf(L)||"Sonoma County") : "Sonoma County";
    return greet+"\n\nHere's a quick snapshot of the "+area+" market this month:\n\n• Median price: "+form.price+"\n• Days on market: "+form.dom+"\n• Active listings: "+form.inv+"\n\n"+(form.note?form.note+"\n\n":"")+"Whether you're thinking about buying or selling — or just curious what your home is worth — I'm always happy to talk it through. No pressure, ever.\n\nWarm regards,\n"+AGENT.name+"\n"+AGENT.phone+" | "+AGENT.email;
  }
  function gen() {
    setLd(true); setPrev(""); setSt("");
    var L = indLead();
    var aud = L ? ("a specific client, "+L.first+" "+L.last+(L.addr?(" at "+L.addr):"")+", a "+L.type+" lead in "+(cityOf(L)||"Sonoma County")) : ("my "+segLabel()+" in Sonoma County");
    var greetInstr = L ? ("Write it personally to them and start with 'Hi "+L.first+",'.") : "This goes to a list, so start with a warm general greeting like 'Hi there!' — do NOT use a [First Name] placeholder.";
    callAI("Write a short warm market-update email to "+aud+". Stats: median price "+form.price+", days on market "+form.dom+", active listings "+form.inv+". "+(form.note?"My angle: "+form.note+". ":"")+greetInstr+" Under 150 words. Warm, local. Body only. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+".").then(function(t){
      var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
      setPrev(bad ? marketLocal() : t); setLd(false);   // AI failed → built-in template, so it always produces an email
    });
  }
  function send() {
    if(!prev){ setSt("Generate the email first."); return; }
    var rec = segLeads();
    if(!rec.length){ setSt("No contact with an email here."); return; }
    var L = indLead();
    var url = "https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&su="+encodeURIComponent(form.subject||"")+"&body="+encodeURIComponent(prev);
    if(L){ url += "&to="+encodeURIComponent(L.email)+(L.email2?("&cc="+encodeURIComponent(L.email2)):""); window.open(url,"_blank"); setSt("Opening Gmail to "+L.first+" "+L.last+"…"); }
    else { url += "&bcc="+encodeURIComponent(rec.map(function(l){ return l.email; }).join(",")); window.open(url,"_blank"); setSt("Opening Gmail with "+rec.length+" recipient"+(rec.length>1?"s":"")+" BCC'd — review and send."); }
  }
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Market Update Email</div>
      <Card title="Settings">
        <Row><Fld label="Subject"><input style={inp} value={form.subject} onChange={fld("subject")} /></Fld><Fld label="Send to"><select style={inp} value={form.seg} onChange={fld("seg")}><option value="all">All leads</option><option value="buyer">Buyers only</option><option value="seller">Sellers only</option><option value="warm">Warm + Hot</option><option value="drip">Drip list</option><optgroup label="— One individual lead —">{(leads||[]).filter(function(l){ return l.email; }).slice().sort(function(a,b){ return (a.first+a.last).localeCompare(b.first+b.last); }).map(function(l){ return <option key={l.id} value={"lead:"+l.id}>{l.first} {l.last}</option>; })}</optgroup></select></Fld></Row>
        <Row cols="1fr 1fr 1fr"><Fld label="Median price"><input style={inp} value={form.price} onChange={fld("price")} /></Fld><Fld label="Days on market"><input style={inp} value={form.dom} onChange={fld("dom")} /></Fld><Fld label="Active listings"><input style={inp} value={form.inv} onChange={fld("inv")} /></Fld></Row>
        <Btn onClick={pullMarket} style={{fontSize:11,marginBottom:6}}>↻ Use latest Market Data</Btn>
        <Fld label="Your angle (optional)"><textarea style={{...inp,minHeight:55,resize:"vertical"}} value={form.note} onChange={fld("note")} placeholder="Rates held steady — good news for buyers…" /></Fld>
        <div style={{display:"flex",gap:7,marginTop:8}}>
          <Btn v="primary" onClick={gen}>✨ Generate Email</Btn>
          {prev && <Btn v="gold" onClick={send}>{indLead()?("📧 Send to "+indLead().first):"📧 Send to List (BCC via Gmail)"}</Btn>}
        </div>
        {st && <div style={{fontSize:12,color:C.ac,marginTop:5}}>{st}</div>}
      </Card>
      {(ld||prev) && <Card title="Preview"><div style={{fontSize:11,color:C.t3,marginBottom:8,fontFamily:"monospace"}}>From: {AGENT.name} &lt;{AGENT.email}&gt;</div><AIBox text={prev} loading={ld} /></Card>}
    </div>
  );
}

/* ── AI EMAIL ────────────────────────────────────────────────── */
function PanelAIEmail() {
  var [form,setForm] = useState({to:"",subject:"",prompt:""}); var [email,setEmail] = useState(""); var [ld,setLd] = useState(false); var [st,setSt] = useState(""); var [noKey,setNoKey] = useState(false);
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function gen() {
    if(!form.prompt.trim()){ setSt("Tell the writer what the email should say first."); return; }
    setNoKey(false); setLd(true); setEmail(""); setSt("");
    callAI("Write a professional warm real estate email from "+AGENT.name+", "+AGENT.co+", "+AGENT.city+". "+(form.subject?"Subject: \""+form.subject+"\".":" ")+" Instructions: "+form.prompt+". Body only, start with greeting, under 150 words. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+".").then(function(t){
      var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
      if(bad){ setSt(t||"AI error — check your key."); setEmail(""); } else { setEmail(t); }
      setLd(false);
    });
  }
  function recipient(){ return form.to.indexOf("@")>-1 ? form.to.trim() : ""; }
  function sendGmail() {
    if(!email) return;
    window.open("https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&to="+encodeURIComponent(recipient())+"&su="+encodeURIComponent(form.subject||"")+"&body="+encodeURIComponent(email),"_blank");
    setSt("Opening Gmail compose…");
  }
  function sendMail() {
    if(!email) return;
    window.location.href = "mailto:"+recipient()+"?subject="+encodeURIComponent(form.subject||"")+"&body="+encodeURIComponent(email);
    setSt("Opening your mail app…");
  }
  function copyEmail() {
    if(!email) return;
    if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(email).then(function(){ setSt("Copied ✓"); });
  }
  var TMPL = [["Listing appt recap","Thank the seller for the listing appointment. Recap pricing strategy and staging recommendations. Confirm next steps and timeline."],["Showing recap","Summarize 3 homes toured. Ask what resonated most. Suggest next round of showings."],["Offer submitted","Tell buyer the offer is in. Explain what to expect next. Stay positive and confident."],["Price reduction","Gently recommend a price adjustment based on market feedback. Frame as a strategy to generate more activity."],["Monthly nurture","Casual monthly check-in. No pressure. Include one Sonoma County market stat."],["Market update","Send a friendly Sonoma County market update. Include median price ~$715,000, average 28 days on market, and ~840 active listings. Keep it warm, local, and helpful with a soft call to reach out."],["Just listed","Announce a new home just listed. Include placeholders for [property address], [price], [# beds], [# baths], [square footage], [standout feature], and [listing link]. Invite to a private showing this week and note homes move fast."]];
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>AI Email Writer</div>
      <Card>
        <Row><Fld label="To"><input style={inp} placeholder="Dennis Spero or dsspero@comcast.net" value={form.to} onChange={fld("to")} /></Fld><Fld label="Subject"><input style={inp} placeholder="Your listing appointment recap" value={form.subject} onChange={fld("subject")} /></Fld></Row>

function PanelRS({leads,setLeads}) {
  var [view,setView] = useState("pending");

  var [showSteps,setShowSteps] = useState(true);
  var buyers = leads.filter(function(l){ return l.type==="buyer"||l.type==="both"; });
  var activeA = buyers.filter(function(l){ return l.mlsAlert; });
  var pending = buyers.filter(function(l){ return !l.mlsAlert; });
  var list = view==="pending"?pending:view==="active"?activeA:buyers;

  function critVal(l){ return (l.id in crit) ? crit[l.id] : (l.alertCriteria||""); }
  function saveCrit(l){ if(!(l.id in crit)) return; var v=crit[l.id]; setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,alertCriteria:v}:x; }); }); }
  function toggle(l){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,mlsAlert:!x.mlsAlert,mlsAlertDate:(!x.mlsAlert?toDay():null)}:x; }); }); }

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🔔 Buyer Alerts <span style={{fontSize:12,fontWeight:400,color:C.t3}}>· powered by your BAREIS MLS (free)</span></div>
      <div style={{fontSize:12.5,color:C.t2,marginBottom:12,lineHeight:1.5,maxWidth:710}}>BAREIS can automatically email your buyers new listings that match their search — automated listing alerts, included free with your MLS membership. Set each buyer up once in BAREIS (steps below), then track who's enrolled here. Note each buyer's criteria so it's easy to recreate or update.</div>

      <Card title={<span style={{cursor:"pointer"}} onClick={function(){ setShowSteps(function(s){ return !s; }); }}>How to set up a buyer's auto-alert in BAREIS (Paragon) {showSteps?"▾":"▸"}</span>}>
        {showSteps && <div>
          <ol style={{margin:0,paddingLeft:18,fontSize:12.5,color:C.t2,lineHeight:1.75}}>
            <li>In BAREIS, go to <b>Contacts</b> → <b>Add Contact</b> → enter the buyer's name + email → <b>Save</b>. (You can add a spouse / 2nd email too.)</li>
            <li>Open the contact → <b>Buyer Activity</b> → <b>Add Search</b> → <b>Add New Search</b>.</li>
            <li>Pick the <b>Class</b> (e.g. Residential) and enter their criteria — price, beds/baths, areas — then click <b>Search</b>.</li>
            <li>Click the green <b>Save Search</b> button → name it → <b>Save</b>, and turn on <b>auto-notification (email)</b> when prompted.</li>
            <li>Come back here and flip that buyer's <b>Alert active</b> switch to track it.</li>
          </ol>
          <div style={{fontSize:11,color:C.t3,marginTop:8}}>Tip: BAREIS sends one notification per saved search, and you can pause a contact (set Inactive) instead of deleting. Want me to walk you through it live on your screen? Just ask.</div>
        </div>}
      </Card>

      <Card>
        <div style={{display:"flex",gap:18,flexWrap:"wrap",alignItems:"center"}}>
          <div><div style={{fontSize:22,fontWeight:700,color:C.ac,fontFamily:"monospace"}}>{activeA.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Alerts active</div></div>
          <div><div style={{fontSize:22,fontWeight:700,color:C.go,fontFamily:"monospace"}}>{pending.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Need setup</div></div>
          <div><div style={{fontSize:22,fontWeight:700,color:C.t3,fontFamily:"monospace"}}>{buyers.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Total buyers</div></div>
        </div>
      </Card>

      <div style={{display:"flex",borderBottom:"1px solid "+C.br,margin:"14px 0 10px"}}>
        {[["pending","Need setup ("+pending.length+")"],["active","Active ("+activeA.length+")"],["all","All buyers ("+buyers.length+")"]].map(function(x){
          return <div key={x[0]} style={{padding:"7px 14px",fontSize:12.5,fontWeight:500,cursor:"pointer",color:view===x[0]?C.ac:C.t3,borderBottom:"2px solid "+(view===x[0]?C.ac:"transparent"),marginBottom:-1}} onClick={function(){ setView(x[0]); }}>{x[1]}</div>;
        })}
      </div>

      {list.length===0 ? <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:18}}>None here.</div></Card> : list.map(function(l){
        return (
          <Card key={l.id} style={{marginBottom:6}}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontWeight:600,fontSize:13}}>{l.first} {l.last} {l.mlsAlert?<span style={{fontSize:10,color:C.ac,marginLeft:4}}>🔔 alert active</span>:<span style={{fontSize:10,color:C.go,marginLeft:4}}>not set up</span>}</div>
                <div style={{fontSize:11,color:C.t3,fontFamily:"monospace"}}>{l.email||"⚠️ no email"}{l.phone?" · "+l.phone:""}{l.mlsAlertDate?" · since "+fmtDate(l.mlsAlertDate):""}</div>
                <input style={{...inp,fontSize:12,marginTop:6}} placeholder="Their search criteria — e.g. 3bd/2ba, $600–750k, NE Santa Rosa" value={critVal(l)} onChange={function(e){ var v=e.target.value; setCrit(function(p){ var n={...p}; n[l.id]=v; return n; }); }} onBlur={function(){ saveCrit(l); }} />
              </div>
              <Btn v={l.mlsAlert?"def":"primary"} style={{fontSize:11}} onClick={function(){ toggle(l); }}>{l.mlsAlert?"✓ Alert active":"Mark alert set up"}</Btn>

}

/* ── SELLER ALERTS (home value) ──────────────────────────────── */
function PanelSellerAlerts({leads,setLeads,market}) {
  var mk = market||{};
  var [view,setView] = useState("pending");
  var [note,setNote] = useState({});
  var [drafts,setDrafts] = useState({});
  var [busyId,setBusyId] = useState("");
  var [showSteps,setShowSteps] = useState(true);
  var [vals,setVals] = useState({});
  var [valBusy,setValBusy] = useState("");
  var [mktBusy,setMktBusy] = useState(false);
  var [mktMsg,setMktMsg] = useState("");
  var [stats,setStats] = useState({price:(mk.median||"$715K"),dom:((mk.dom||"28")+" days"),trend:"holding steady / up slightly year-over-year"});
  function pullMarket(){
    setMktBusy(true); setMktMsg("");
    fetch(SUPABASE_URL+"/functions/v1/market", {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}})
      .then(function(r){ return r.json(); })
      .then(function(d){
        setMktBusy(false);
        if(d && d.median && !d.error){ setStats(function(p){ return {...p, price:d.median, dom:(d.dom+" days")}; }); setMktMsg("✓ Updated from the web"+(d.marketDate?" — "+d.marketDate:"")); }
        else { setMktMsg("⚠️ Couldn't fetch market data."); }
      })
      .catch(function(){ setMktBusy(false); setMktMsg("⚠️ Couldn't reach the market service."); });
  }
  var sellers = leads.filter(function(l){ return l.type==="seller"||l.type==="both"; });
  var activeA = sellers.filter(function(l){ return l.sellerAlert; });
  var pending = sellers.filter(function(l){ return !l.sellerAlert; });
  var list = view==="pending"?pending:view==="active"?activeA:sellers;

  function statf(k){ return function(e){ setStats(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function noteVal(l){ return (l.id in note) ? note[l.id] : (l.sellerAlertNote||""); }
  function saveNote(l){ if(!(l.id in note)) return; var v=note[l.id]; setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,sellerAlertNote:v}:x; }); }); }
  function toggle(l){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,sellerAlert:!x.sellerAlert,sellerAlertDate:(!x.sellerAlert?toDay():null)}:x; }); }); }
  function zipOf(l){ if(l.zip && /^\d{5}$/.test(l.zip.trim())) return l.zip.trim(); var mm=(l.addr||"").match(/\b(\d{5})\b/); return mm?mm[1]:""; }
  function streetOf(l){ return ((l.addr||"").split(",")[0]||"").trim(); }
  function fetchLocal(l){
    var zip = zipOf(l);
    if(!zip) return Promise.resolve(null);
    return fetch(SUPABASE_URL+"/functions/v1/market?zip="+zip, {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}})
      .then(function(r){ return r.json(); })
      .then(function(d){ return (d && d.median && !d.error) ? d : null; })
      .catch(function(){ return null; });
  }
  function fetchAVM(l){
    var street = streetOf(l);
    if(!street) return Promise.resolve(null);
    var qs = "street="+encodeURIComponent(street)+"&city="+encodeURIComponent(cityOf(l)||"")+"&state=CA"+(zipOf(l)?"&zip="+zipOf(l):"");
    return fetch(SUPABASE_URL+"/functions/v1/homevalue?"+qs, {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}})
      .then(function(r){ return r.json(); })
      .then(function(d){ return (d && d.value && !d.error) ? d : null; })
      .catch(function(){ return null; });
  }
  function getVal(l){
    if(valBusy) return;
    setValBusy(l.id);
    fetchAVM(l).then(function(d){ setVals(function(p){ var n={...p}; n[l.id]= d || {error:true}; return n; }); setValBusy(""); });
  }
  function valueLocal(l, ov, avm){
    var sign = "\n\nWarm regards,\n"+AGENT.name+"\n"+AGENT.phone+" | "+AGENT.email;
    var city = cityOf(l) || "Sonoma County";
    var price = (ov && ov.price) ? ov.price : stats.price;
    var dom = (ov && ov.dom) ? ov.dom : stats.dom;
    var addrline = l.addr ? " at "+l.addr : "";
    if(avm){
      return "Hi "+l.first+",\n\nI ran an updated value estimate on your home"+addrline+" — it's currently estimated around "+avm.value+".\n\nThat's an automated estimate; the real number depends on your home's condition, upgrades, and recent comparable sales in "+city+" (where the median is around "+price+" and homes are averaging "+dom+" on the market). I'd be glad to run a precise, no-obligation CMA tailored to your property so you know exactly where you stand.\n\nJust reply and I'll put it together for you."+sign;
    }
    return "Hi "+l.first+",\n\nI wanted to give you a quick update on home values in "+city+". Right now the local market there is sitting around a median of "+price+", with homes averaging "+dom+" on the market and values "+stats.trend+".\n\nThat means your home"+addrline+" may be worth more than you'd expect. If you're curious, I'd be glad to put together a free, no-obligation value estimate (a CMA) specific to your property.\n\nJust reply and I'll get it started for you."+sign;
  }
  function genFor(l){
    setBusyId(l.id);
    Promise.all([fetchAVM(l), fetchLocal(l)]).then(function(arr){
      var avm = arr[0], loc = arr[1];
      var ov = loc ? {price:loc.median, dom:(loc.dom+" days")} : null;
      var price = ov ? ov.price : stats.price;
      var dom = ov ? ov.dom : stats.dom;
      var area = cityOf(l) || "Sonoma County";
      var info = avm
        ? "Their home"+(l.addr?(" at "+l.addr):"")+" has a current automated value estimate of about "+avm.value+". Lead with this specific estimate. Note it's an automated estimate and that a personalized CMA from you is more accurate. Also weave in their local "+area+" market (median "+price+", avg "+dom+" on market). Then offer a free CMA. Do NOT mention their equity or mortgage."
        : "Reference their local "+area+" market specifically: median price "+price+", average "+dom+" on market, values "+stats.trend+", and offer a free, no-obligation CMA for their specific home.";
      callAI("Write a short warm home-value update email from "+AGENT.name+" to "+l.first+" "+l.last+", a homeowner"+(l.addr?(" at "+l.addr):"")+" in "+area+" (Sonoma County). "+info+" Use their city/area name naturally. Under 150 words. Warm, helpful, not pushy. Start with 'Hi "+l.first+",'. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+".").then(function(t){
        var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
        setDrafts(function(p){ var n={...p}; n[l.id]= bad ? valueLocal(l, ov, avm) : t; return n; }); setBusyId("");
      });
    });
  }
  var SUBJ = "Your home value update — Sonoma County";
  function gmailFor(l){ var b=drafts[l.id]; if(!b||!l.email) return; window.open("https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&to="+encodeURIComponent(l.email)+(l.email2?"&cc="+encodeURIComponent(l.email2):"")+"&su="+encodeURIComponent(SUBJ)+"&body="+encodeURIComponent(b),"_blank"); }
  function mailFor(l){ var b=drafts[l.id]; if(!b) return; window.location.href="mailto:"+(l.email||"")+"?subject="+encodeURIComponent(SUBJ)+"&body="+encodeURIComponent(b); }
  function copyFor(l){ var b=drafts[l.id]; if(b&&navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(b); }

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🏠 Seller Alerts <span style={{fontSize:12,fontWeight:400,color:C.t3}}>· home-value updates</span></div>
      <div style={{fontSize:12.5,color:C.t2,marginBottom:12,lineHeight:1.5,maxWidth:710}}>Keep homeowners thinking about their home's value (and you). Two free ways: <b>(1)</b> set up a BAREIS neighborhood alert so they auto-get nearby sales/listings — the real driver of their value; <b>(2)</b> send each seller a personal AI-written <b>home value update</b> for their address right here. (A fully-automatic dollar-figure estimate email would need a paid tool like Cloud CMA — ask me if you want that.)</div>

      <Card title={<span style={{cursor:"pointer"}} onClick={function(){ setShowSteps(function(s){ return !s; }); }}>How to set up a seller's home-value alert in BAREIS (free) {showSteps?"▾":"▸"}</span>}>
        {showSteps && <div>
          <ol style={{margin:0,paddingLeft:18,fontSize:12.5,color:C.t2,lineHeight:1.75}}>
            <li>In BAREIS, go to <b>Contacts</b> → <b>Add Contact</b> → enter the homeowner's name + email → <b>Save</b>.</li>
            <li>Open the contact → <b>Buyer Activity</b> → <b>Add Search</b> → <b>Add New Search</b> (this works for value tracking too).</li>
            <li>Set the criteria to <b>their neighborhood</b> — their subdivision/ZIP and a price band around their home — and include <b>Sold</b> + <b>Active</b> status, so they see what's selling near them.</li>
            <li>Click the green <b>Save Search</b> → name it (e.g. "123 Main St — neighborhood") → <b>Save</b>, and turn on <b>auto-notification (email)</b>.</li>
            <li>For an actual dollar estimate, run a quick <b>CMA</b> in BAREIS for their address periodically and send it. Then flip <b>Value alert active</b> here.</li>
          </ol>
          <div style={{fontSize:11,color:C.t3,marginTop:8}}>Want me to walk you through it live on your screen? Just ask.</div>
        </div>}
      </Card>

      <Card title="Market numbers (used in the home-value emails)">
        <Row cols="1fr 1fr 1fr"><Fld label="Median price"><input style={inp} value={stats.price} onChange={statf("price")} /></Fld><Fld label="Days on market"><input style={inp} value={stats.dom} onChange={statf("dom")} /></Fld><Fld label="Value trend"><input style={inp} value={stats.trend} onChange={statf("trend")} /></Fld></Row>
        <Btn onClick={pullMarket} style={{fontSize:11,marginTop:6}}>{mktBusy?"⏳ Refreshing…":"🔄 Refresh market numbers from web"}</Btn>
        {mktMsg && <div style={{fontSize:11,color:mktMsg.indexOf("⚠️")===0?C.ro:C.ac,marginTop:4}}>{mktMsg}</div>}
      </Card>

      <Card>
        <div style={{display:"flex",gap:18,flexWrap:"wrap",alignItems:"center"}}>
          <div><div style={{fontSize:22,fontWeight:700,color:C.ac,fontFamily:"monospace"}}>{activeA.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Alerts active</div></div>
          <div><div style={{fontSize:22,fontWeight:700,color:C.go,fontFamily:"monospace"}}>{pending.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Need setup</div></div>
          <div><div style={{fontSize:22,fontWeight:700,color:C.t3,fontFamily:"monospace"}}>{sellers.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Total sellers</div></div>
        </div>
      </Card>

      <div style={{display:"flex",borderBottom:"1px solid "+C.br,margin:"14px 0 10px"}}>
        {[["pending","Need setup ("+pending.length+")"],["active","Active ("+activeA.length+")"],["all","All sellers ("+sellers.length+")"]].map(function(x){
          return <div key={x[0]} style={{padding:"7px 14px",fontSize:12.5,fontWeight:500,cursor:"pointer",color:view===x[0]?C.ac:C.t3,borderBottom:"2px solid "+(view===x[0]?C.ac:"transparent"),marginBottom:-1}} onClick={function(){ setView(x[0]); }}>{x[1]}</div>;
        })}
      </div>

      {list.length===0 ? <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:18}}>None here.</div></Card> : list.map(function(l){
        var d = drafts[l.id];
        return (
          <Card key={l.id} style={{marginBottom:6}}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontWeight:600,fontSize:13}}>{l.first} {l.last} {l.sellerAlert?<span style={{fontSize:10,color:C.ac,marginLeft:4}}>🏠 alert active</span>:<span style={{fontSize:10,color:C.go,marginLeft:4}}>not set up</span>}</div>

              </div>

}

/* ── NET SHEET ───────────────────────────────────────────────── */
function PanelNet({leads,setLeads}) {
  var DEF = {price:715000,loan:380000,lc:2.5,bc:2.5,commMode:"gross",cityTax:0,propTax:0,conc:0,concMode:"pct",closing:3500,repairs:0,misc:0,other:0};
  var [v,setV] = useState(DEF);
  var [parties,setParties] = useState([]);
  var [leadId,setLeadId] = useState("");
  var [saveMsg,setSaveMsg] = useState("");
  function upd(k){ return function(e){ setV(function(p){ return {...p,[k]:Number(e.target.value)||0}; }); }; }
  function pickLead(e){
    var id=e.target.value; setLeadId(id); setSaveMsg("");
    var L=(leads||[]).find(function(x){ return x.id===id; });
    if(L && L.netSheet){ setV(L.netSheet); setParties(L.netSheet.parties||[]); setSaveMsg("📂 Loaded "+L.first+"'s saved net sheet"+(L.netSheetDate?" ("+fmtDate(L.netSheetDate)+")":"")+"."); }
  }
  function saveToLead(){
    if(!leadId){ setSaveMsg("Pick a lead above to save to."); return; }
    var sheet = {...v, parties:parties};
    setLeads(function(p){ return p.map(function(l){ return l.id===leadId?{...l,netSheet:sheet,netSheetDate:toDay()}:l; }); });
    var L=(leads||[]).find(function(x){ return x.id===leadId; });
    setSaveMsg("✓ Saved to "+(L?L.first+" "+L.last:"lead")+".");
  }
  var sellers = (leads||[]).filter(function(l){ return l.type==="seller"||l.type==="both"; });
  var curLead = (leads||[]).find(function(x){ return x.id===leadId; });
  function resetSheet(){ setV(DEF); setParties([]); setSaveMsg("Reset to a blank sheet — change values and Save to overwrite."); }
  function addParty(){ setParties(function(p){ return [...p,{name:"",pct:""}]; }); }
  function partyFld(i,k){ return function(e){ var val=e.target.value; setParties(function(p){ return p.map(function(c,j){ return j===i?{...c,[k]:val}:c; }); }); }; }
  function delParty(i){ setParties(function(p){ return p.filter(function(c,j){ return j!==i; }); }); }
  var totalPct = parties.reduce(function(a,c){ return a+(Number(c.pct)||0); },0);
  var tax=Math.round(v.price/1000)*1.10;
  var conc = (v.concMode==="amt") ? (Number(v.conc)||0) : (v.price*(Number(v.conc)||0)/100);
  var commBase = (v.commMode==="net") ? (v.price - conc) : v.price;   // commission on gross sale price, or net of concession
  var lc=v.lc/100*commBase, bc=v.bc/100*commBase;
  var cityTaxAmt = v.price*(Number(v.cityTax)||0)/100;
  var net = v.price - v.loan - lc - bc - tax - cityTaxAmt - (Number(v.propTax)||0) - conc - (Number(v.closing)||0) - v.repairs - (Number(v.misc)||0) - v.other;
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var rows = [["Sale price",fmtMoney(v.price),false],["Loan balance / payoff","− "+fmtMoney(v.loan),true],["Seller commission ("+v.lc+"% of "+(v.commMode==="net"?"net":"gross")+")","− "+fmtMoney(Math.round(lc)),true],["Buyer commission ("+v.bc+"% of "+(v.commMode==="net"?"net":"gross")+")","− "+fmtMoney(Math.round(bc)),true],["County transfer tax ($1.10/$1k)","− "+fmtMoney(Math.round(tax)),true],["City transfer tax ("+(v.cityTax||0)+"%)","− "+fmtMoney(Math.round(cityTaxAmt)),true],["Property tax (proration)","− "+fmtMoney(Number(v.propTax)||0),true],["Seller concession"+(v.concMode==="pct"?" ("+(v.conc||0)+"%)":""),"− "+fmtMoney(Math.round(conc)),true],["Closing costs","− "+fmtMoney(Number(v.closing)||0),true],["Repairs","− "+fmtMoney(v.repairs),true],["Misc","− "+fmtMoney(Number(v.misc)||0),true],["Other","− "+fmtMoney(v.other),true]];
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:10}}>Seller's Net Sheet</div>
      <Card style={{marginBottom:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:C.t3}}>Net sheet for:</span>
          <select style={{...inp,width:210,fontSize:12}} value={leadId} onChange={pickLead}><option value="">— select a seller —</option>{sellers.map(function(l){ return <option key={l.id} value={l.id}>{l.first} {l.last}{l.netSheet?" 💾":""}</option>; })}</select>
          <Btn v="primary" style={{fontSize:11}} onClick={saveToLead}>{curLead&&curLead.netSheet?"💾 Update saved net sheet":"💾 Save to lead"}</Btn>
          {curLead&&curLead.netSheet && <Btn style={{fontSize:11}} onClick={resetSheet}>Reset</Btn>}
          {saveMsg && <span style={{fontSize:11,color:C.ac}}>{saveMsg}</span>}
        </div>
        {curLead&&curLead.netSheet && <div style={{fontSize:11,color:C.t3,marginTop:6}}>📂 Editing {curLead.first}'s saved net sheet — change any field below and tap <b>Update</b> to overwrite it.</div>}
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Card title="Deal Details">
          <Row><Fld label="Sale price ($)"><input style={inp} type="number" value={v.price} onChange={upd("price")} /></Fld><Fld label="Loan balance / payoff ($)"><input style={inp} type="number" value={v.loan} onChange={upd("loan")} /></Fld></Row>
          <Row><Fld label="Seller comm (%)"><input style={inp} type="number" step=".1" value={v.lc} onChange={upd("lc")} /></Fld><Fld label="Buyer comm (%)"><input style={inp} type="number" step=".1" value={v.bc} onChange={upd("bc")} /></Fld></Row>
          <Row><Fld label="Commission based on"><select style={inp} value={v.commMode} onChange={function(e){ var m=e.target.value; setV(function(p){ return {...p,commMode:m}; }); }}><option value="gross">Gross (sale price)</option><option value="net">Net (price − concession)</option></select></Fld><Fld label=""><span/></Fld></Row>
          <Row><Fld label="City transfer tax (%)"><input style={inp} type="number" step="any" value={v.cityTax} onChange={upd("cityTax")} /></Fld><Fld label="Property tax proration ($)"><input style={inp} type="number" value={v.propTax} onChange={upd("propTax")} /></Fld></Row>
          <Row><Fld label={"Seller concession ("+(v.concMode==="amt"?"$":"%")+")"}><input style={inp} type="number" step="any" value={v.conc} onChange={upd("conc")} /></Fld><Fld label="Concession type"><select style={inp} value={v.concMode} onChange={function(e){ var m=e.target.value; setV(function(p){ return {...p,concMode:m}; }); }}><option value="pct">% of price</option><option value="amt">$ amount</option></select></Fld></Row>
          <Row><Fld label="Closing costs ($)"><input style={inp} type="number" value={v.closing} onChange={upd("closing")} /></Fld><Fld label="Repairs ($)"><input style={inp} type="number" value={v.repairs} onChange={upd("repairs")} /></Fld></Row>
          <Row><Fld label="Misc ($)"><input style={inp} type="number" value={v.misc} onChange={upd("misc")} /></Fld><Fld label="Other ($)"><input style={inp} type="number" value={v.other} onChange={upd("other")} /></Fld></Row>
        </Card>
        <Card title="Net Proceeds">
          {rows.map(function(x){ return <div key={x[0]} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+C.br,fontSize:13}}><span style={{color:C.t2}}>{x[0]}</span><span style={{fontWeight:500,color:x[2]?C.ro:C.tx}}>{x[1]}</span></div>; })}
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",marginTop:4,borderTop:"2px solid "+C.brm,fontSize:15,fontWeight:700}}><span>Est. Net Proceeds</span><span style={{color:C.ac}}>{fmtMoney(Math.round(net))}</span></div>
          <Btn v="gold" onClick={function(){ setAL(true); callAI("Explain this seller net sheet in plain language: Sale price "+fmtMoney(v.price)+", loan payoff "+fmtMoney(v.loan)+", commissions "+fmtMoney(Math.round(lc+bc))+", transfer taxes "+fmtMoney(Math.round(tax)+Math.round(cityTaxAmt))+", closing costs "+fmtMoney(Number(v.closing)||0)+", concession "+fmtMoney(Math.round(conc))+", repairs/misc/other "+fmtMoney(v.repairs+(Number(v.misc)||0)+v.other)+", net "+fmtMoney(Math.round(net))+". Warm, clear, under 120 words.").then(function(t){ setAT(t); setAL(false); }); }} style={{marginTop:8}}>✨ Explain to seller</Btn>
          <AIBox text={aiTxt} loading={aiLd} />
        </Card>
      </div>
      <Card title="Ownership Interests — split the net" style={{marginTop:10}}>
        <div style={{fontSize:11,color:C.t3,marginBottom:8,lineHeight:1.5}}>If more than one person has an interest in the property (co-owners, heirs, divorcing parties, partners), add each one and their ownership %. The net proceeds split accordingly.</div>
        {parties.map(function(c,i){
          var share = Math.round(net * (Number(c.pct)||0)/100);
          return <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
            <input style={{...inp,flex:2,minWidth:130,fontSize:12}} placeholder="Owner / party name" value={c.name} onChange={partyFld(i,"name")} />
            <input style={{...inp,width:72,fontSize:12}} type="number" step="any" placeholder="%" value={c.pct} onChange={partyFld(i,"pct")} />
            <span style={{fontSize:14,fontWeight:700,color:C.ac,minWidth:100}}>{fmtMoney(share)}</span>
            <span style={{color:C.ro,cursor:"pointer",fontSize:13}} onClick={function(){ delParty(i); }}>✕</span>
          </div>;
        })}
        <div style={{display:"flex",gap:12,alignItems:"center",marginTop:4,flexWrap:"wrap"}}>
          <Btn style={{fontSize:11}} onClick={addParty}>+ Add owner / interest</Btn>
          {parties.length>0 && <span style={{fontSize:12,color:totalPct===100?C.ac:C.ro,fontWeight:600}}>Total interest: {totalPct}%{totalPct===100?" ✓":" — should equal 100%"}</span>}
          {parties.length>0 && <span style={{fontSize:11,color:C.t3}}>Net to split: {fmtMoney(Math.round(net))}</span>}
        </div>
      </Card>
    </div>
  );
}

/* ── BUYER NET SHEET ─────────────────────────────────────────── */
function PanelBuyerNet({leads,setLeads}) {

  var [v,setV] = useState(BDEF);
  var [leadId,setLeadId] = useState("");
  var [saveMsg,setSaveMsg] = useState("");
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  function upd(k){ return function(e){ setV(function(p){ return {...p,[k]:Number(e.target.value)||0}; }); }; }
  var buyers = (leads||[]).filter(function(l){ return l.type==="buyer"||l.type==="both"; });
  var curLead = (leads||[]).find(function(x){ return x.id===leadId; });
  function pickLead(e){ var id=e.target.value; setLeadId(id); setSaveMsg(""); var L=(leads||[]).find(function(x){ return x.id===id; }); if(L&&L.buyerNet){ setV(L.buyerNet); setSaveMsg("📂 Loaded "+L.first+"'s saved buyer sheet"+(L.buyerNetDate?" ("+fmtDate(L.buyerNetDate)+")":"")+"."); } }
  function saveToLead(){ if(!leadId){ setSaveMsg("Pick a buyer above to save to."); return; } setLeads(function(p){ return p.map(function(l){ return l.id===leadId?{...l,buyerNet:v,buyerNetDate:toDay()}:l; }); }); var L=(leads||[]).find(function(x){ return x.id===leadId; }); setSaveMsg("✓ Saved to "+(L?L.first+" "+L.last:"buyer")+"."); }
  function resetSheet(){ setV(BDEF); setSaveMsg("Reset to a blank sheet."); }

  var down = Math.round(v.price*(Number(v.downPct)||0)/100);
  var loanAmt = v.price - down;
  var credits = (Number(v.earnest)||0)+(Number(v.sellerCredit)||0);
  var costs = (Number(v.closing)||0);
  var cashToClose = down + costs - credits;
  var r=(Number(v.rate)||0)/100/12, n=(Number(v.term)||30)*12;
  var pi = r>0 ? Math.round(loanAmt*r/(1-Math.pow(1+r,-n))) : Math.round(loanAmt/(n||360));
  var rows = [["Down payment ("+v.downPct+"%)",fmtMoney(down),false],["Closing costs (fees, title, escrow, prepaids)",fmtMoney(v.closing),false],["Earnest money (credit)","− "+fmtMoney(v.earnest),true],["Seller credit","− "+fmtMoney(v.sellerCredit),true]];

        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:C.t3}}>Buyer sheet for:</span>
          <select style={{...inp,width:210,fontSize:12}} value={leadId} onChange={pickLead}><option value="">— select a buyer —</option>{buyers.map(function(l){ return <option key={l.id} value={l.id}>{l.first} {l.last}{l.buyerNet?" 💾":""}</option>; })}</select>
          <Btn v="primary" style={{fontSize:11}} onClick={saveToLead}>{curLead&&curLead.buyerNet?"💾 Update saved sheet":"💾 Save to buyer"}</Btn>
          {curLead&&curLead.buyerNet && <Btn style={{fontSize:11}} onClick={resetSheet}>Reset</Btn>}
          {saveMsg && <span style={{fontSize:11,color:C.ac}}>{saveMsg}</span>}
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Card title="Purchase Details">
          <Row><Fld label="Purchase price ($)"><input style={inp} type="number" value={v.price} onChange={upd("price")} /></Fld><Fld label="Down payment (%)"><input style={inp} type="number" step="any" value={v.downPct} onChange={upd("downPct")} /></Fld></Row>
          <Row><Fld label="Interest rate (%)"><input style={inp} type="number" step="any" value={v.rate} onChange={upd("rate")} /></Fld><Fld label="Loan term (yrs)"><input style={inp} type="number" value={v.term} onChange={upd("term")} /></Fld></Row>
          <Row><Fld label="Closing costs ($)"><input style={inp} type="number" value={v.closing} onChange={upd("closing")} /></Fld><Fld label="Earnest money ($)"><input style={inp} type="number" value={v.earnest} onChange={upd("earnest")} /></Fld></Row>
          <Row><Fld label="Seller credit ($)"><input style={inp} type="number" value={v.sellerCredit} onChange={upd("sellerCredit")} /></Fld><Fld label=""><span/></Fld></Row>
          <div style={{fontSize:11,color:C.t3,marginTop:2}}>💡 "Closing costs" = lender/loan fees, title, escrow, inspection, appraisal, and prepaid taxes/insurance combined.</div>
        </Card>
        <Card title="Estimated Cash to Close">
          {rows.map(function(x){ return <div key={x[0]} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+C.br,fontSize:13}}><span style={{color:C.t2}}>{x[0]}</span><span style={{fontWeight:500,color:x[2]?C.ac:C.tx}}>{x[1]}</span></div>; })}
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",marginTop:4,borderTop:"2px solid "+C.brm,fontSize:15,fontWeight:700}}><span>Est. Cash to Close</span><span style={{color:C.ac}}>{fmtMoney(Math.round(cashToClose))}</span></div>
          <div style={{background:C.s2,borderRadius:7,padding:"8px 10px",marginTop:8,fontSize:12,color:C.t2,lineHeight:1.6}}>
            <div>Loan amount: <b>{fmtMoney(loanAmt)}</b></div>
            <div>Est. monthly payment (P&amp;I): <b style={{color:C.tx}}>{fmtMoney(pi)}/mo</b> <span style={{color:C.t3}}>at {v.rate}% / {v.term} yr</span></div>
            <div style={{fontSize:11,color:C.t3,marginTop:2}}>+ property tax &amp; insurance billed monthly (not included above).</div>
          </div>
          <Btn v="gold" onClick={function(){ setAL(true); callAI("Explain this buyer's net sheet in plain, reassuring language for "+(curLead?curLead.first:"a buyer")+": purchase price "+fmtMoney(v.price)+", "+v.downPct+"% down ("+fmtMoney(down)+"), loan "+fmtMoney(loanAmt)+", total closing costs/prepaids "+fmtMoney(costs)+", earnest "+fmtMoney(v.earnest)+", seller credit "+fmtMoney(v.sellerCredit)+", estimated cash to close "+fmtMoney(Math.round(cashToClose))+", est. monthly P&I "+fmtMoney(pi)+". Under 130 words.").then(function(t){ setAT(t); setAL(false); }); }} style={{marginTop:8}}>✨ Explain to buyer</Btn>
          <AIBox text={aiTxt} loading={aiLd} />
        </Card>
      </div>
    </div>
  );
}

/* ── TRANSACTIONS ────────────────────────────────────────────── */
function PanelTx({txs,setTxs}) {

  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function save() {
    if(!form.addr||!form.client) return;
    setTxs(function(p){ return [...p,{id:uid(),...form,price:Number(form.price)||0,comm:Number(form.comm)||2.5,split:Number(form.split)||80,stage:0,checks:TSTAGES.map(function(){ return false; })}]; });

  }

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Transactions</div>
      <Btn v="primary" onClick={function(){ setShow(function(p){ return !p; }); }} style={{marginBottom:10}}>+ New Transaction</Btn>
      {show && (
        <Card>
          <Row><Fld label="Address"><input style={inp} placeholder="456 Oak St" value={form.addr} onChange={fld("addr")} /></Fld><Fld label="Client"><input style={inp} placeholder="Dennis Spero" value={form.client} onChange={fld("client")} /></Fld></Row>
          <Row cols="1fr 1fr 1fr 1fr 1fr">
            <Fld label="Type"><select style={inp} value={form.type} onChange={fld("type")}><option>Listing</option><option>Buyer</option></select></Fld>
            <Fld label="Sale price ($)"><input style={inp} type="number" placeholder="715000" value={form.price} onChange={fld("price")} /></Fld>
            <Fld label="Commission (%)"><input style={inp} type="number" step=".1" placeholder="2.5" value={form.comm} onChange={fld("comm")} /></Fld>
            <Fld label="Your split (%)"><input style={inp} type="number" step="1" placeholder="80" value={form.split} onChange={fld("split")} /></Fld>
            <Fld label="Est. close date"><input style={inp} type="date" value={form.closeDate} onChange={fld("closeDate")} /></Fld>
          </Row>
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <Btn v="primary" onClick={save}>Add Transaction</Btn>
            <Btn onClick={function(){ setShow(false); }}>Cancel</Btn>
          </div>
        </Card>
      )}
      {txs.length===0 ? <div style={{color:C.t3,fontSize:13,marginTop:8}}>No transactions yet.</div> : txs.map(function(tx){
        var comm = Number(tx.comm)||2.5;
        var split = (tx.split===0||tx.split) ? Number(tx.split) : 80;
        var basis = tx.basis==="net" ? "net" : "gross";
        var base = (basis==="net" && Number(tx.netPrice)>0) ? Number(tx.netPrice) : tx.price;
        var grossComm = base ? Math.round(base * comm / 100) : 0;
        var netComm = Math.round(grossComm * split / 100);
        return (
          <Card key={tx.id} style={{marginTop:8}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8}}>
              <div>
                <div style={{fontSize:14,fontWeight:600}}>{tx.addr}</div>
                <div style={{fontSize:12,color:C.t2}}>{tx.client} · {tx.type}{tx.price?" · "+fmtMoney(tx.price):""}</div>
              </div>
              {tx.closeDate && <div style={{fontSize:11,color:C.t3,background:C.s2,borderRadius:5,padding:"3px 8px",whiteSpace:"nowrap"}}>Closes {fmtDate(tx.closeDate)}</div>}
            </div>

            {/* Commission + brokerage split calculator */}
            {tx.price > 0 && (
              <div style={{background:C.aL,border:"1px solid "+C.aB,borderRadius:7,padding:"10px 12px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:".06em",minWidth:78}}>Comm. on</div>
                  <Btn v={basis==="gross"?"primary":"def"} style={{fontSize:10,padding:"3px 8px"}} onClick={function(){ updTx(tx.id,"basis","gross"); }}>Gross price</Btn>
                  <Btn v={basis==="net"?"primary":"def"} style={{fontSize:10,padding:"3px 8px"}} onClick={function(){ updTx(tx.id,"basis","net"); }}>Net price</Btn>
                  {basis==="net" && <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{fontSize:12,color:C.t2}}>Net $</span><input type="number" value={tx.netPrice||""} onChange={function(e){ updTx(tx.id,"netPrice",Number(e.target.value)||0); }} placeholder={String(tx.price||"")} style={{...inp,width:95,fontSize:12,textAlign:"right"}} /></span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:".06em",minWidth:78}}>Gross comm.</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" step=".1" min="0" max="10" value={comm} onChange={function(e){ updTx(tx.id,"comm",Number(e.target.value)||0); }} style={{...inp,width:62,fontSize:13,fontWeight:600,textAlign:"right"}} />
                    <span style={{fontSize:13,color:C.t2}}>%  ×  {fmtMoney(base)} <span style={{color:C.t3,fontSize:11}}>({basis})</span></span>
                  </div>
                  <div style={{fontSize:15,fontWeight:700,color:C.t2,marginLeft:"auto"}}>{fmtMoney(grossComm)}</div>
                </div>
                <div style={{borderTop:"1px solid "+C.aB,margin:"8px 0",paddingTop:8,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:".06em",minWidth:78}}>Your split</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" step="1" min="0" max="100" value={split} onChange={function(e){ updTx(tx.id,"split",Number(e.target.value)||0); }} style={{...inp,width:62,fontSize:13,fontWeight:600,textAlign:"right"}} />
                    <span style={{fontSize:13,color:C.t2}}>%  to you  ·  brokerage keeps {fmtMoney(grossComm-netComm)}</span>
                  </div>
                  <div style={{fontSize:17,fontWeight:700,color:C.ac,marginLeft:"auto"}}>= {fmtMoney(netComm)}</div>
                </div>
              </div>
            )}

            {/* Closing date (editable inline if not set) */}
            {!tx.closeDate && (
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:12,color:C.t3}}>Closing date:</span>
                <input type="date" style={{...inp,width:150,fontSize:12}} value={tx.closeDate||""} onChange={function(e){ updTx(tx.id,"closeDate",e.target.value); }} />
              </div>
            )}

            <div style={{display:"flex",gap:4,marginBottom:8}}>
              {TSTAGES.map(function(s,si){ return <div key={si} style={{flex:1,textAlign:"center",padding:"4px 2px",fontSize:11,borderRadius:6,cursor:"pointer",fontWeight:si===tx.stage?600:400,background:si<tx.stage?C.aL:si===tx.stage?C.gL:C.s2,border:"1px solid "+(si<tx.stage?C.aB:si===tx.stage?C.gB:C.br),color:si<tx.stage?C.ac:si===tx.stage?C.go:C.t3}} onClick={function(){ setTxs(function(p){ return p.map(function(t){ return t.id===tx.id?{...t,stage:si}:t; }); }); }}>{s}</div>; })}
            </div>
            {TSTAGES.slice(0,tx.stage+1).map(function(s,si){
              return <div key={si} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid "+C.br,cursor:"pointer"}} onClick={function(){ setTxs(function(p){ return p.map(function(t){ return t.id===tx.id?{...t,checks:t.checks.map(function(c,j){ return j===si?!c:c; })}:t; }); }); }}><div style={{width:18,height:18,borderRadius:4,border:"1.5px solid "+(tx.checks[si]?C.ac:C.brm),background:tx.checks[si]?C.ac:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,flexShrink:0}}>{tx.checks[si]?"✓":""}</div><span style={{fontSize:13,color:tx.checks[si]?C.t3:C.tx,textDecoration:tx.checks[si]?"line-through":"none"}}>{s}</span></div>;
            })}
          </Card>
        );
      })}
    </div>
  );
}

/* ── LISTING PRESENTATION ────────────────────────────────────── */
function PanelListing({leads}) {
  var [form,setForm] = useState({addr:"",zip:"",client:"",leadId:"",beds:"",baths:"",sqft:"",features:""});
  var [comps,setComps] = useState([]);
  var [checks,setChecks] = useState(LPCKLIST.map(function(){ return false; }));
  var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  var [ref,setRef] = useState(null); var [refBusy,setRefBusy] = useState(false);
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function tog(i){ setChecks(function(p){ return p.map(function(v,j){ return j===i?!v:v; }); }); }
  var done = checks.filter(Boolean).length;

  var sellers = (leads||[]).filter(function(l){ return l.type==="seller"||l.type==="both"; });
  function pickClient(e){
    var id=e.target.value; var L=(leads||[]).find(function(x){ return x.id===id; });
    setForm(function(p){ if(!L) return {...p,leadId:""}; return {...p, leadId:id, client:L.first+" "+L.last, addr:L.addr||p.addr, zip:(L.zip||p.zip||"")}; });
  }

  /* Pull subject reference data: PropertyRadar AVM + ZIP market numbers */
  function pullRef(){
    setRefBusy(true);
    var street=((form.addr||"").split(",")[0]||"").trim();
    var city=((form.addr||"").split(",")[1]||"").trim();
    var zipGuess = form.zip || ((form.addr||"").match(/\b(\d{5})\b/)||[])[1] || "";
    var h = { headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY} };
    var hvP = street ? fetch(SUPABASE_URL+"/functions/v1/homevalue?street="+encodeURIComponent(street)+"&city="+encodeURIComponent(city)+"&zip="+encodeURIComponent(zipGuess)+"&state=CA",h).then(function(r){return r.json();}).catch(function(){return null;}) : Promise.resolve(null);
    hvP.then(function(hv){
      hv = (hv && hv.value && !hv.error) ? hv : null;
      var zip = (hv && hv.zip) || zipGuess;   // use PropertyRadar's ZIP → neighborhood-specific market, not county
      if(hv){ setForm(function(p){ return {...p, zip:(p.zip||zip||""), beds:(p.beds||(hv.beds!=null?String(hv.beds):"")), baths:(p.baths||(hv.baths!=null?String(hv.baths):"")), sqft:(p.sqft||(hv.sqft!=null?String(hv.sqft):"")) }; }); }
      fetch(SUPABASE_URL+"/functions/v1/market"+(zip?"?zip="+zip:""),h).then(function(r){return r.json();}).catch(function(){return null;}).then(function(mk){
        mk = (mk && mk.median && !mk.error) ? mk : null;
        setRef({ avm:(hv&&hv.value)||null, median:(mk&&mk.median)||null, dom:(mk&&mk.dom)||null, area:(mk&&mk.area)||"", county:!zip });
        setRefBusy(false);
      });
    });
  }

  function addComp(){ setComps(function(p){ return [...p,{addr:"",price:"",sqft:"",beds:"",baths:"",dom:""}]; }); }
  function compFld(i,k){ return function(e){ var v=e.target.value; setComps(function(p){ return p.map(function(c,j){ return j===i?{...c,[k]:v}:c; }); }); }; }
  function delComp(i){ setComps(function(p){ return p.filter(function(c,j){ return j!==i; }); }); }
  function ppsf(c){ var pr=Number(c.price), sf=Number(c.sqft); return (pr>0&&sf>0)? pr/sf : 0; }
  var valid = comps.filter(function(c){ return ppsf(c)>0; });
  var avgPpsf = valid.length ? valid.reduce(function(a,c){ return a+ppsf(c); },0)/valid.length : 0;
  var subjSqft = Number(form.sqft)||0;
  var suggested = (avgPpsf>0 && subjSqft>0) ? Math.round(avgPpsf*subjSqft) : 0;
  var lowP = suggested? Math.round(suggested*0.97):0, highP = suggested? Math.round(suggested*1.03):0;

  function bad(t){ return !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0; }
  function runAIfb(prompt, fb){ setAL(true); callAI(prompt).then(function(t){ setAT(bad(t)? fb() : t); setAL(false); }); }

  function cmaLocal(){
    var lines=["CMA — "+(form.addr||"the property")+(form.client?" for "+form.client:"")];
    if(ref&&ref.median) lines.push("Local market: median "+ref.median+(ref.dom?", ~"+ref.dom+" days on market":"")+(ref.area?" ("+ref.area+")":""));
    if(ref&&ref.avm) lines.push("Automated value estimate: "+ref.avm);
    lines.push("\nComparable sales:");
    valid.forEach(function(c){ lines.push("• "+(c.addr||"comp")+" — $"+Number(c.price).toLocaleString()+(c.sqft?" / "+Number(c.sqft).toLocaleString()+" sqft ($"+Math.round(ppsf(c))+"/sqft)":"")+(c.dom?" · "+c.dom+" DOM":"")); });
    if(avgPpsf>0) lines.push("\nAvg comp price/sqft: $"+Math.round(avgPpsf));
    if(suggested>0) lines.push("Suggested value ("+subjSqft.toLocaleString()+" sqft × $"+Math.round(avgPpsf)+"): ~$"+suggested.toLocaleString()+"  (range $"+lowP.toLocaleString()+"–$"+highP.toLocaleString()+")");
    return lines.join("\n");
  }
  function genCMA(){
    var compStr = valid.map(function(c){ return (c.addr||"comp")+": $"+Number(c.price).toLocaleString()+(c.sqft?", "+c.sqft+" sqft":"")+(c.beds?", "+c.beds+"bd":"")+(c.dom?", "+c.dom+" DOM":""); }).join("; ");
    runAIfb("Write clear, confident CMA talking points for "+AGENT.name+" presenting to "+(form.client||"a seller")+" for "+(form.addr||"their home")+" ("+(form.beds||"?")+"bd/"+(form.baths||"?")+"ba, "+(form.sqft||"?")+" sqft). Comparable sales: "+(compStr||"comparable homes")+". Avg comp price/sqft: $"+Math.round(avgPpsf)+". Suggested list range: $"+lowP.toLocaleString()+"–$"+highP.toLocaleString()+". "+(ref&&ref.median?"Local median "+ref.median+", ~"+ref.dom+" days on market. ":"")+"Explain the recommended price using the comps, justify the range, and build seller confidence. Under 180 words.", cmaLocal);
  }
  function marketingLocal(){
    return "Marketing Plan — "+(form.addr||"your home")+"\n\n• Professional HDR photography, video & 3D tour\n• Premium MLS listing (BAREIS) syndicated to Zillow, Realtor.com & Redfin\n• Targeted social media campaign + paid digital ads\n• Email blast to my buyer database and agent network\n• Open house + broker tour\n• Just-listed postcards to the neighborhood\n• Weekly updates with showing feedback & market activity\n\n— "+AGENT.name+", "+AGENT.co;
  }
  function objectionsLocal(){
    return "Objection handlers:\n\n• \"We want to try FSBO.\" I get wanting to save on commission — but FSBOs typically net less and take longer. My marketing creates buyer competition, which drives a higher price. Let me show you the net numbers.\n\n• \"Another agent said they'd list it higher.\" Anyone can name a high price to win the listing — but overpricing means sitting on the market and reducing. I price to the comps so we attract strong offers fast.\n\n• \"Your commission is too high.\" My fee covers full-service marketing and negotiation that nets you more. What matters is what ends up in your pocket — and my listings sell for more, faster.\n\n• \"We're waiting for a better market.\" Timing the market is risky. Let's look at what your home would do today versus the risk of waiting.\n\n— "+AGENT.name;
  }
  function pitchLocal(){
    return "Hi "+(form.client||"there")+",\n\nThank you for considering me to sell "+(form.addr||"your home")+". Here's how I'll get you the best price, fastest:\n\n• Accurate pricing from real comparable sales (not guesswork)\n• Full-service marketing that maximizes buyer demand\n• Sharp negotiation to protect your bottom line\n• Clear communication every step of the way\n\nI'd love to walk you through my plan and the numbers. When works for you?\n\n— "+AGENT.name+", "+AGENT.co+" | "+AGENT.phone;
  }

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Listing Presentation & CMA</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <Card title="Property Details">
            <Row><Fld label="Client"><select style={inp} value={form.leadId} onChange={pickClient}><option value="">— select a seller —</option>{sellers.map(function(l){ return <option key={l.id} value={l.id}>{l.first} {l.last}</option>; })}</select></Fld><Fld label="Address"><input style={inp} placeholder="123 Oak St, Santa Rosa" value={form.addr} onChange={fld("addr")} /></Fld></Row>
            <Row cols="1fr 1fr 1fr 1fr"><Fld label="ZIP"><input style={inp} placeholder="95403" value={form.zip} onChange={fld("zip")} /></Fld><Fld label="Beds"><input style={inp} type="number" value={form.beds} onChange={fld("beds")} /></Fld><Fld label="Baths"><input style={inp} type="number" value={form.baths} onChange={fld("baths")} /></Fld><Fld label="Sq ft"><input style={inp} type="number" value={form.sqft} onChange={fld("sqft")} /></Fld></Row>
            <Fld label="Key features"><textarea style={{...inp,minHeight:50,resize:"vertical"}} placeholder="Remodeled kitchen, solar, mountain views…" value={form.features} onChange={fld("features")} /></Fld>
            <div style={{marginTop:6}}><Btn v="sky" style={{fontSize:11}} onClick={pullRef}>{refBusy?"⏳ Pulling…":"📍 Pull value + market data"}</Btn></div>
            {ref && <div style={{fontSize:12,color:C.t2,marginTop:8,background:C.s2,borderRadius:7,padding:"8px 10px",lineHeight:1.6}}>{ref.avm?<div>🏠 Est. value (PropertyRadar): <b>{ref.avm}</b></div>:<div style={{color:C.t3}}>No automated value (check the street address).</div>}{ref.median?<div>📊 {ref.county?"Sonoma County (county-wide — add a ZIP for neighborhood numbers)":((ref.area||"Local")+" market")}: median <b>{ref.median}</b>{ref.dom?", ~"+ref.dom+" days on market":""}</div>:null}</div>}
          </Card>

          <Card title={"Comparable Sales ("+valid.length+")"}>
            <div style={{fontSize:11,color:C.t3,marginBottom:8,lineHeight:1.5}}>Pull recent <b>sold</b> comps from BAREIS (same area, ~3–6 months, similar beds/sqft) and enter them here. The suggested price comes from their average price-per-sqft.</div>
            {comps.length===0 && <div style={{fontSize:12,color:C.t3,marginBottom:8}}>No comps yet.</div>}
            {comps.map(function(c,i){
              return <div key={i} style={{display:"flex",gap:4,marginBottom:5,alignItems:"center",flexWrap:"wrap"}}>
                <input style={{...inp,flex:2,minWidth:110,fontSize:11}} placeholder="Comp address" value={c.addr} onChange={compFld(i,"addr")} />
                <input style={{...inp,width:78,fontSize:11}} type="number" placeholder="Sold $" value={c.price} onChange={compFld(i,"price")} />
                <input style={{...inp,width:60,fontSize:11}} type="number" placeholder="sqft" value={c.sqft} onChange={compFld(i,"sqft")} />
                <input style={{...inp,width:44,fontSize:11}} placeholder="DOM" value={c.dom} onChange={compFld(i,"dom")} />
                <span style={{fontSize:10,color:C.t3,minWidth:60}}>{ppsf(c)>0?"$"+Math.round(ppsf(c))+"/sf":""}</span>
                <span style={{color:C.ro,cursor:"pointer",fontSize:12}} onClick={function(){ delComp(i); }}>✕</span>
              </div>;
            })}
            <Btn style={{fontSize:11,marginTop:4}} onClick={addComp}>+ Add comp</Btn>
            {suggested>0 && <div style={{marginTop:10,background:C.aL,border:"1px solid "+C.aB,borderRadius:8,padding:"10px 12px"}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.t3}}>Suggested list price</div>
              <div style={{fontSize:22,fontWeight:700,color:C.ac,fontFamily:"monospace"}}>{fmtMoney(suggested)}</div>
              <div style={{fontSize:11,color:C.t2}}>Range {fmtMoney(lowP)}–{fmtMoney(highP)} · based on avg ${Math.round(avgPpsf)}/sqft × {subjSqft.toLocaleString()} sqft</div>
            </div>}
          </Card>

          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <Btn v="primary" onClick={genCMA}>✨ Generate CMA talking points</Btn>
            <Btn onClick={function(){ runAIfb("Write a warm listing pitch for "+AGENT.name+" for "+(form.addr||"the property")+" with "+(form.client||"the seller")+". Features: "+(form.features||"great condition")+". "+(suggested?"Suggested price ~$"+suggested.toLocaleString()+".":"")+" Under 150 words.", pitchLocal); }}>Pitch script</Btn>
            <Btn onClick={function(){ runAIfb("Write a marketing plan for "+(form.addr||"a Santa Rosa listing")+" for "+AGENT.name+" ("+AGENT.co+"). Include: pro photography/video, MLS + syndication, social, paid ads, open house, email list, neighborhood postcards, weekly updates. Bullets, under 160 words.", marketingLocal); }}>Marketing plan</Btn>
            <Btn onClick={function(){ runAIfb("Give "+AGENT.name+" 4 confident, empathetic listing objection handlers: FSBO, another agent lists higher, commission too high, waiting for a better market. Concise.", objectionsLocal); }}>Objections</Btn>
          </div>
          <AIBox text={aiTxt} loading={aiLd} />
        </div>

        <Card title={"Prep Checklist (" + done + "/" + LPCKLIST.length + ")"}>
          <div style={{height:6,background:C.s3,borderRadius:3,marginBottom:10,overflow:"hidden"}}><div style={{height:"100%",background:C.ac,borderRadius:3,width:(done/LPCKLIST.length*100)+"%",transition:"width .3s"}} /></div>
          {LPCKLIST.map(function(item,i){
            return <div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 0",borderBottom:"1px solid "+C.br,cursor:"pointer"}} onClick={function(){ tog(i); }}><div style={{width:18,height:18,borderRadius:4,border:"1.5px solid "+(checks[i]?C.ac:C.brm),background:checks[i]?C.ac:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,flexShrink:0}}>{checks[i]?"✓":""}</div><span style={{fontSize:13,color:checks[i]?C.t3:C.tx,textDecoration:checks[i]?"line-through":"none"}}>{item}</span></div>;
          })}
        </Card>
      </div>
    </div>
  );
}

/* ── BUYER CRITERIA ──────────────────────────────────────────── */
function PanelBuyer({leads}) {
  var [profiles,setProfiles] = useState([]);
  var [form,setForm] = useState({name:"",leadId:"",beds:"",baths:"",sqft:"",sqftMax:"",budget:"",fin:"Pre-approved",move:"",areas:"",propType:"Single family",notes:""});
  var [must,setMust] = useState([]); var [avoid,setAvoid] = useState([]);
  var [mIn,setMIn] = useState(""); var [aIn,setAIn] = useState("");
  var [st,setSt] = useState(""); var [aiTxt,setAT] = useState(""); var [aiLd,setAL] = useState(false);
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function chip(type,val){ if(!val.trim()) return; if(type==="must"){ setMust(function(p){ return [...p,val]; }); setMIn(""); } else { setAvoid(function(p){ return [...p,val]; }); setAIn(""); } }
  var cs = function(type){ return {display:"inline-flex",alignItems:"center",gap:4,fontSize:12,padding:"3px 9px",borderRadius:20,fontWeight:500,margin:"2px",background:type==="avoid"?C.rL:C.aL,color:type==="avoid"?C.ro:C.ac,border:"1px solid "+(type==="avoid"?C.rB:C.aB)}; };
  function save() { if(!form.name.trim()){setSt("Enter buyer name.");return;} setProfiles(function(p){ return [{id:uid(),...form,must:[...must],avoid:[...avoid],saved:toDay()},...p]; }); setSt(form.name+"'s profile saved."); setMust([]); setAvoid([]); setForm({name:"",leadId:"",beds:"",baths:"",sqft:"",sqftMax:"",budget:"",fin:"Pre-approved",move:"",areas:"",propType:"Single family",notes:""}); }
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Buyer Search Criteria</div>
      {profiles.map(function(p){

        <Row cols="1fr 1fr 1fr"><Fld label="Max budget ($)"><input style={inp} type="number" placeholder="750000" value={form.budget} onChange={fld("budget")} /></Fld><Fld label="Financing"><select style={inp} value={form.fin} onChange={fld("fin")}><option>Pre-approved</option><option>Cash buyer</option><option>Not pre-approved</option><option>FHA</option><option>VA</option></select></Fld><Fld label="Target move date"><input style={inp} placeholder="Sept 2026" value={form.move} onChange={fld("move")} /></Fld></Row>
