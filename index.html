function PanelActionPlans({leads,enrolled,setEnrolled}) {
  var [plan, setPlan] = useState("newLead");
  var [selLead, setSelLead] = useState("");
  var [aiTxt, setAT] = useState("");
  var [aiLd, setAL] = useState(false);
  var [expandedStep, setExpandedStep] = useState(null);
  var [customizing, setCustomizing] = useState(null);
  var [customText, setCustomText] = useState("");

  var current = ACTION_PLANS[plan];

  function enroll() {
    if (!selLead) return;
    var lead = leads.find(function(l){ return l.id === selLead; });
    if (!lead) return;
    var existing = enrolled.find(function(e){ return e.leadId === selLead && e.plan === plan; });
    if (existing) return;
    setEnrolled(function(p){ return [...p, {id:uid(), leadId:selLead, plan:plan, planLabel:current.label, name:lead.first+" "+lead.last, enrolled:toDay(), step:0, done:[]}]; });
    setSelLead("");
  }

  function markStep(enrollId, stepIdx) {
    setEnrolled(function(p){ return p.map(function(e){
      if (e.id !== enrollId) return e;
      var done = e.done.includes(stepIdx) ? e.done.filter(function(d){ return d !== stepIdx; }) : [...e.done, stepIdx];
      var step = Math.min(current.steps.length - 1, done.length);
      return {...e, done:done, step:step};
    }); });
  }

  function removeEnroll(id) {
    setEnrolled(function(p){ return p.filter(function(e){ return e.id !== id; }); });
  }

  function generateAI(stepScript, leadName) {
    setAL(true);
    callAI("Personalize this real estate follow-up message for " + (leadName||"a Sonoma County lead") + ". Keep the same structure and length but make it feel more personal and specific to Sonoma County. Message: " + stepScript).then(function(t){ setAT(t); setAL(false); });
  }

  var planKeys = Object.keys(ACTION_PLANS);
  var enrolledForPlan = enrolled.filter(function(e){ return e.plan === plan; });

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Action Plans</div>
      <div style={{fontSize:13,color:C.t2,marginBottom:14}}>Marketing automation sequences for your leads — enroll a contact and track every touchpoint.</div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {planKeys.map(function(key){
          var p = ACTION_PLANS[key];
          var active = plan === key;
          return (
            <div key={key} onClick={function(){ setPlan(key); setExpandedStep(null); setAT(""); }} style={{padding:"8px 14px",borderRadius:8,cursor:"pointer",border:"1px solid "+(active?p.colorB:C.br),background:active?p.colorL:C.sur,color:active?p.color:C.t2,fontWeight:active?600:400,fontSize:12,transition:"all .12s"}}>
              {p.label}
            </div>
          );
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <Card style={{borderTop:"3px solid "+current.color}}>
            <div style={{fontSize:14,fontWeight:700,color:current.color,marginBottom:4}}>{current.label}</div>
            <div style={{fontSize:12,color:C.t2,marginBottom:14}}>{current.desc}</div>

            {current.steps.map(function(step, i){
              var isOpen = expandedStep === i;
              var isCustom = customizing === i;
              return (
                <div key={i} style={{borderBottom:"1px solid "+C.br,paddingBottom:10,marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={function(){ setExpandedStep(isOpen ? null : i); setAT(""); }}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:current.colorL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{step.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:current.color,background:current.colorL,padding:"1px 7px",borderRadius:20,border:"1px solid "+current.colorB}}>{step.day}</span>
                        <span style={{fontSize:10,color:C.t3,fontWeight:500}}>{step.type}</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:500,color:C.tx,marginTop:2}}>{step.title}</div>
                    </div>
                    <div style={{fontSize:11,color:C.t3}}>{isOpen ? "▲" : "▼"}</div>
                  </div>
                  {isOpen && (
                    <div style={{marginTop:10,marginLeft:38}}>
                      {isCustom ? (
                        <div>
                          <textarea style={{...inp,minHeight:120,resize:"vertical",lineHeight:1.6,fontSize:12}} value={customText} onChange={function(e){ setCustomText(e.target.value); }} />
                          <div style={{display:"flex",gap:6,marginTop:6}}>
                            <Btn v="primary" style={{fontSize:11}} onClick={function(){ setCustomizing(null); }}>Save</Btn>
                            <Btn style={{fontSize:11}} onClick={function(){ setCustomizing(null); }}>Cancel</Btn>
                          </div>
                        </div>
                      ) : (
                        <div style={{background:C.s2,borderRadius:7,padding:"10px 12px",fontSize:12,lineHeight:1.7,color:C.tx,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>
                          {step.script}
                        </div>
                      )}
                      {!isCustom && (
                        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                          <Btn style={{fontSize:11}} onClick={function(){ setCustomizing(i); setCustomText(step.script); }}>✏️ Customize</Btn>
                          <Btn v="gold" style={{fontSize:11}} onClick={function(){ generateAI(step.script, selLead ? (leads.find(function(l){ return l.id===selLead; })||{}).first : ""); }}>✨ AI personalize</Btn>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
            <AIBox text={aiTxt} loading={aiLd} />
          </Card>
        </div>

        <div>
          <Card title="Enroll a Lead">
            <Fld label="Select lead">
              <select style={inp} value={selLead} onChange={function(e){ setSelLead(e.target.value); }}>
                <option value="">— choose a lead —</option>
                {leads.map(function(l){ return <option key={l.id} value={l.id}>{l.first} {l.last} · {l.type} · {TICON[l.temp]}</option>; })}
              </select>
            </Fld>
            <div style={{fontSize:12,color:C.t3,margin:"6px 0 10px"}}>Plan: <span style={{color:current.color,fontWeight:600}}>{current.label}</span> · {current.steps.length} touchpoints</div>
            <Btn v="primary" onClick={enroll}>+ Enroll in Plan</Btn>
          </Card>

          <Card title={"Enrolled Contacts (" + enrolledForPlan.length + ")"}>
            {enrolledForPlan.length === 0 ? (
              <div style={{color:C.t3,fontSize:13}}>No contacts enrolled in this plan yet.</div>
            ) : enrolledForPlan.map(function(e){
              var pct = Math.round(e.done.length / current.steps.length * 100);
              var stepsDone = e.done.length;
              var stepsLeft = current.steps.length - stepsDone;
              return (
                <div key={e.id} style={{borderBottom:"1px solid "+C.br,paddingBottom:12,marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <div style={{width:30,height:30,borderRadius:"50%",background:current.colorL,display:"flex",alignItems:"center",justifyContent:"center",color:current.color,fontSize:11,fontWeight:700,flexShrink:0}}>{e.name.split(" ").map(function(n){ return n[0]; }).join("").slice(0,2)}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{e.name}</div>
                      <div style={{fontSize:11,color:C.t3}}>Enrolled {fmtDate(e.enrolled)} · {stepsDone}/{current.steps.length} steps done</div>
                    </div>
                    <Btn v="rose" style={{fontSize:10,padding:"3px 7px"}} onClick={function(){ removeEnroll(e.id); }}>✕</Btn>
                  </div>
                  <div style={{height:5,background:C.s3,borderRadius:3,overflow:"hidden",marginBottom:8}}>
                    <div style={{height:"100%",background:current.color,borderRadius:3,width:pct+"%",transition:"width .3s"}} />
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
                    {current.steps.map(function(step, i){
                      var done = e.done.includes(i);
                      return (
                        <div key={i} onClick={function(){ markStep(e.id, i); }} style={{padding:"5px 6px",borderRadius:6,cursor:"pointer",border:"1px solid "+(done?current.colorB:C.br),background:done?current.colorL:C.s2,fontSize:10,textAlign:"center",color:done?current.color:C.t3,fontWeight:done?600:400,lineHeight:1.3}}>
                          {done ? "✓ " : ""}{step.day}<br/><span style={{fontSize:9}}>{step.type}</span>
                        </div>
                      );
                    })}
                  </div>
                  {stepsLeft > 0 && (
                    <div style={{marginTop:8,fontSize:12,color:C.t2,background:C.s2,borderRadius:6,padding:"6px 8px"}}>
                      Next: <span style={{fontWeight:600,color:current.color}}>{current.steps[e.done.length] ? current.steps[e.done.length].day+" — "+current.steps[e.done.length].title : "All done!"}</span>
                    </div>
                  )}
                  {stepsLeft === 0 && (
                    <div style={{marginTop:8,fontSize:12,color:C.ac,background:C.aL,borderRadius:6,padding:"6px 8px",fontWeight:600}}>
                      Plan complete! Move this lead to long-term nurture.
                    </div>
                  )}
                </div>
              );
            })}
          </Card>

          <Card title="Plan Summary">
            <div style={{fontSize:12,color:C.t2,marginBottom:8}}>All active enrollments across all plans</div>
            {enrolled.length === 0 ? <div style={{color:C.t3,fontSize:13}}>No active enrollments.</div> : enrolled.map(function(e){
              var ap = ACTION_PLANS[e.plan];
              if (!ap) return null;
              var pct = Math.round(e.done.length / ap.steps.length * 100);
              return (
                <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid "+C.br}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500}}>{e.name}</div>
                    <div style={{fontSize:11,color:C.t3}}>{ap.label.split("—")[0].trim()}</div>
                  </div>
                  <div style={{width:60,height:5,background:C.s3,borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",background:ap.color,borderRadius:3,width:pct+"%"}} />
                  </div>
                  <div style={{fontSize:11,color:C.t3,fontFamily:"monospace",minWidth:30}}>{pct}%</div>
                </div>
              );
            })}
          </Card>
        </div>
      </div>
    </div>
  );
}

/* ── MY LISTINGS ─────────────────────────────────────────────── */
function PanelListings({listings,setListings,setTab}) {
  var blank = {addr:"",price:"",beds:"",baths:"",sqft:"",feature:"",link:""};
  var [form,setForm] = useState(blank);
  var [editId,setEditId] = useState("");
  var [st,setSt] = useState("");
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function save(){
    if(!form.addr.trim()){ setSt("Enter at least an address."); return; }
    if(editId){ setListings(function(p){ return p.map(function(x){ return x.id===editId?{...x,...form}:x; }); }); setSt("Listing updated."); setEditId(""); }
    else { setListings(function(p){ return [{id:uid(),...form,added:toDay()},...p]; }); setSt("Listing saved — it's now ready in the 🏡 New Listing email."); }
    setForm(blank);
  }
  function edit(l){ setEditId(l.id); setForm({addr:l.addr||"",price:l.price||"",beds:l.beds||"",baths:l.baths||"",sqft:l.sqft||"",feature:l.feature||"",link:l.link||""}); setSt(""); }
  function del(id){ setListings(function(p){ return p.filter(function(x){ return x.id!==id; }); }); if(editId===id){ setEditId(""); setForm(blank); } }
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🏡 My Listings</div>
      <div style={{fontSize:12.5,color:C.t2,marginBottom:14,lineHeight:1.5,maxWidth:680}}>Save a home's details once here. Then the <b>🏡 New Listing</b> button on any lead auto-fills a ready-to-send announcement email — real address, price, and specs, no placeholders to type.</div>
      <Card title={editId?"Edit listing":"Add a listing"}>
        <Row><Fld label="Address *"><input style={inp} placeholder="456 Oak St, Santa Rosa, CA 95403" value={form.addr} onChange={fld("addr")} /></Fld><Fld label="Price ($)"><input style={inp} type="number" placeholder="715000" value={form.price} onChange={fld("price")} /></Fld></Row>
        <Row cols="1fr 1fr 1fr"><Fld label="Beds"><input style={inp} placeholder="3" value={form.beds} onChange={fld("beds")} /></Fld><Fld label="Baths"><input style={inp} placeholder="2" value={form.baths} onChange={fld("baths")} /></Fld><Fld label="Sq ft"><input style={inp} placeholder="1850" value={form.sqft} onChange={fld("sqft")} /></Fld></Row>
        <Fld label="Standout feature"><input style={inp} placeholder="Remodeled kitchen, big backyard, walk to downtown" value={form.feature} onChange={fld("feature")} /></Fld>
        <Fld label="Listing link"><input style={inp} placeholder="https://… (Zillow, MLS, or your website)" value={form.link} onChange={fld("link")} /></Fld>
        <div style={{display:"flex",gap:7,marginTop:8}}>
          <Btn v="primary" onClick={save}>{editId?"Update listing":"Save listing"}</Btn>
          {editId && <Btn onClick={function(){ setEditId(""); setForm(blank); setSt(""); }}>Cancel</Btn>}
        </div>
        {st && <div style={{fontSize:12,color:C.ac,marginTop:5}}>{st}</div>}
      </Card>
      {listings.length===0 ? (
        <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:20}}>No listings saved yet. Add one above and it'll be ready to drop into New-Listing emails.</div></Card>
      ) : listings.map(function(l){
        return (
          <Card key={l.id} style={{marginTop:8}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontWeight:600,fontSize:14}}>{l.addr}</div>
                <div style={{fontSize:12,color:C.t2,marginTop:2}}>{l.price?"$"+Number(l.price).toLocaleString():"—"}{l.beds?" · "+l.beds+" bd":""}{l.baths?" · "+l.baths+" ba":""}{l.sqft?" · "+Number(l.sqft).toLocaleString()+" sqft":""}</div>
                {l.feature && <div style={{fontSize:12,color:C.t3,marginTop:2}}>{l.feature}</div>}
                {l.link && <div style={{fontSize:11,color:C.sk,marginTop:2,wordBreak:"break-all"}}>{l.link}</div>}
              </div>
              <div style={{display:"flex",gap:5}}>
                <Btn style={{fontSize:11}} onClick={function(){ edit(l); }}>Edit</Btn>
                <Btn v="rose" style={{fontSize:11}} onClick={function(){ del(l.id); }}>Delete</Btn>
              </div>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

/* ── AUTO-NURTURE ────────────────────────────────────────────── */
function PanelNurture({leads,setLeads,setTab,setFocusLead,market}) {
  var mk = market||{};
  var [stats,setStats] = useState({price:(mk.median||"$715K"),dom:((mk.dom||"28")+" days"),inv:((mk.inv||"~840")+" homes"),note:""});
  var [drafts,setDrafts] = useState({});
  var [busyId,setBusyId] = useState("");
  var [view,setView] = useState("due");
  var [confirmBulk,setConfirmBulk] = useState("");
  function statf(k){ return function(e){ setStats(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function pullMarket(){ setStats(function(p){ return {...p, price:(mk.median||p.price), dom:(mk.dom?mk.dom+" days":p.dom), inv:(mk.inv?mk.inv+" homes":p.inv)}; }); }

  var enrolled = leads.filter(nurtureOn);
  var due = enrolled.filter(nurtureDue);
  var list = (view==="due" ? due : enrolled).slice().sort(function(a,b){ return (a.lastNurtured||"")>(b.lastNurtured||"")?1:-1; });

  function setCadence(l,c){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,autoNurture:c}:x; }); }); }
  function markSent(l){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,lastNurtured:toDay(),lc:toDay(),log:[...(x.log||[]),toDay()+" — market update sent (auto-nurture)"]}:x; }); }); }
  function genFor(l){
    setBusyId(l.id);
    callAI("Write a short warm market-update email to "+l.first+" "+l.last+", a "+l.temp+" "+l.type+" lead in "+areaOf(l)+" (Sonoma County). Current local stats: median price "+stats.price+", average days on market "+stats.dom+", active listings "+stats.inv+". "+(stats.note?"My angle: "+stats.note+". ":"")+"Reference their city/area ("+areaOf(l)+") naturally rather than just 'Sonoma County'. Under 130 words. Warm, local, genuinely helpful, not pushy. Start with 'Hi "+l.first+",'. End with a soft invitation to reach out anytime. Body only. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+" | DRE #"+AGENT.lic+" | thealiciajohnsonhomes.com.").then(function(t){
      var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
      setDrafts(function(p){ var n={...p}; n[l.id]= bad ? draftMarketLocal(l, mk) : t; return n; }); setBusyId("");   // AI failed → built-in template (live market data)
    });
  }
  var SUBJ = "Your Sonoma County market update";
  function gmailFor(l){ var b=drafts[l.id]; if(!b||!l.email) return; window.open("https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&to="+encodeURIComponent(l.email)+(l.email2?"&cc="+encodeURIComponent(l.email2):"")+"&su="+encodeURIComponent(SUBJ)+"&body="+encodeURIComponent(b),"_blank"); markSent(l); }
  function mailFor(l){ var b=drafts[l.id]; if(!b) return; window.location.href="mailto:"+(l.email||"")+"?subject="+encodeURIComponent(SUBJ)+"&body="+encodeURIComponent(b); markSent(l); }
  function copyFor(l){ var b=drafts[l.id]; if(!b) return; if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(b); }
  function bulkSet(c){ setLeads(function(p){ return p.map(function(x){ return {...x,autoNurture:c}; }); }); setConfirmBulk(""); }
  function bulkSetCold(c){ setLeads(function(p){ return p.map(function(x){ return x.temp==="cold"?{...x,autoNurture:c}:x; }); }); setConfirmBulk(""); }

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🔄 Auto-Nurture</div>
      <div style={{fontSize:12.5,color:C.t2,marginBottom:8,lineHeight:1.5,maxWidth:680}}>Keep leads warm on autopilot. Enroll any lead at <b>Every 2 weeks</b> or <b>Monthly</b> and they'll appear here when they're due for a market-update email. The app writes each one with AI — you glance, then send with one click (your Gmail). Nothing goes out without you.</div>
      <div style={{fontSize:11.5,color:C.sk,background:C.skL,border:"1px solid "+C.skB,borderRadius:7,padding:"7px 10px",marginBottom:14,maxWidth:680,lineHeight:1.5}}>💡 <b>Read receipts:</b> these send through Gmail, so if you've installed a free Gmail tracker (e.g. Mailtrack), you'll see ✓✓ when a lead opens the email — right in your inbox.</div>

      <Card title="Current market numbers (used in every email)">
        <Row cols="1fr 1fr 1fr"><Fld label="Median price"><input style={inp} value={stats.price} onChange={statf("price")} /></Fld><Fld label="Days on market"><input style={inp} value={stats.dom} onChange={statf("dom")} /></Fld><Fld label="Active listings"><input style={inp} value={stats.inv} onChange={statf("inv")} /></Fld></Row>
        <Btn onClick={pullMarket} style={{fontSize:11,margin:"2px 0 6px"}}>↻ Use latest Market Data{mk.marketDate?" ("+mk.marketDate+")":""}</Btn>
        <Fld label="Your angle (optional)"><input style={inp} value={stats.note} onChange={statf("note")} placeholder="Rates eased this month — good window for buyers…" /></Fld>
      </Card>

      <Card title="Quick enroll">
        <div style={{fontSize:12,color:C.t2,marginBottom:8}}>Set a cadence for many leads at once. Fine-tune any individual lead from its popup or the list below.</div>
        {confirmBulk ? (
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:C.ro}}>{confirmBulk==="all-bi"?"Enroll ALL "+leads.length+" leads at Every 2 weeks?":confirmBulk==="all-mo"?"Enroll ALL "+leads.length+" leads at Monthly?":confirmBulk==="cold-mo"?"Enroll all COLD leads at Monthly?":"Turn auto-nurture OFF for every lead?"}</span>
            <Btn v="primary" style={{fontSize:11}} onClick={function(){ if(confirmBulk==="all-bi")bulkSet("biweekly"); else if(confirmBulk==="all-mo")bulkSet("monthly"); else if(confirmBulk==="cold-mo")bulkSetCold("monthly"); else bulkSet("off"); }}>Yes, do it</Btn>
            <Btn style={{fontSize:11}} onClick={function(){ setConfirmBulk(""); }}>Cancel</Btn>
          </div>
        ) : (
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <Btn v="sky" style={{fontSize:11}} onClick={function(){ setConfirmBulk("cold-mo"); }}>All cold → Monthly</Btn>
            <Btn style={{fontSize:11}} onClick={function(){ setConfirmBulk("all-mo"); }}>All leads → Monthly</Btn>
            <Btn style={{fontSize:11}} onClick={function(){ setConfirmBulk("all-bi"); }}>All leads → Every 2 weeks</Btn>
            <Btn v="rose" style={{fontSize:11}} onClick={function(){ setConfirmBulk("off"); }}>Turn all off</Btn>
          </div>
        )}
      </Card>

      <div style={{display:"flex",borderBottom:"1px solid "+C.br,margin:"14px 0 12px"}}>
        {[["due","Due now ("+due.length+")"],["enrolled","All enrolled ("+enrolled.length+")"]].map(function(x){
          return <div key={x[0]} style={{padding:"7px 14px",fontSize:12.5,fontWeight:500,cursor:"pointer",color:view===x[0]?C.ac:C.t3,borderBottom:"2px solid "+(view===x[0]?C.ac:"transparent"),marginBottom:-1}} onClick={function(){ setView(x[0]); }}>{x[1]}</div>;
        })}
      </div>

      {list.length===0 ? (
        <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:20}}>{view==="due"?"🎉 Nobody's due right now. Enrolled leads appear here when it's time for their next touch.":"No leads enrolled yet. Use Quick enroll above, or open a lead → 🔄 Auto-Nurture → pick a cadence."}</div></Card>
      ) : list.map(function(l){
        var d = drafts[l.id];
        return (
          <Card key={l.id} style={{marginBottom:8}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontWeight:600,color:C.ac,cursor:"pointer"}} title="View & edit lead" onClick={function(){ if(setFocusLead)setFocusLead(l.id); setTab("leads"); }}>{l.first} {l.last}</span>
                  <Tag t={l.temp}>{TICON[l.temp]} {l.temp}</Tag>
                  {nurtureDue(l) && <span style={{fontSize:10,fontWeight:700,color:C.go,background:C.gL,border:"1px solid "+C.gB,borderRadius:5,padding:"1px 6px"}}>DUE</span>}
                </div>
                <div style={{fontSize:11,color:C.t3,marginTop:2}}>{l.email||"⚠️ no email on file"} · {NURLBL[l.autoNurture]} · {l.lastNurtured?"last sent "+fmtDate(l.lastNurtured):"never sent"}{nurtureNext(l)?" · next "+fmtDate(nurtureNext(l)):""}</div>
              </div>
              <select style={{...inp,width:135,fontSize:12}} value={l.autoNurture} onChange={function(e){ setCadence(l,e.target.value); }}>
                <option value="off">Off</option><option value="biweekly">Every 2 weeks</option><option value="monthly">Monthly</option>
              </select>
              <Btn v="gold" style={{fontSize:11}} onClick={function(){ genFor(l); }}>{busyId===l.id?"⏳ Writing…":(d?"↻ Rewrite":"✨ Draft update")}</Btn>
            </div>
            {(busyId===l.id||d) && <AIBox text={d} loading={busyId===l.id} />}
            {d && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                <Btn v="primary" style={{fontSize:11}} onClick={function(){ gmailFor(l); }}>📧 Email via Gmail</Btn>
                <Btn style={{fontSize:11}} onClick={function(){ copyFor(l); }}>📋 Copy</Btn>
                <Btn style={{fontSize:11}} onClick={function(){ markSent(l); }}>✓ Mark sent</Btn>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}

/* ── MARKET EMAIL ────────────────────────────────────────────── */
function PanelMktgEmail({leads,market}) {
  var mk = market||{};
  var [form,setForm] = useState({
    subject:"Sonoma County Market Update",
    seg:"all",
    price:(mk.median||"$715K"),
    dom:((mk.dom||"28")+" days"),
    inv:((mk.inv||"~840")+" homes"),
    note:""
  });
  var [prev,setPrev] = useState(""); var [ld,setLd] = useState(false); var [st,setSt] = useState("");
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function pullMarket(){ setForm(function(p){ return {...p, price:(mk.median||p.price), dom:(mk.dom?mk.dom+" days":p.dom), inv:(mk.inv?mk.inv+" homes":p.inv)}; }); setSt("Filled from your latest Market Data"+(mk.marketDate?" ("+mk.marketDate+")":"")+"."); }
  function indLead(){ if(form.seg.indexOf("lead:")!==0) return null; var id=form.seg.slice(5); return (leads||[]).find(function(x){ return x.id===id; })||null; }
  function segLabel(){ var L=indLead(); if(L) return L.first+" "+L.last; return {all:"all clients",buyer:"buyer clients",seller:"seller clients",warm:"warm and hot leads",drip:"drip list"}[form.seg]; }
  function segLeads(){
    var L=indLead(); if(L) return L.email?[L]:[];
    return (leads||[]).filter(function(l){
      if(!l.email) return false;
      if(form.seg==="buyer") return l.type==="buyer"||l.type==="both";
      if(form.seg==="seller") return l.type==="seller"||l.type==="both";
      if(form.seg==="warm") return l.temp==="hot"||l.temp==="warm";
      if(form.seg==="drip") return l.nurture==="drip";
      return true;
    });
  }
  function marketLocal(){
    var L=indLead();
    var greet = L ? ("Hi "+L.first+",") : "Hi there!";
    var area = L ? (cityOf(L)||"Sonoma County") : "Sonoma County";
    return greet+"\n\nHere's a quick snapshot of the "+area+" market this month:\n\n• Median price: "+form.price+"\n• Days on market: "+form.dom+"\n• Active listings: "+form.inv+"\n\n"+(form.note?form.note+"\n\n":"")+"Whether you're thinking about buying or selling — or just curious what your home is worth — I'm always happy to talk it through. No pressure, ever.\n\nWarm regards,\n"+AGENT.name+"\n"+AGENT.phone+" | "+AGENT.email+"\nDRE #"+AGENT.lic+"\nthealiciajohnsonhomes.com";
  }
  function gen() {
    setLd(true); setPrev(""); setSt("");
    var L = indLead();
    var aud = L ? ("a specific client, "+L.first+" "+L.last+(L.addr?(" at "+L.addr):"")+", a "+L.type+" lead in "+(cityOf(L)||"Sonoma County")) : ("my "+segLabel()+" in Sonoma County");
    var greetInstr = L ? ("Write it personally to them and start with 'Hi "+L.first+",'.") : "This goes to a list, so start with a warm general greeting like 'Hi there!' — do NOT use a [First Name] placeholder.";
    callAI("Write a short warm market-update email to "+aud+". Stats: median price "+form.price+", days on market "+form.dom+", active listings "+form.inv+". "+(form.note?"My angle: "+form.note+". ":"")+greetInstr+" Under 150 words. Warm, local. Body only. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+" | DRE #"+AGENT.lic+" | thealiciajohnsonhomes.com.").then(function(t){
      var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
      setPrev(bad ? marketLocal() : t); setLd(false);   // AI failed → built-in template, so it always produces an email
    });
  }
  function send() {
    if(!prev){ setSt("Generate the email first."); return; }
    var rec = segLeads();
    if(!rec.length){ setSt("No contact with an email here."); return; }
    var L = indLead();
    var url = "https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&su="+encodeURIComponent(form.subject||"")+"&body="+encodeURIComponent(prev);
    if(L){ url += "&to="+encodeURIComponent(L.email)+(L.email2?("&cc="+encodeURIComponent(L.email2)):""); window.open(url,"_blank"); setSt("Opening Gmail to "+L.first+" "+L.last+"…"); }
    else { url += "&bcc="+encodeURIComponent(rec.map(function(l){ return l.email; }).join(",")); window.open(url,"_blank"); setSt("Opening Gmail with "+rec.length+" recipient"+(rec.length>1?"s":"")+" BCC'd — review and send."); }
  }
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>Market Update Email</div>
      <Card title="Settings">
        <Row><Fld label="Subject"><input style={inp} value={form.subject} onChange={fld("subject")} /></Fld><Fld label="Send to"><select style={inp} value={form.seg} onChange={fld("seg")}><option value="all">All leads</option><option value="buyer">Buyers only</option><option value="seller">Sellers only</option><option value="warm">Warm + Hot</option><option value="drip">Drip list</option><optgroup label="— One individual lead —">{(leads||[]).filter(function(l){ return l.email; }).slice().sort(function(a,b){ return (a.first+a.last).localeCompare(b.first+b.last); }).map(function(l){ return <option key={l.id} value={"lead:"+l.id}>{l.first} {l.last}</option>; })}</optgroup></select></Fld></Row>
        <Row cols="1fr 1fr 1fr"><Fld label="Median price"><input style={inp} value={form.price} onChange={fld("price")} /></Fld><Fld label="Days on market"><input style={inp} value={form.dom} onChange={fld("dom")} /></Fld><Fld label="Active listings"><input style={inp} value={form.inv} onChange={fld("inv")} /></Fld></Row>
        <Btn onClick={pullMarket} style={{fontSize:11,marginBottom:6}}>↻ Use latest Market Data</Btn>
        <Fld label="Your angle (optional)"><textarea style={{...inp,minHeight:55,resize:"vertical"}} value={form.note} onChange={fld("note")} placeholder="Rates held steady — good news for buyers…" /></Fld>
        <div style={{display:"flex",gap:7,marginTop:8}}>
          <Btn v="primary" onClick={gen}>✨ Generate Email</Btn>
          {prev && <Btn v="gold" onClick={send}>{indLead()?("📧 Send to "+indLead().first):"📧 Send to List (BCC via Gmail)"}</Btn>}
        </div>
        {st && <div style={{fontSize:12,color:C.ac,marginTop:5}}>{st}</div>}
      </Card>
      {(ld||prev) && <Card title="Preview"><div style={{fontSize:11,color:C.t3,marginBottom:8,fontFamily:"monospace"}}>From: {AGENT.name} &lt;{AGENT.email}&gt;</div><AIBox text={prev} loading={ld} /></Card>}
    </div>
  );
}

  function flash(m){ setMsg(m); setTimeout(function(){ setMsg(""); }, 2600); }
  function copy(txt){
    if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(function(){ flash("Copied ✓ — paste into Buffer / Metricool"); }, function(){ flash("Couldn't copy — select manually."); });

  // Copy the caption and open Buffer, where Alicia attaches her photo/video and schedules.

    if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt);
    window.open(BUFFER_URL, "_blank", "noopener");
  }
  function gen(){
    var t = SOCIAL_TOPICS.find(function(x){ return x.k===topic; }) || SOCIAL_TOPICS[0];
    var plat = SOCIAL_PLATFORMS.find(function(x){ return x.id===platform; }) || SOCIAL_PLATFORMS[0];
    var kw = (mcKey.trim() || TOPIC_KEYWORD[topic] || "HOME").toUpperCase();
    var kwInfo = MANYCHAT_KEYWORDS.find(function(x){ return x.k===kw; });
    var ctaBit = "Just before the hashtags, add a short call to action on its own line telling people to comment the word "+kw+" to get "+(kwInfo?kwInfo.use.toLowerCase():"the details")+" (this triggers an automated DM). ";
    var mk = market || {};
    var marketBit = (topic==="market") ? ("Use ONLY these current local stats — do not invent or change any numbers: median price "+(mk.median||"$715K")+", "+(mk.dom||"28")+" days on market, "+(mk.inv||"~840")+" active listings"+(mk.marketDate?" (as of "+mk.marketDate+")":"")+". ") : "";

    callAI("Write "+t.p+". Platform: "+plat.l+". Voice: "+AGENT.name+", "+AGENT.co+", "+AGENT.city+" — warm, upbeat, professional, not salesy. "+marketBit+(extra?("Extra detail to include: "+extra+". "):"")+"Keep it tight for social ("+(plat.id==="linkedin"?"up to ~120 words":"under ~60 words")+"). "+ctaBit+"Add 2–4 relevant local hashtags at the end (e.g. #SonomaCounty #SantaRosaRealEstate). Return only the post text, ready to paste.").then(function(txt){
      var bad = !txt || txt.indexOf("⚠️")===0 || txt.indexOf("API error")===0 || txt.indexOf("Fetch error")===0;
      if(bad){ setSt(txt||"AI error — check your key."); } else { setDraft(txt); }

  function saveDraft(status){

            <div style={{fontSize:12.5,fontWeight:700,marginBottom:2}}>📤 Publish · Buffer <span style={{fontSize:10,fontWeight:600,color:C.ac,background:C.aL,border:"1px solid "+C.aB,borderRadius:20,padding:"1px 6px"}}>connected</span></div>
            <div style={{fontSize:11.5,color:C.t2,lineHeight:1.5}}>Your Buffer has <b>Instagram</b> &amp; <b>TikTok</b> connected. The <b>Send to Buffer</b> buttons copy the caption and open Buffer — just add media and schedule. Add Facebook/LinkedIn in Buffer to post there too.</div>

        <div style={{fontSize:12,color:C.t3,marginBottom:8,lineHeight:1.5}}>Set each of these as a <b>comment keyword trigger</b> in ManyChat, then use the matching word in your post's call to action. When someone comments it, ManyChat auto-DMs them and captures the lead.</div>

              <span style={{fontSize:11,fontWeight:700,color:C.ac,background:C.aL,border:"1px solid "+C.aB,borderRadius:6,padding:"2px 8px",fontFamily:"monospace",minWidth:64,textAlign:"center"}}>{m.k}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:600}}>{m.use}</div>

        <div style={{fontSize:11,color:C.go,marginTop:8,lineHeight:1.5}}>💡 Always ask for an <b>email or phone</b> inside the DM flow — that's what turns a commenter into a real lead you can add to your pipeline.</div>
      </Card>

      {/* Content calendar */}
      <Card title={"🗓️ Content calendar — "+list.length+" post"+(list.length===1?"":"s")+"  ·  "+counts.idea+" ideas · "+counts.scheduled+" scheduled · "+counts.posted+" posted"}>
        {list.length===0 ? (

        ) : list.map(function(p){

                <span style={{display:"inline-flex",fontSize:10.5,padding:"1px 8px",borderRadius:20,fontWeight:600,background:stt.bg,color:stt.tx,border:"1px solid "+stt.bd}}>{stt.l}</span>

                <Btn onClick={function(){ copy(p.text); }} style={{fontSize:11}}>📋 Copy</Btn>
                {delId===p.id
                  ? <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
                      <Btn v="rose" onClick={function(){ del(p.id); setDelId(null); flash("Post deleted"); }} style={{fontSize:11}}>Confirm delete</Btn>
                      <Btn onClick={function(){ setDelId(null); }} style={{fontSize:11}}>Cancel</Btn>
                    </span>
                  : <Btn v="rose" onClick={function(){ setDelId(p.id); }} style={{fontSize:11}}>🗑 Delete</Btn>}
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

/* ── HOME ANNIVERSARIES ──────────────────────────────────────── */
function PanelAnniv({leads,setLeads}){
  var [aiFor,setAiFor]=useState(null);
  var [aiTxt,setAiTxt]=useState("");
  var [aiLd,setAiLd]=useState(false);
  var [msg,setMsg]=useState("");
  var [sendingId,setSendingId]=useState(null);
  function flash(m){ setMsg(m); setTimeout(function(){ setMsg(""); },3500); }
  var SIGTXT = "\n\n— "+AGENT.name+"\n"+AGENT.co+"\n"+AGENT.phone+" | "+AGENT.email+"\nDRE #"+AGENT.lic+"\nthealiciajohnsonhomes.com";   // plain-text signature for Copy / Gmail
  function copy(txt){ var full=(txt||"")+SIGTXT; if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(full).then(function(){ flash("Copied ✓"); }); }
  var clients = (leads||[]).filter(function(l){ return l.closeDate; }).map(function(l){
    var na=nextAnniversary(l.closeDate);
    return {l:l, na:na, days:daysUntil(na), years:anniversaryYears(l.closeDate,na)};
  }).sort(function(a,b){ return (a.days===null?9e9:a.days)-(b.days===null?9e9:b.days); });
  function draft(c){
    setAiFor(c.l.id); setAiLd(true); setAiTxt("");
    callAI("Write a short warm 'happy home anniversary' email from "+AGENT.name+", "+AGENT.co+" in "+AGENT.city+", to a past client named "+c.l.first+". It has been "+c.years+" year"+(c.years===1?"":"s")+" since they closed on their home"+(c.l.addr?(" at "+c.l.addr):"")+". Warmly congratulate them on the anniversary, say it was a pleasure helping them, and gently offer to be a resource (a free updated home value, or referrals) with zero pressure. Under 110 words. Do NOT include a sign-off, signature, or the agent's name/contact at the end — the email template already adds that. End after the final sentence of the message.").then(function(t){
      var bad=!t||t.indexOf("⚠️")===0||t.indexOf("API error")===0||t.indexOf("Fetch error")===0;
      setAiTxt(bad?(t||"AI error — check your key."):t); setAiLd(false);
    });
  }
  function gmail(c, body){
    var su="Happy "+c.years+"-Year Home Anniversary! 🎉";
    var url="https://mail.google.com/mail/?view=cm&fs=1&to="+encodeURIComponent(c.l.email||"")+"&su="+encodeURIComponent(su)+"&body="+encodeURIComponent((body||"")+SIGTXT);
    window.open(url,"_blank","noopener");
  }
  // Send the drafted email straight through Brevo (server-side transactional send).
  function sendBrevo(c, body){
    if(!c.l.email){ flash("⚠️ No email on file for "+c.l.first+" "+c.l.last); return; }
    if(!body || !body.trim()){ flash("Draft the email first."); return; }
    setSendingId(c.l.id);
    var su="Happy "+c.years+"-Year Home Anniversary! 🎉";
    callBrevo("send", { to:[{email:c.l.email, name:((c.l.first||"")+" "+(c.l.last||"")).trim()}], subject:su, html:brandedEmailHtml(body, su), senderEmail:BREVO_SENDER, senderName:AGENT.name, replyTo:AGENT.email }).then(function(res){
      setSendingId(null);
      if(res && res.ok){ markSent(c); flash("✓ Sent to "+c.l.email+" via Brevo"); }
      else { flash("⚠️ Send failed: "+((res&&res.error)||(res&&res.data&&res.data.message)||"unknown")+" — deploy the brevo function + set BREVO_API_KEY."); }
    });
  }
  function markSent(c){
    var yr=(c.na||toDay()).slice(0,4);
    setLeads(function(p){ return p.map(function(x){ return x.id===c.l.id?{...x,lastAnnivSent:yr,lc:toDay(),log:[...(x.log||[]),toDay()+" — "+c.years+"-yr home anniversary email sent"]}:x; }); });
    flash("Logged ✓ — "+c.l.first+" marked emailed for "+yr);
  }
  function unmark(c){ setLeads(function(p){ return p.map(function(x){ return x.id===c.l.id?{...x,lastAnnivSent:null}:x; }); }); }
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🎉 Home Anniversaries</div>
      <div style={{fontSize:12.5,color:C.t3,marginBottom:14,lineHeight:1.5}}>Every past client with a closing date shows up here, sorted by their next anniversary. A quick happy-anniversary note each year is one of the easiest ways to earn repeat business and referrals. Set the date on their lead card: <b>All Leads → open a lead → 🎉 Home closing date</b>.</div>
      {msg && <div style={{fontSize:12,color:C.ac,marginBottom:10,fontWeight:600}}>{msg}</div>}
      {clients.length===0 ? (
        <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:20}}>No closing dates yet. Open a past client under <b>All Leads</b> and set their <b>🎉 Home closing date</b> — they will appear here automatically.</div></Card>
      ) : clients.map(function(c){
        var soon = c.days!==null && c.days<=30;
        var sentThisYr = c.l.lastAnnivSent === (c.na||"").slice(0,4);
        return (
          <Card key={c.l.id} style={soon?{border:"1px solid "+C.aB,background:C.aL}:{}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{fontSize:14,fontWeight:700}}>{c.l.first} {c.l.last} <span style={{fontSize:11,fontWeight:600,color:C.ac}}>· {c.years}-year</span></div>
                <div style={{fontSize:11.5,color:C.t2}}>{c.l.addr||"—"}</div>
                <div style={{fontSize:11.5,color:C.t3,marginTop:2}}>Closed {fmtDate(c.l.closeDate)} · 🎂 next {fmtDate(c.na)} {c.days===0?"(today!)":(c.days!==null?("(in "+c.days+"d)"):"")}{sentThisYr?" · ✓ emailed "+c.l.lastAnnivSent:""}</div>
                {!c.l.email && <div style={{fontSize:11,color:C.ro,marginTop:2}}>⚠️ no email on file</div>}
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <Btn v="primary" style={{fontSize:11}} onClick={function(){ draft(c); }}>✨ Draft email</Btn>
                {sentThisYr
                  ? <Btn style={{fontSize:11}} onClick={function(){ unmark(c); }}>↩ Unmark</Btn>
                  : <Btn v="gold" style={{fontSize:11}} onClick={function(){ markSent(c); }}>✓ Mark emailed</Btn>}
              </div>
            </div>
            {aiFor===c.l.id && (aiLd || aiTxt) && (
              aiLd ? <AIBox loading={true} /> :
              <div style={{marginTop:8}}>
                <AIBox text={aiTxt} />
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
                  {c.l.email && <Btn v="primary" onClick={function(){ sendBrevo(c, aiTxt); }} style={{fontSize:11}}>{sendingId===c.l.id?"Sending…":"📧 Send via Brevo"}</Btn>}
                  {c.l.email && <Btn onClick={function(){ gmail(c, aiTxt); }} style={{fontSize:11}}>Open in Gmail</Btn>}
                  <Btn onClick={function(){ copy(aiTxt); }} style={{fontSize:11}}>📋 Copy</Btn>
                  <Btn v="gold" onClick={function(){ markSent(c); }} style={{fontSize:11}}>✓ Mark emailed</Btn>
                </div>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}

/* ── AI EMAIL ────────────────────────────────────────────────── */
function PanelAIEmail() {
  var [form,setForm] = useState({to:"",subject:"",prompt:""}); var [email,setEmail] = useState(""); var [ld,setLd] = useState(false); var [st,setSt] = useState(""); var [noKey,setNoKey] = useState(false);
  function fld(k){ return function(e){ setForm(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function gen() {
    if(!form.prompt.trim()){ setSt("Tell the writer what the email should say first."); return; }
    setNoKey(false); setLd(true); setEmail(""); setSt("");
    callAI("Write a professional warm real estate email from "+AGENT.name+", "+AGENT.co+", "+AGENT.city+". "+(form.subject?"Subject: \""+form.subject+"\".":" ")+" Instructions: "+form.prompt+". Body only, start with greeting, under 150 words. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+" | DRE #"+AGENT.lic+" | thealiciajohnsonhomes.com.").then(function(t){
      var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
      if(bad){ setSt(t||"AI error — check your key."); setEmail(""); } else { setEmail(t); }
      setLd(false);
    });
  }
  function recipient(){ return form.to.indexOf("@")>-1 ? form.to.trim() : ""; }
  function sendGmail() {
    if(!email) return;
    window.open("https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&to="+encodeURIComponent(recipient())+"&su="+encodeURIComponent(form.subject||"")+"&body="+encodeURIComponent(email),"_blank");
    setSt("Opening Gmail compose…");
  }
  function sendMail() {
    if(!email) return;
    window.location.href = "mailto:"+recipient()+"?subject="+encodeURIComponent(form.subject||"")+"&body="+encodeURIComponent(email);
    setSt("Opening your mail app…");
  }
  function copyEmail() {
    if(!email) return;
    if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(email).then(function(){ setSt("Copied ✓"); });
  }
  function sendBrevo() {
    if(!email) return;
    var to = recipient();
    if(!to){ setSt("Add a valid email address in the To field to send via Brevo."); return; }
    if(!(form.subject||"").trim()){ setSt("Add a subject line to send via Brevo."); return; }
    setSt("📨 Sending tracked email via Brevo…");
    callBrevo("send",{to:[{email:to}], subject:form.subject, html:brandedEmailHtml(email, null, {footer:false}), senderEmail:BREVO_SENDER, senderName:AGENT.name, replyTo:AGENT.email, tags:["ai-email"]}).then(function(res){
      if(res && res.messageId) setSt("✓ Sent via Brevo to "+to+" — opens & clicks will track in your Brevo dashboard.");
      else setSt("⚠️ Brevo send failed: "+((res&&res.error)||(res&&res.data&&res.data.message)||"unknown")+". Make sure your sender is verified in Brevo.");
    });
  }
  var TMPL = [["Follow-up","Write a warm, brief follow-up to a lead I've spoken with before. Reference that I enjoyed connecting, see how their home search/sale is going, and offer to help with next steps. End with an easy question."],["Cold call follow-up","Write a follow-up email after a cold call to a Sonoma County homeowner. Thank them for taking my call, briefly recap that I can help them understand their home's value and options, and offer a free no-obligation home valuation. Warm, low-pressure, ends with a soft ask to connect."],["Open house follow-up","Write a same-day open house follow-up. Thank them for stopping by, ask what they thought of the home, mention I can send similar listings or set up private showings, and invite them to reach out. Friendly and helpful."],["My credentials / intro","Write a warm introduction email establishing my credentials as a Sonoma County real estate agent with Excellerate Real Estate: local market expertise, full-service marketing, strong negotiation, and attentive communication. Build trust without bragging, and end inviting them to a quick no-pressure chat."],["Listing appt recap","Thank the seller for the listing appointment. Recap pricing strategy and staging recommendations. Confirm next steps and timeline."],["Showing recap","Summarize 3 homes toured. Ask what resonated most. Suggest next round of showings."],["Offer submitted","Tell buyer the offer is in. Explain what to expect next. Stay positive and confident."],["Price reduction","Gently recommend a price adjustment based on market feedback. Frame as a strategy to generate more activity."],["Monthly nurture","Casual monthly check-in. No pressure. Include one Sonoma County market stat."],["Market update","Send a friendly Sonoma County market update. Include median price ~$715,000, average 28 days on market, and ~840 active listings. Keep it warm, local, and helpful with a soft call to reach out."],["Just listed","Announce a new home just listed. Include placeholders for [property address], [price], [# beds], [# baths], [square footage], [standout feature], and [listing link]. Invite to a private showing this week and note homes move fast."],["⭐ Review request (post-close)","Write a warm post-closing email to a client I just helped close. Congratulate them on their new home / successful sale, say how much I enjoyed working with them, and kindly ask if they'd leave a quick 5-star review to help other Sonoma County families. Direct them to my website's review page: thealiciajohnsonhomes.com/#reviews (they can click the review button there). Make it easy and low-pressure, and thank them genuinely."],["🤝 Referral ask","Write a warm, no-pressure referral email to a past client. Say it was a pleasure helping them, that referrals are the biggest compliment, and that I'd love to help anyone they know buying or selling in Sonoma County. Keep it genuine and light, and make it easy for them to pass my info along (name, 707-849-6775, thealiciajohnsonhomes.com)."]];
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>AI Email Writer</div>
      <Card>
        <Row><Fld label="To"><input style={inp} placeholder="Dennis Spero or dsspero@comcast.net" value={form.to} onChange={fld("to")} /></Fld><Fld label="Subject"><input style={inp} placeholder="Your listing appointment recap" value={form.subject} onChange={fld("subject")} /></Fld></Row>
        <Fld label="What should this email say?"><textarea style={{...inp,minHeight:80,resize:"vertical",lineHeight:1.5}} placeholder="e.g. Thank Dennis for the listing appt. Recap $715k pricing. Confirm photos Tuesday, go live Friday." value={form.prompt} onChange={fld("prompt")} /></Fld>
        <div style={{display:"flex",gap:7,marginTop:8,flexWrap:"wrap"}}>
          <Btn v="primary" onClick={gen}>✨ Generate Email</Btn>
          {email && <Btn v="gold" onClick={sendGmail}>📧 Email via Gmail</Btn>}
          {email && <Btn v="primary" onClick={sendBrevo}>📨 Send via Brevo (tracked)</Btn>}
          {email && <Btn onClick={copyEmail}>📋 Copy</Btn>}
        </div>
        {noKey && (
          <div style={{background:C.gL,border:"1px solid "+C.gB,borderRadius:8,padding:"10px 12px",marginTop:8,fontSize:12.5,color:C.go,lineHeight:1.5}}>
            ✨ <b>AI didn't respond.</b> Your secure AI function may still be deploying, or the Anthropic secret needs checking. Give it a minute and retry — if it keeps happening, tell me and I'll verify the setup.
          </div>
        )}
        {st && <div style={{fontSize:12,color:C.ac,marginTop:5}}>{st}</div>}
        <AIBox text={email} loading={ld} />
      </Card>
      <Card title="Quick Templates"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{TMPL.map(function(x){ return <Btn key={x[0]} onClick={function(){ setForm(function(p){ return {...p,prompt:x[1]}; }); }}>{x[0]} ↗</Btn>; })}</div></Card>
    </div>
  );
}

  );
}

function PanelRS({leads,setLeads}) {

  var [sg,setSg] = useState({city:"Santa Rosa", minP:"", maxP:"", beds:"", baths:"", type:"any"});
  var [links,setLinks] = useState(null);
  var [sgMsg,setSgMsg] = useState("");
  function sgf(k){ return function(e){ var v=e.target.value; setSg(function(p){ return {...p,[k]:v}; }); setLinks(null); }; }
  function digitsOf(s){ return s?String(s).replace(/[^0-9]/g,""):""; }
  function realtorUrl(g){
    var city=(g.city||"").trim().replace(/\s+/g,"-");
    var u="https://www.realtor.com/realestateandhomes-search/"+city+"_CA";
    if(g.type&&g.type!=="any") u+="/type-"+g.type;
    if(g.beds) u+="/beds-"+g.beds;
    if(g.baths) u+="/baths-"+g.baths;
    var mn=digitsOf(g.minP), mx=digitsOf(g.maxP);
    if(mn||mx) u+="/price-"+(mn||"na")+"-"+(mx||"na");
    return u+"/sby-6";  // sort by newest
  }
  function zillowUrl(g){
    var fs={sortSelection:{value:"days"}};
    var mn=digitsOf(g.minP), mx=digitsOf(g.maxP);
    if(mn||mx){ fs.price={}; if(mn) fs.price.min=Number(mn); if(mx) fs.price.max=Number(mx); }
    if(g.beds) fs.beds={min:Number(g.beds)};
    if(g.baths) fs.baths={min:Number(g.baths)};
    if(g.type==="single-family-home"){ fs.isSingleFamily={value:true}; fs.isTownhouse={value:false}; fs.isMultiFamily={value:false}; fs.isCondo={value:false}; fs.isManufactured={value:false}; fs.isLotLand={value:false}; fs.isApartment={value:false}; }
    var sqs={usersSearchTerm:(g.city||"")+", CA", filterState:fs, isListVisible:true, isMapVisible:false};
    return "https://www.zillow.com/homes/for_sale/?searchQueryState="+encodeURIComponent(JSON.stringify(sqs));
  }
  function genLinks(){ setLinks({r:realtorUrl(sg), z:zillowUrl(sg)}); setSgMsg(""); }
  function copyForBuyer(){

  var activeA = buyers.filter(function(l){ return l.mlsAlert; });
  var pending = buyers.filter(function(l){ return !l.mlsAlert; });
  var list = view==="pending"?pending:view==="active"?activeA:buyers;

  function critVal(l){ return (l.id in crit) ? crit[l.id] : (l.alertCriteria||""); }
  function saveCrit(l){ if(!(l.id in crit)) return; var v=crit[l.id]; setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,alertCriteria:v}:x; }); }); }
  function toggle(l){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,mlsAlert:!x.mlsAlert,mlsAlertDate:(!x.mlsAlert?toDay():null)}:x; }); }); }

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🔔 Buyer Alerts <span style={{fontSize:12,fontWeight:400,color:C.t3}}>· powered by your BAREIS MLS (free)</span></div>
      <div style={{fontSize:12.5,color:C.t2,marginBottom:12,lineHeight:1.5,maxWidth:710}}>BAREIS can automatically email your buyers new listings that match their search — automated listing alerts, included free with your MLS membership. Set each buyer up once in BAREIS (steps below), then track who's enrolled here. Note each buyer's criteria so it's easy to recreate or update.</div>

      <Card title={<span style={{cursor:"pointer"}} onClick={function(){ setShowSteps(function(s){ return !s; }); }}>How to set up a buyer's auto-alert in BAREIS (Paragon) {showSteps?"▾":"▸"}</span>}>
        {showSteps && <div>
          <ol style={{margin:0,paddingLeft:18,fontSize:12.5,color:C.t2,lineHeight:1.75}}>
            <li>In BAREIS, go to <b>Contacts</b> → <b>Add Contact</b> → enter the buyer's name + email → <b>Save</b>. (You can add a spouse / 2nd email too.)</li>
            <li>Open the contact → <b>Buyer Activity</b> → <b>Add Search</b> → <b>Add New Search</b>.</li>
            <li>Pick the <b>Class</b> (e.g. Residential) and enter their criteria — price, beds/baths, areas — then click <b>Search</b>.</li>
            <li>Click the green <b>Save Search</b> button → name it → <b>Save</b>, and turn on <b>auto-notification (email)</b> when prompted.</li>
            <li>Come back here and flip that buyer's <b>Alert active</b> switch to track it.</li>
          </ol>
          <div style={{fontSize:11,color:C.t3,marginTop:8}}>Tip: BAREIS sends one notification per saved search, and you can pause a contact (set Inactive) instead of deleting. Want me to walk you through it live on your screen? Just ask.</div>
        </div>}
      </Card>

      <Card title="🔍 Buyer Search Links — Realtor.com &amp; Zillow">
        <div style={{fontSize:11.5,color:C.t3,marginBottom:10,lineHeight:1.5}}>Enter a buyer's criteria → generate pre-filtered <b>Realtor.com</b> &amp; <b>Zillow</b> searches to text or email them. They tap <b>“Save Search”</b> on the site and get automatic new-listing alerts — free &amp; compliant (no scraping).</div>
        <Row cols="1fr 1fr 1fr">
          <Fld label="City"><select style={inp} value={sg.city} onChange={sgf("city")}>{MARKET_CITIES.map(function(c){ return <option key={c.zip} value={c.name}>{c.name}</option>; })}</select></Fld>
          <Fld label="Min price ($)"><input style={inp} type="number" placeholder="500000" value={sg.minP} onChange={sgf("minP")} /></Fld>
          <Fld label="Max price ($)"><input style={inp} type="number" placeholder="750000" value={sg.maxP} onChange={sgf("maxP")} /></Fld>
        </Row>
        <Row cols="1fr 1fr 1fr">
          <Fld label="Beds (min)"><input style={inp} type="number" placeholder="3" value={sg.beds} onChange={sgf("beds")} /></Fld>
          <Fld label="Baths (min)"><input style={inp} type="number" placeholder="2" value={sg.baths} onChange={sgf("baths")} /></Fld>
          <Fld label="Home type"><select style={inp} value={sg.type} onChange={sgf("type")}><option value="any">Any</option><option value="single-family-home">Single-family</option><option value="condo">Condo</option><option value="townhome">Townhome</option><option value="multi-family-home">Multi-family</option></select></Fld>
        </Row>
        <Btn v="primary" onClick={genLinks}>🔍 Generate search links</Btn>
        {links && (
          <div style={{marginTop:10,background:C.s2,border:"1px solid "+C.br,borderRadius:8,padding:"10px 12px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              <span style={{fontSize:12,fontWeight:700,minWidth:80}}>🏠 Realtor.com</span>
              <a href={links.r} target="_blank" rel="noopener" style={{fontSize:12,color:C.ac,wordBreak:"break-all",flex:1}}>Open ↗</a>
              <Btn style={{fontSize:10,padding:"3px 8px"}} onClick={function(){ if(navigator.clipboard) navigator.clipboard.writeText(links.r).then(function(){ setSgMsg("✓ Realtor.com link copied."); }); }}>Copy</Btn>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:12,fontWeight:700,minWidth:80}}>🏠 Zillow</span>
              <a href={links.z} target="_blank" rel="noopener" style={{fontSize:12,color:C.ac,wordBreak:"break-all",flex:1}}>Open ↗</a>
              <Btn style={{fontSize:10,padding:"3px 8px"}} onClick={function(){ if(navigator.clipboard) navigator.clipboard.writeText(links.z).then(function(){ setSgMsg("✓ Zillow link copied."); }); }}>Copy</Btn>
            </div>
            <div style={{marginTop:9,borderTop:"1px solid "+C.br,paddingTop:9}}>
              <Btn v="gold" style={{fontSize:11}} onClick={copyForBuyer}>📋 Copy ready-to-send message for buyer</Btn>
            </div>
          </div>
        )}
        {sgMsg && <div style={{fontSize:11.5,color:C.ac,marginTop:7,fontWeight:600}}>{sgMsg}</div>}
      </Card>

      <Card>
        <div style={{display:"flex",gap:18,flexWrap:"wrap",alignItems:"center"}}>
          <div><div style={{fontSize:22,fontWeight:700,color:C.ac,fontFamily:"monospace"}}>{activeA.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Alerts active</div></div>
          <div><div style={{fontSize:22,fontWeight:700,color:C.go,fontFamily:"monospace"}}>{pending.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Need setup</div></div>
          <div><div style={{fontSize:22,fontWeight:700,color:C.t3,fontFamily:"monospace"}}>{buyers.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Total buyers</div></div>
        </div>
      </Card>

      <div style={{display:"flex",borderBottom:"1px solid "+C.br,margin:"14px 0 10px"}}>
        {[["pending","Need setup ("+pending.length+")"],["active","Active ("+activeA.length+")"],["all","All buyers ("+buyers.length+")"]].map(function(x){
          return <div key={x[0]} style={{padding:"7px 14px",fontSize:12.5,fontWeight:500,cursor:"pointer",color:view===x[0]?C.ac:C.t3,borderBottom:"2px solid "+(view===x[0]?C.ac:"transparent"),marginBottom:-1}} onClick={function(){ setView(x[0]); }}>{x[1]}</div>;
        })}
      </div>

      {list.length===0 ? <Card><div style={{color:C.t3,fontSize:13,textAlign:"center",padding:18}}>None here.</div></Card> : list.map(function(l){
        return (
          <Card key={l.id} style={{marginBottom:6}}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontWeight:600,fontSize:13}}>{l.first} {l.last} {l.mlsAlert?<span style={{fontSize:10,color:C.ac,marginLeft:4}}>🔔 alert active</span>:<span style={{fontSize:10,color:C.go,marginLeft:4}}>not set up</span>}</div>
                <div style={{fontSize:11,color:C.t3,fontFamily:"monospace"}}>{l.email||"⚠️ no email"}{l.phone?" · "+l.phone:""}{l.mlsAlertDate?" · since "+fmtDate(l.mlsAlertDate):""}</div>
                <input style={{...inp,fontSize:12,marginTop:6}} placeholder="Their search criteria — e.g. 3bd/2ba, $600–750k, NE Santa Rosa" value={critVal(l)} onChange={function(e){ var v=e.target.value; setCrit(function(p){ var n={...p}; n[l.id]=v; return n; }); }} onBlur={function(){ saveCrit(l); }} />
              </div>
              <Btn v={l.mlsAlert?"def":"primary"} style={{fontSize:11}} onClick={function(){ toggle(l); }}>{l.mlsAlert?"✓ Alert active":"Mark alert set up"}</Btn>

/* ── SELLER ALERTS (home value) ──────────────────────────────── */
function PanelSellerAlerts({leads,setLeads,market}) {
  var mk = market||{};
  var [view,setView] = useState("pending");
  var [note,setNote] = useState({});
  var [drafts,setDrafts] = useState({});
  var [busyId,setBusyId] = useState("");
  var [showSteps,setShowSteps] = useState(true);
  var [vals,setVals] = useState({});
  var [valBusy,setValBusy] = useState("");
  var [mktBusy,setMktBusy] = useState(false);
  var [mktMsg,setMktMsg] = useState("");
  var [stats,setStats] = useState({price:(mk.median||"$715K"),dom:((mk.dom||"28")+" days"),trend:"holding steady / up slightly year-over-year"});
  function pullMarket(){
    setMktBusy(true); setMktMsg("");
    fetch(SUPABASE_URL+"/functions/v1/market", {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}})
      .then(function(r){ return r.json(); })
      .then(function(d){
        setMktBusy(false);
        if(d && d.median && !d.error){ setStats(function(p){ return {...p, price:d.median, dom:(d.dom+" days")}; }); setMktMsg("✓ Updated from the web"+(d.marketDate?" — "+d.marketDate:"")); }
        else { setMktMsg("⚠️ Couldn't fetch market data."); }
      })
      .catch(function(){ setMktBusy(false); setMktMsg("⚠️ Couldn't reach the market service."); });
  }
  var sellers = leads.filter(function(l){ return l.type==="seller"||l.type==="both"; });
  var activeA = sellers.filter(function(l){ return l.sellerAlert; });
  var pending = sellers.filter(function(l){ return !l.sellerAlert; });
  var list = view==="pending"?pending:view==="active"?activeA:sellers;

  function statf(k){ return function(e){ setStats(function(p){ return {...p,[k]:e.target.value}; }); }; }
  function noteVal(l){ return (l.id in note) ? note[l.id] : (l.sellerAlertNote||""); }
  function saveNote(l){ if(!(l.id in note)) return; var v=note[l.id]; setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,sellerAlertNote:v}:x; }); }); }
  function toggle(l){ setLeads(function(p){ return p.map(function(x){ return x.id===l.id?{...x,sellerAlert:!x.sellerAlert,sellerAlertDate:(!x.sellerAlert?toDay():null)}:x; }); }); }
  function zipOf(l){ if(l.zip && /^\d{5}$/.test(l.zip.trim())) return l.zip.trim(); var mm=(l.addr||"").match(/\b(\d{5})\b/); return mm?mm[1]:""; }
  function streetOf(l){ return ((l.addr||"").split(",")[0]||"").trim(); }
  function fetchLocal(l){
    var zip = zipOf(l);
    if(!zip) return Promise.resolve(null);
    return fetch(SUPABASE_URL+"/functions/v1/market?zip="+zip, {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}})
      .then(function(r){ return r.json(); })
      .then(function(d){ return (d && d.median && !d.error) ? d : null; })
      .catch(function(){ return null; });
  }
  function fetchAVM(l){
    var street = streetOf(l);
    if(!street) return Promise.resolve(null);
    var qs = "street="+encodeURIComponent(street)+"&city="+encodeURIComponent(cityOf(l)||"")+"&state=CA"+(zipOf(l)?"&zip="+zipOf(l):"");
    return fetch(SUPABASE_URL+"/functions/v1/homevalue?"+qs, {headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}})
      .then(function(r){ return r.json(); })
      .then(function(d){ return (d && d.value && !d.error) ? d : null; })
      .catch(function(){ return null; });
  }
  function getVal(l){
    if(valBusy) return;
    setValBusy(l.id);
    fetchAVM(l).then(function(d){ setVals(function(p){ var n={...p}; n[l.id]= d || {error:true}; return n; }); setValBusy(""); });
  }
  function valueLocal(l, ov, avm){
    var sign = "\n\nWarm regards,\n"+AGENT.name+"\n"+AGENT.phone+" | "+AGENT.email+"\nDRE #"+AGENT.lic+"\nthealiciajohnsonhomes.com";
    var city = cityOf(l) || "Sonoma County";
    var price = (ov && ov.price) ? ov.price : stats.price;
    var dom = (ov && ov.dom) ? ov.dom : stats.dom;
    var addrline = l.addr ? " at "+l.addr : "";
    if(avm){
      return "Hi "+l.first+",\n\nI ran an updated value estimate on your home"+addrline+" — it's currently estimated around "+avm.value+".\n\nThat's an automated estimate; the real number depends on your home's condition, upgrades, and recent comparable sales in "+city+" (where the median is around "+price+" and homes are averaging "+dom+" on the market). I'd be glad to run a precise, no-obligation CMA tailored to your property so you know exactly where you stand.\n\nJust reply and I'll put it together for you."+sign;
    }
    return "Hi "+l.first+",\n\nI wanted to give you a quick update on home values in "+city+". Right now the local market there is sitting around a median of "+price+", with homes averaging "+dom+" on the market and values "+stats.trend+".\n\nThat means your home"+addrline+" may be worth more than you'd expect. If you're curious, I'd be glad to put together a free, no-obligation value estimate (a CMA) specific to your property.\n\nJust reply and I'll get it started for you."+sign;
  }
  function genFor(l){
    setBusyId(l.id);
    Promise.all([fetchAVM(l), fetchLocal(l)]).then(function(arr){
      var avm = arr[0], loc = arr[1];
      var ov = loc ? {price:loc.median, dom:(loc.dom+" days")} : null;
      var price = ov ? ov.price : stats.price;
      var dom = ov ? ov.dom : stats.dom;
      var area = cityOf(l) || "Sonoma County";
      var info = avm
        ? "Their home"+(l.addr?(" at "+l.addr):"")+" has a current automated value estimate of about "+avm.value+". Lead with this specific estimate. Note it's an automated estimate and that a personalized CMA from you is more accurate. Also weave in their local "+area+" market (median "+price+", avg "+dom+" on market). Then offer a free CMA. Do NOT mention their equity or mortgage."
        : "Reference their local "+area+" market specifically: median price "+price+", average "+dom+" on market, values "+stats.trend+", and offer a free, no-obligation CMA for their specific home.";
      callAI("Write a short warm home-value update email from "+AGENT.name+" to "+l.first+" "+l.last+", a homeowner"+(l.addr?(" at "+l.addr):"")+" in "+area+" (Sonoma County). "+info+" Use their city/area name naturally. Under 150 words. Warm, helpful, not pushy. Start with 'Hi "+l.first+",'. Sign off: "+AGENT.name+" | "+AGENT.phone+" | "+AGENT.email+" | DRE #"+AGENT.lic+" | thealiciajohnsonhomes.com.").then(function(t){
        var bad = !t || t.indexOf("⚠️")===0 || t.indexOf("API error")===0 || t.indexOf("Fetch error")===0;
        setDrafts(function(p){ var n={...p}; n[l.id]= bad ? valueLocal(l, ov, avm) : t; return n; }); setBusyId("");
      });
    });
  }
  var SUBJ = "Your home value update — Sonoma County";
  function gmailFor(l){ var b=drafts[l.id]; if(!b||!l.email) return; window.open("https://mail.google.com/mail/?view=cm&fs=1&authuser="+encodeURIComponent(AGENT.email)+"&to="+encodeURIComponent(l.email)+(l.email2?"&cc="+encodeURIComponent(l.email2):"")+"&su="+encodeURIComponent(SUBJ)+"&body="+encodeURIComponent(b),"_blank"); }
  function mailFor(l){ var b=drafts[l.id]; if(!b) return; window.location.href="mailto:"+(l.email||"")+"?subject="+encodeURIComponent(SUBJ)+"&body="+encodeURIComponent(b); }
  function copyFor(l){ var b=drafts[l.id]; if(b&&navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(b); }

  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🏠 Seller Alerts <span style={{fontSize:12,fontWeight:400,color:C.t3}}>· home-value updates</span></div>
      <div style={{fontSize:12.5,color:C.t2,marginBottom:12,lineHeight:1.5,maxWidth:710}}>Keep homeowners thinking about their home's value (and you). Two free ways: <b>(1)</b> set up a BAREIS neighborhood alert so they auto-get nearby sales/listings — the real driver of their value; <b>(2)</b> send each seller a personal AI-written <b>home value update</b> for their address right here. (A fully-automatic dollar-figure estimate email would need a paid tool like Cloud CMA — ask me if you want that.)</div>

      <Card title={<span style={{cursor:"pointer"}} onClick={function(){ setShowSteps(function(s){ return !s; }); }}>How to set up a seller's home-value alert in BAREIS (free) {showSteps?"▾":"▸"}</span>}>
        {showSteps && <div>
          <ol style={{margin:0,paddingLeft:18,fontSize:12.5,color:C.t2,lineHeight:1.75}}>
            <li>In BAREIS, go to <b>Contacts</b> → <b>Add Contact</b> → enter the homeowner's name + email → <b>Save</b>.</li>
            <li>Open the contact → <b>Buyer Activity</b> → <b>Add Search</b> → <b>Add New Search</b> (this works for value tracking too).</li>
            <li>Set the criteria to <b>their neighborhood</b> — their subdivision/ZIP and a price band around their home — and include <b>Sold</b> + <b>Active</b> status, so they see what's selling near them.</li>
            <li>Click the green <b>Save Search</b> → name it (e.g. "123 Main St — neighborhood") → <b>Save</b>, and turn on <b>auto-notification (email)</b>.</li>
            <li>For an actual dollar estimate, run a quick <b>CMA</b> in BAREIS for their address periodically and send it. Then flip <b>Value alert active</b> here.</li>
          </ol>
          <div style={{fontSize:11,color:C.t3,marginTop:8}}>Want me to walk you through it live on your screen? Just ask.</div>
        </div>}
      </Card>

      <Card title="Market numbers (used in the home-value emails)">
        <Row cols="1fr 1fr 1fr"><Fld label="Median price"><input style={inp} value={stats.price} onChange={statf("price")} /></Fld><Fld label="Days on market"><input style={inp} value={stats.dom} onChange={statf("dom")} /></Fld><Fld label="Value trend"><input style={inp} value={stats.trend} onChange={statf("trend")} /></Fld></Row>
        <Btn onClick={pullMarket} style={{fontSize:11,marginTop:6}}>{mktBusy?"⏳ Refreshing…":"🔄 Refresh market numbers from web"}</Btn>

      <Card>

          <div><div style={{fontSize:22,fontWeight:700,color:C.ac,fontFamily:"monospace"}}>{activeA.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Alerts active</div></div>
          <div><div style={{fontSize:22,fontWeight:700,color:C.go,fontFamily:"monospace"}}>{pending.length}</div><div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>Need setup</div></div>

        </div>
      </Card>

      <div style={{display:"flex",borderBottom:"1px solid "+C.br,margin:"14px 0 10px"}}>
        {[["pending","Need setup ("+pending.length+")"],["active","Active ("+activeA.length+")"],["all","All sellers ("+sellers.length+")"]].map(function(x){
          return <div key={x[0]} style={{padding:"7px 14px",fontSize:12.5,fontWeight:500,cursor:"pointer",color:view===x[0]?C.ac:C.t3,borderBottom:"2px solid "+(view===x[0]?C.ac:"transparent"),marginBottom:-1}} onClick={function(){ setView(x[0]); }}>{x[1]}</div>;
        })}

                   : (vals[l.id] && vals[l.id].error) ? <span style={{color:C.t3}}>No value found for this address.</span>
                   : (streetOf(l) ? <span style={{color:C.sk,cursor:"pointer"}} onClick={function(){ getVal(l); }}>💲 Get est. value</span> : <span style={{color:C.t3}}>Add a street address for an estimate</span>)}
                </div>
                <div style={{fontSize:11,color:C.t3,fontFamily:"monospace"}}>{l.email||"⚠️ no email"}{l.sellerAlertDate?" · since "+fmtDate(l.sellerAlertDate):""}</div>
                <input style={{...inp,fontSize:12,marginTop:6}} placeholder="Note — e.g. quarterly CMA, neighborhood ZIP 95403, last value ~$730k" value={noteVal(l)} onChange={function(e){ var v=e.target.value; setNote(function(p){ var n={...p}; n[l.id]=v; return n; }); }} onBlur={function(){ saveNote(l); }} />
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                <Btn v={l.sellerAlert?"def":"primary"} style={{fontSize:11}} onClick={function(){ toggle(l); }}>{l.sellerAlert?"✓ Alert active":"Mark alert set up"}</Btn>
                <Btn v="gold" style={{fontSize:11}} onClick={function(){ genFor(l); }}>{busyId===l.id?"⏳ Writing…":"✨ Home value email"}</Btn>
              </div>
            </div>
            {(busyId===l.id||d) && <AIBox text={d} loading={busyId===l.id} />}
            {d && d.indexOf("⚠️")!==0 && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                <Btn v="primary" style={{fontSize:11}} onClick={function(){ gmailFor(l); }}>📧 Email via Gmail</Btn>
                <Btn style={{fontSize:11}} onClick={function(){ copyFor(l); }}>📋 Copy</Btn>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}

/* ── GMAIL ───────────────────────────────────────────────────── */
